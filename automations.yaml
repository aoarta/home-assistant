- alias: Venus Steuermodus einschalten (30 Min nach Sonnenaufgang)
  description: Schaltet die Marstek Venus Switches 30 Minuten nach Sonnenaufgang ein.
  id: "1773505418790"
  triggers:
    - trigger: sun
      event: sunrise
      offset: 00:30:00
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single

- alias: setze cpu-schedutil
  description: Setze CPU auf schedutil
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single

- alias: "Tasmota: Globales Setup an alle"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: 03:00:00
  actions:
    - delay: 00:00:30
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: "{% set lat = state_attr('zone.home', 'latitude') | float(0) |
          round(6) %} {% set lon = state_attr('zone.home', 'longitude') | float(0)
          | round(6) %} Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 105; WattRes
          1; TelePeriod 15; Sunrise 1"

- alias: "SOC Override Wochensteuerung"
  description: "Setzt den Override am Mittwoch auf AN und an anderen Tagen auf AUS"
  id: soc_override_weekly_control
  trigger:
    # Trigger 1: Jeden Morgen um 00:01 Uhr prüfen
    - platform: time
      at: "00:01:00"
    # Trigger 2: Beim Neustart von Home Assistant (Sicherheitsnetz)
    - platform: homeassistant
      event: start
  action:
    - choose:
        # Erster Fall: Es ist Mittwoch
        - conditions:
            - condition: time
              weekday:
                - wed
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.override_soc
      # Der 'default' Block kommt NACH der Liste der Bedingungen
      default:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.override_soc

- alias: "Batterie Wartung: Nachtladung erzwingen"
  id: batterie_wartung_nachtladung
  trigger:
    - platform: sun
      event: sunset
      offset: "00:05:00"
    - platform: state
      entity_id: binary_sensor.batterie_wartung_erforderlich
      to: "on"
  condition:
    - condition: state
      entity_id: binary_sensor.batterie_wartung_erforderlich
      state: "on"
    - condition: sun
      after: sunset
  action:
    # Wir nutzen deine vorhandene manuelle Ladeleistung als Override
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 1000 # Mit 1000W pro Batterie laden (oder dein gewünschter Wert)


- alias: "Batterie Wartung: Beenden wenn voll"
  id: batterie_wartung_beenden
  trigger:
    - platform: state
      entity_id:
        - sensor.marstek_venus_1_batterie_ladezustand
        - sensor.marstek_venus_2_batterie_ladezustand
      to: "100"
  condition:
    - condition: state
      entity_id: input_number.manuelle_ladeleistung
      state: "1000.0" # Nur wenn wir im Wartungsmodus sind
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 0
