- alias: "System: PV Prognose nach Neustart aktualisieren"
  description: Triggert die REST-API und Forecast-Sensoren nach Systemstart
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay: 00:00:05
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.solarprognose_api_raw_dach
          - sensor.solarprognose_api_raw_fassade
          - sensor.forecastsolar_api_raw_dach
          - sensor.forecastsolar_api_raw_fassade
          - sensor.pv_forecast_openmeteo_combined
          - sensor.pv_forecast_forecastsolar_combined
    - action: system_log.write
      data:
        level: info
        message: PV Forecasts wurden nach Neustart manuell aktualisiert.
  id: 66ae09f531f4465db31701ff010fe186

- alias: Solarprognose Update Kontrolle
  description: Aktualisiert die Wetterdaten bei Sonnenaufgang, 10 Uhr und 14 Uhr
  trigger:
    - platform: sun
      event: sunrise
      offset: 00:05:00
    - platform: time
      at: "10:00:00"
    - platform: time
      at: "12:00:00"
    - platform: time
      at: "14:00:00"
  action:
    # 1. Rest Sensoren
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.solarprognose_api_raw_dach
          - sensor.solarprognose_api_raw_fassade
          - sensor.forecastsolar_api_raw_dach
          - sensor.forecastsolar_api_raw_fassade
    # 2. Update für Solcast (Dienst-basiert)
    - action: solcast_solar.update_forecasts
      data: {}
  mode: single
  id: 3f207ea11452424abda5470c01cf4df7

- alias: "Venus Steuermodus einschalten (30 Min nach Sonnenaufgang)"
  description: "Schaltet die Marstek Venus Switches 30 Minuten nach Sonnenaufgang ein."
  id: "1773505418790"
  triggers:
    - trigger: sun
      event: sunrise
      offset: "00:30:00"
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single

- alias: setze cpu-schedutil
  description: "Setze CPU auf schedutil"
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single

- alias: "Tasmota: Globales Setup an alle"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: "03:00:00"
  actions:
    - delay: "00:00:30"
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: >
          {% set lat = state_attr('zone.home', 'latitude') | float(0) | round(6) %}
          {% set lon = state_attr('zone.home', 'longitude') | float(0) | round(6) %}
          Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 105; WattRes 1; TelePeriod 60; Sunrise 1
