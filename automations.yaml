- alias: Venus Steuermodus einschalten (30 Min nach Sonnenaufgang)
  description: Schaltet die Marstek Venus Switches 30 Minuten nach Sonnenaufgang ein.
  id: "1773505418790"
  triggers:
    - trigger: sun
      event: sunrise
      offset: 00:30:00
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single
- alias: setze cpu-schedutil
  description: Setze CPU auf schedutil
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single
  id: 2ec11fc5fd5147ca9a2ab304ef7b4b8c
- alias: "Tasmota: Globales Setup an alle"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: 03:00:00
  actions:
    - delay: 00:00:30
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: "{% set lat = state_attr('zone.home', 'latitude') | float(0) |
          round(6) %} {% set lon = state_attr('zone.home', 'longitude') | float(0)
          | round(6) %} Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 105; WattRes
          1; TelePeriod 15; Sunrise 1"
- alias: "Batterie Wartung: Nachtladung erzwingen"
  id: batterie_wartung_nachtladung
  trigger:
    - platform: sun
      event: sunset
      offset: 00:05:00
    - platform: state
      entity_id: binary_sensor.batterie_wartung_erforderlich
      to: "on"
  condition:
    - condition: state
      entity_id: binary_sensor.batterie_wartung_erforderlich
      state: "on"
    - condition: sun
      after: sunset
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 1000
- alias: "Batterie Wartung: Beenden wenn voll"
  id: batterie_wartung_beenden
  trigger:
    - platform: state
      entity_id:
        - sensor.marstek_venus_1_batterie_ladezustand
        - sensor.marstek_venus_2_batterie_ladezustand
      to: "100"
  condition:
    - condition: state
      entity_id: input_number.manuelle_ladeleistung
      state: "1000.0"
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 0
- alias: SOC Override bedarfsgesteuert (7 Tage)
  description:
    Setzt den Override auf AN, wenn eine der Batterien seit über 7 Tagen
    nicht voll war, sonst auf AUS
  id: soc_override_weekly_control
  trigger:
    - trigger: time
      at: 00:03:00
    - trigger: homeassistant
      event: start
  action:
    - choose:
        - conditions:
            - condition: template
              value_template:
                "{% set v1_last = states('sensor.venus_1_last_full') %}
                {% set v2_last = states('sensor.venus_2_last_full') %} {% set ups_last
                = states('sensor.ups_last_full') %} {% set threshold = 7 * 86400 %} {#
                7 Tage in Sekunden #} {% set now_ts = as_timestamp(now()) %}

                {% set v1_age = (now_ts - as_timestamp(v1_last)) if has_value('sensor.venus_1_last_full')
                else 9999999 %} {% set v2_age = (now_ts - as_timestamp(v2_last)) if has_value('sensor.venus_2_last_full')
                else 9999999 %} {% set ups_age = (now_ts - as_timestamp(ups_last)) if has_value('sensor.ups_last_full')
                else 9999999 %}

                {{ v1_age > threshold or v2_age > threshold or ups_age > threshold }}

                "
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.override_soc
      default:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.override_soc
