- alias: "Venus: Enable Control Mode After Sunrise"
  id: set_venus_control_mode
  description: "Enables the Marstek Venus control mode switches 30 minutes after sunrise."
  triggers:
    - trigger: sun
      event: sunrise
      offset: "00:30:00"
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single

- alias: "System: Set CPU Governor Schedutil"
  id: set_cpu_schedutil
  description: "Set CPU governor to schedutil on HA startup."
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single

- alias: "Tasmota: Broadcast Global Setup"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: "03:00:00"
  actions:
    - delay: "00:00:30"
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: >-
          {% set lat = state_attr('zone.home', 'latitude') | float(0) | round(6) %}
          {% set lon = state_attr('zone.home', 'longitude') | float(0) | round(6) %}
          Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 110; WattRes 1; TelePeriod 15; Sunrise 1

- alias: "Battery Maintenance: Start Night Charge"
  id: battery_maintenance_night_charge
  triggers:
    - trigger: sun
      event: sunset
      offset: "00:05:00"
    - trigger: state
      entity_id: binary_sensor.battery_maintenance_required
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.battery_maintenance_required
      state: "on"
    - condition: sun
      after: sunset
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.manual_charge_power
      data:
        value: 1000.0

- alias: "Battery Maintenance: Stop When Full"
  id: battery_maintenance_stop_when_full
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.marstek_venus_1_soc
        - sensor.marstek_venus_2_soc
      above: 99
  conditions:
    - condition: numeric_state
      entity_id: input_number.manual_charge_power
      above: 0
    - condition: numeric_state
      entity_id: sensor.marstek_venus_1_soc
      above: 99
    - condition: numeric_state
      entity_id: sensor.marstek_venus_2_soc
      above: 99
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.manual_charge_power
      data:
        value: 0
    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.venus_1_last_full
          - input_datetime.venus_2_last_full
      data:
        timestamp: "{{ now().timestamp() }}"

- alias: "Battery Maintenance: Enable SOC Override When Overdue"
  description: >
    Turns on SOC override if any battery has not been fully charged within
    the configured number of days; turns it off once all are fresh OR once
    all three batteries report a full charge (hardware SOC and custom SOC).
  id: soc_override_weekly_control
  triggers:
    - trigger: time_pattern
      minutes: "/5"
    - trigger: homeassistant
      event: start
  #    - trigger: numeric_state
  #      entity_id:
  #        - sensor.venus_1_custom_soc
  #        - sensor.venus_2_custom_soc
  #        - sensor.ups_custom_soc
  #      above: 99.9
  actions:
    - choose:
        # --- Turn ON: any battery overdue ---
        - conditions:
            - condition: template
              value_template: >-
                {% set days = state_attr('sensor.global_parameter', 'override_soc_days') | float(5) %}
                {% set threshold = days * 86400 %}
                {% set now_ts = as_timestamp(now()) %}
                {% set ages = [
                  (now_ts - as_timestamp(states('input_datetime.venus_1_last_full'), 0)) if has_value('input_datetime.venus_1_last_full') else 0,
                  (now_ts - as_timestamp(states('input_datetime.venus_2_last_full'), 0)) if has_value('input_datetime.venus_2_last_full') else 0,
                  (now_ts - as_timestamp(states('input_datetime.ups_last_full'), 0)) if has_value('input_datetime.ups_last_full') else 0
                ] %}
                {{ ages | max > threshold }}
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.override_soc

        # --- Turn OFF: all three batteries fully charged (HW SOC + custom SOC) ---
        - conditions:
            - condition: template
              value_template: >-
                {{ states('sensor.marstek_venus_1_soc') | float(0) >= 100
                   and states('sensor.venus_1_custom_soc') | float(0) >= 100
                   and states('sensor.marstek_venus_2_soc') | float(0) >= 100
                   and states('sensor.venus_2_custom_soc') | float(0) >= 100
                   and states('sensor.ups_soc') | float(0) >= 100
                   and states('sensor.ups_custom_soc') | float(0) >= 100 }}
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.override_soc
      default:
        - condition: template
          value_template: >-
            {% set now_ts = as_timestamp(now()) %}
            {% set ages = [
              (now_ts - as_timestamp(states('input_datetime.venus_1_last_full'), now_ts)) if has_value('input_datetime.venus_1_last_full') else now_ts,
              (now_ts - as_timestamp(states('input_datetime.venus_2_last_full'), now_ts)) if has_value('input_datetime.venus_2_last_full') else now_ts,
              (now_ts - as_timestamp(states('input_datetime.ups_last_full'), now_ts)) if has_value('input_datetime.ups_last_full') else now_ts
            ] %}
            {{ ages | min < 30 }}
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.override_soc
