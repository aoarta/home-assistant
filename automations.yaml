- alias: "System: PV Prognose nach Neustart aktualisieren"
  id: 66ae09f531f4465db31701ff010fe186
  description: Triggert die REST-API und Forecast-Sensoren mit Versatz nach Systemstart
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay: 00:00:15 # Etwas mehr Zeit geben, bis alle Integrationen geladen sind

    # --- Solarprognose (REST) ---
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.solarprognose_api_source_dach
          - sensor.solarprognose_api_source_fassade

    - delay: 00:00:10 # Pause vor dem nächsten Anbieter

    # --- ForecastSolar (REST) ---
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.forecastsolar_api_source_dach
    - delay: 00:00:30 # WICHTIG: 30s Pause für ForecastSolar Rate-Limit
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.forecastsolar_api_source_fassade

    - delay: 00:00:05

    # --- Berechnete Sensoren aktualisieren (wenn Rohdaten da sind) ---
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.pv_forecast_openmeteo_combined
          - sensor.pv_forecast_forecastsolar_combined

    - action: system_log.write
      data:
        level: info
        message: PV Forecasts wurden sequenziell nach Neustart aktualisiert.

- alias: Solarprognose Update Kontrolle
  id: 3f207ea11452424abda5470c01cf4df7
  description: Aktualisiert die Wetterdaten sequenziell (Anti-Blocking)
  trigger:
    - platform: sun
      event: sunrise
      offset: 00:05:00
    - platform: time
      at: "10:00:00"
    - platform: time
      at: "12:00:00"
    - platform: time
      at: "14:00:00"
  action:
    # 1. Solarprognose (meist unkritisch)
    - action: homeassistant.update_entity
      target:
        entity_id:
          - sensor.solarprognose_api_source_dach
          - sensor.solarprognose_api_source_fassade

    - delay: 00:00:10

    # 2. Solcast (Cloud-Dienst)
    - action: solcast_solar.update_forecasts
      data: {}

    - delay: 00:00:20 # Genug Puffer vor ForecastSolar

    # 3. ForecastSolar (Kritisch bzgl. Rate-Limit)
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.forecastsolar_api_source_dach
    - delay: 00:00:45 # Großzügige Pause zwischen Dach und Fassade
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.forecastsolar_api_source_fassade

  mode: restart # Restart ist besser, falls ein Trigger während eines Delays erneut feuert

- alias: "Venus Steuermodus einschalten (30 Min nach Sonnenaufgang)"
  description: "Schaltet die Marstek Venus Switches 30 Minuten nach Sonnenaufgang ein."
  id: "1773505418790"
  triggers:
    - trigger: sun
      event: sunrise
      offset: "00:30:00"
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single

- alias: setze cpu-schedutil
  description: "Setze CPU auf schedutil"
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single

- alias: "Tasmota: Globales Setup an alle"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: "03:00:00"
  actions:
    - delay: "00:00:30"
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: >
          {% set lat = state_attr('zone.home', 'latitude') | float(0) | round(6) %}
          {% set lon = state_attr('zone.home', 'longitude') | float(0) | round(6) %}
          Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 105; WattRes 1; TelePeriod 15; Sunrise 1
