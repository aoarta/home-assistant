- alias: "Venus Control Mode Enable (30 Min After Sunrise)"
  description: "Enables the Marstek Venus control mode switches 30 minutes after sunrise."
  id: "1773505418790"
  triggers:
    - trigger: sun
      event: sunrise
      offset: "00:30:00"
  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.marstek_venus1_modbus_rs485_steuermodus
          - switch.marstek_venus2_modbus_rs485_steuermodus
  mode: single

- alias: "Set CPU Schedutil"
  description: "Set CPU governor to schedutil"
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - action: shell_command.optimize_cpu
      metadata: {}
      data: {}
  mode: single
  id: 2ec11fc5fd5147ca9a2ab304ef7b4b8c

- alias: "Tasmota: Global Setup Broadcast"
  id: tasmota_global_broadcast
  triggers:
    - trigger: homeassistant
      event: start
    - trigger: time
      at: "03:00:00"
  actions:
    - delay: "00:00:30"
    - action: mqtt.publish
      data:
        topic: cmnd/tasmotas/Backlog
        payload: "{% set lat = state_attr('zone.home', 'latitude') | float(0) |
          round(6) %} {% set lon = state_attr('zone.home', 'longitude') | float(0)
          | round(6) %} Latitude {{ lat }}; Longitude {{ lon }}; PowerDelta 110; WattRes
          1; TelePeriod 15; Sunrise 1"

- alias: "Battery Maintenance: Force Night Charge"
  id: batterie_wartung_nachtladung
  triggers:
    - trigger: sun
      event: sunset
      offset: "00:05:00" # start in the evening or at night
    - trigger: state
      entity_id: binary_sensor.battery_maintenance_required
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.battery_maintenance_required
      state: "on"
    - condition: sun
      after: sunset
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 1000.0

- alias: "Battery Maintenance: Stop When Full"
  id: batterie_wartung_beenden
  triggers:
    - trigger: numeric_state
      entity_id:
        - sensor.marstek_venus_1_batterie_ladezustand
        - sensor.marstek_venus_2_batterie_ladezustand
      above: 99
  conditions:
    # Only run if manual charging is currently active
    - condition: numeric_state
      entity_id: input_number.manuelle_ladeleistung
      above: 0
    # Ensure BOTH batteries are full before stopping
    - condition: numeric_state
      entity_id: sensor.marstek_venus_1_batterie_ladezustand
      above: 99
    - condition: numeric_state
      entity_id: sensor.marstek_venus_2_batterie_ladezustand
      above: 99
  actions:
    # 1. Reset charging power to 0
    - action: input_number.set_value
      target:
        entity_id: input_number.manuelle_ladeleistung
      data:
        value: 0
    # 2. Clear maintenance flag (set timestamp to NOW)
    - action: input_datetime.set_datetime
      target:
        entity_id:
          - input_datetime.venus_1_last_full
          - input_datetime.venus_2_last_full
      data:
        timestamp: "{{ now().timestamp() }}"

- alias: "SOC Override Demand-Controlled"
  description: >
    Sets Override to ON if any battery has not been full for over 5 days,
    otherwise sets it OFF.
  id: soc_override_weekly_control
  triggers:
    - trigger: time_pattern
      minutes: "/5"
    - trigger: homeassistant
      event: start
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: >-
                {% set days = state_attr('sensor.zentrale_parameter', 'override_soc_days') | float(5) %}
                {% set threshold = days * 86400 %}
                {% set now_ts = as_timestamp(now()) %}
                {# Use 0 instead of 9999999 to avoid false triggers when unavailable #}
                {% set ages = [
                  (now_ts - as_timestamp(states('input_datetime.venus_1_last_full'), 0)) if has_value('input_datetime.venus_1_last_full') else 0,
                  (now_ts - as_timestamp(states('input_datetime.venus_2_last_full'), 0)) if has_value('input_datetime.venus_2_last_full') else 0,
                  (now_ts - as_timestamp(states('input_datetime.ups_last_full'), 0)) if has_value('input_datetime.ups_last_full') else 0
                ] %}
                {{ ages | max > threshold }}
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.override_soc

      default:
        - condition: template
          value_template: >-
            {% set now_ts = as_timestamp(now()) %}
            {% set ages = [
              (now_ts - as_timestamp(states('input_datetime.venus_1_last_full'), now_ts)) if has_value('input_datetime.venus_1_last_full') else now_ts,
              (now_ts - as_timestamp(states('input_datetime.venus_2_last_full'), now_ts)) if has_value('input_datetime.venus_2_last_full') else now_ts,
              (now_ts - as_timestamp(states('input_datetime.ups_last_full'), now_ts)) if has_value('input_datetime.ups_last_full') else now_ts
            ] %}
            {{ ages | min < 120 }}
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.override_soc
