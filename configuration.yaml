# Grundkonfiguration
default_config:

frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

shell_command:
  optimize_cpu: 'bash -c "echo schedutil > /sys/devices/system/cpu/cpufreq/policy0/scaling_governor && echo 10000 > /sys/devices/system/cpu/cpufreq/schedutil/rate_limit_us"'

recorder:
  purge_keep_days: 8
  commit_interval: 60
  db_url: mysql://homeassistant:homeassistant@core-mariadb/homeassistant?charset=utf8mb4
  exclude:
    entities:
      - automation.ups_grobregelung_laden_entladen
      - automation.sende_lade_und_entladebefehle_an_hardware
      - automation.sende_batterie_targets
      - sensor.garage_inverter_energy_power
      - sensor.balkon_inverter2_energy_power
      - sensor.balkon_inverter_energy_power
      - sensor.garage_inverter_5min_average
      - sensor.balkon_inverter_5min_average
      - sensor.balkon_inverter2_5min_average
      - sensor.hausverbrauch_netto_watt
      - sensor.solarnet_leistung_netzbezug
      - sensor.solarnet_leistung_netzeinspeisung
      - sensor.solarnet_leistung_verbrauch
      - sensor.solarnet_pv_leistung
      - sensor.solarnet_leistung_vom_netz

    entity_globs:
      - sensor.marstek_venus_*_spannung
      - sensor.marstek_venus_*_strom
      - sensor.*ssid*
      - sensor.*highest_peak_time*
      - sensor.*wifi_connect_count*
      - sensor.*raw*
      - sensor.*api*
      - sensor.*fast*
      - sensor.*apparentpower*
      - sensor.*reactivepower*
      - sensor.*umwandlungseffizienz*
      - sensor.*ac_frequenz*
      - sensor.*batteriestrom*
      - sensor.*autarkiegrad*
      - sensor.*batterieleistung
      - sensor.*energy_current*

logger:
  default: warning
  logs:
    homeassistant.components.modbus: error
    custom_components.marstek_modbus: error

sql:
  - name: "DB Top 10 Schreiber"
    query: >
      SELECT 
          m.entity_id, 
          COUNT(*) AS anzahl 
      FROM states s
      JOIN states_meta m ON s.metadata_id = m.metadata_id
      WHERE s.last_updated_ts >= UNIX_TIMESTAMP(NOW() - INTERVAL 15 MINUTE)
      GROUP BY s.metadata_id
      ORDER BY anzahl DESC
      LIMIT 10;
    column: "entity_id"

input_boolean:
  override_soc:
    name: "Manueller SOC Override"
    icon: mdi:battery-lock
    initial: false

command_line:
  - sensor:
      name: "CPU Aktuelle Geschwindigkeit"
      unique_id: cpu_current_speed_mhz
      command: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      unit_of_measurement: "MHz"
      value_template: "{{ (value | float / 1000) | round(0) }}"
      scan_interval: 60

  - sensor:
      name: "CPU Maximale Geschwindigkeit"
      unique_id: cpu_max_speed_mhz
      command: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq"
      unit_of_measurement: "MHz"
      value_template: "{{ (value | float / 1000) | round(0) }}"
      scan_interval: 86400 # Reicht einmal am Tag

template:
  # 1. Normale Sensoren (Zustandsbasiert)
  - sensor:
      - name: "Solar Zeit-Logik"
        unique_id: solar_zeit_logik
        state: >
          {% set ts = as_timestamp(now()) %}
          {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) | default(0) %}
          {% set sr = as_timestamp(state_attr('sun.sun', 'next_rising')) | default(0) %}
          {% set today_sr = sr - 86400 if sr > ts else sr %}
          {% set today_ss = ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss %}
          {{ 'Tag' if today_sr <= ts <= today_ss else 'Nacht' }}
        attributes:
          now_ts: "{{ as_timestamp(now()) }}"
          sun_rise: "{{ as_timestamp(state_attr('sun.sun', 'next_rising')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_rising')) > as_timestamp(now()) else as_timestamp(state_attr('sun.sun', 'next_rising')) }}"
          sun_set: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_setting')) > as_timestamp(now().replace(hour=23, minute=59)) else as_timestamp(state_attr('sun.sun', 'next_setting')) }}"
          t1130: "{{ as_timestamp(now().replace(hour=11, minute=30, second=0, microsecond=0)) }}"
          b_set: >
            {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
            {{ (ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss) - 12600 }}

      - name: "Dynamic SOC Grenzen"
        unique_id: dynamic_soc_grenzen
        unit_of_measurement: "%"
        state: "{{ states('sensor.battery_soc_total') | float(0) }}"
        attributes:
          min: "5"
          low: "{{ 100.1 if is_state('input_boolean.override_soc', 'on') else 60 }}"
          mid: "{{ 100.1 if is_state('input_boolean.override_soc', 'on') else 80 }}"
          max: "100.1"
          high: >
            {% if is_state('input_boolean.override_soc', 'on') %}
              100.1
            {% else %}
              {% set morgen = states('sensor.hp_forecast_weighted_morgen') | float(0) %}
              {{ 85 if morgen > 30 else 100.1 }}
            {% endif %}

  # 2. Trigger-basierte Sensoren
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - input_number.manuelle_ladeleistung
          - sensor.pv_forecast_weighted
          - sensor.estimated_remaining_consumption
          - sensor.solar_zeit_logik
          - sensor.marstek_free_capacity_kwh
          - sensor.ups_free_capacity_kwh

    sensor:
      - name: "Dynamic SOC"
        unique_id: dynamic_soc
        unit_of_measurement: "%"
        state: >
          {% if states('input_number.manuelle_ladeleistung') | float(0) > 0 %}
            100.1
          {% else %}
            {% set solar_today = states('sensor.pv_forecast_weighted') | float(-1) %}
            {% set free_marstek = states('sensor.marstek_free_capacity_kwh') | float(0) %}
            {% set free_ups = states('sensor.ups_free_capacity_kwh') | float(0) %}
            {% set load_today = max(0, states('sensor.estimated_remaining_consumption') | float(0)) %}

            {% if (0.9 * solar_today) > (load_today + free_marstek + free_ups) or solar_today == -1 %}
              {% set ts = state_attr('sensor.solar_zeit_logik', 'now_ts') | float(0) %}
              {% set s_rise = state_attr('sensor.solar_zeit_logik', 'sun_rise') | float(0) %}
              {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
              {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
              {% set s_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}

              {% if ts < s_rise %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
              {% elif ts < t1130 %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'low') | float(60) }}
              {% elif ts < b_set %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'mid') | float(80) }}
              {% elif ts < s_set %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'high') | float(100) }}
              {% else %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
              {% endif %}
            {% else %}
              100.2
            {% endif %}
          {% endif %}
