# Grundkonfiguration
default_config:

frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

shell_command:
  optimize_cpu: 'bash -c "echo schedutil > /sys/devices/system/cpu/cpufreq/policy0/scaling_governor && echo 10000 > /sys/devices/system/cpu/cpufreq/schedutil/rate_limit_us"'

rest_command:
  awekas_upload:
    url: >
      {% set temp = states('sensor.wetterstation_aussentemperatur') %}
      {% set hum = states('sensor.wetterstation_luftfeuchtigkeit') %}
      {% if is_number(temp) and is_number(hum) %}
        https://ws.awekas.at/weatherstation/updateweatherstation.php?ID=zwim&PASSWORD=Exodus666waa&tempf={{ (temp | float * 9/5 + 32) | round(1) }}&humidity={{ hum | int }}&softwaretype=HomeAssistant
      {% else %}
        https://ws.awekas.at/weatherstation/updateweatherstation.php?ID=zwim&PASSWORD=Exodus666waa&status=offline
      {% endif %}
    method: GET

recorder:
  purge_keep_days: 366
  commit_interval: 60
  db_url: mysql://homeassistant:homeassistant@core-mariadb/homeassistant?charset=utf8mb4
  include:
    entities:
      # dein täglicher PV-Produktionssensor:
      - sensor.pv_forecast_weighted
      - sensor.pv_forecast_weighted_morgen
      - sensor.solar_forecast_ml_planungsprognose_p10_blend
      - sensor.prognose_heute
      - sensor.prognose_morgen
      - sensor.prognose_ubermorgen
      - sensor.pv_ertrag_heute_um

  exclude:
    entities:
      - automation.ups_grobregelung_laden_entladen
      - automation.sende_lade_und_entladebefehle_an_hardware
      - automation.sende_batterie_targets
      - sensor.garage_inverter_energy_power
      - sensor.balkon_inverter2_energy_power
      - sensor.balkon_inverter_energy_power
      - sensor.garage_inverter_5min_average
      - sensor.balkon_inverter_5min_average
      - sensor.balkon_inverter2_5min_average
      - sensor.hausverbrauch_netto_watt
      - sensor.solarnet_leistung_netzbezug
      - sensor.solarnet_leistung_netzeinspeisung
      - sensor.solarnet_leistung_verbrauch
      - sensor.solarnet_pv_leistung
      - sensor.solarnet_leistung_vom_netz

    entity_globs:
      - sensor.*defekt*
      - sensor.marstek_venus_*_spannung
      - sensor.marstek_venus_*_strom
      - sensor.*ssid*
      - sensor.*highest_peak_time*
      - sensor.*wifi_connect_count*
      - sensor.*raw*
      - sensor.*api*
      - sensor.*fast*
      - sensor.*apparentpower*
      - sensor.*reactivepower*
      - sensor.*umwandlungseffizienz*
      - sensor.*ac_frequenz*
      - sensor.*batteriestrom*
      - sensor.*autarkiegrad*
      - sensor.*batterieleistung
      - sensor.*energy_current*
      - sensor.*energy_voltage
      - sensor.*energy_factor*

sql:
  - name: "DB Top 10 Schreiber"
    query: >
      SELECT 
          m.entity_id, 
          COUNT(*) AS anzahl 
      FROM states s
      JOIN states_meta m ON s.metadata_id = m.metadata_id
      WHERE s.last_updated_ts >= UNIX_TIMESTAMP(NOW() - INTERVAL 15 MINUTE)
      GROUP BY s.metadata_id
      ORDER BY anzahl DESC
      LIMIT 10;
    column: "entity_id"

command_line:
  - sensor:
      name: "CPU Aktuelle Geschwindigkeit"
      unique_id: cpu_current_speed_mhz
      command: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      unit_of_measurement: "MHz"
      value_template: "{{ (value | float / 1000) | round(0) }}"
      scan_interval: 60

  - sensor:
      name: "CPU Maximale Geschwindigkeit"
      unique_id: cpu_max_speed_mhz
      command: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq"
      unit_of_measurement: "MHz"
      value_template: "{{ (value | float / 1000) | round(0) }}"
      scan_interval: 86400 # Reicht einmal am Tag

