# packages/pv_batteries.yaml

sensor:
  - platform: integration
    source: sensor.marstek_venus_1_batterieleistung # positiv ist laden
    name: "Venus 1 Energiefluss Wh"
    round: 1
    method: left

  - platform: integration
    source: sensor.marstek_venus_2_batterieleistung # positiv ist laden
    name: "Venus 2 Energiefluss Wh"
    round: 1
    method: left

################################################################################
################################################################################
################################################################################
################################################################################
################################################################################
template:
  # 2. TRIGGER: Wenn Hardware 100% sagt, setze den Referenzpunkt
  - trigger:
      - platform: state
        entity_id: sensor.marstek_venus_1_batterie_ladezustand
        to: "100"
    sensor:
      - name: "Venus 1 SOC Reset Punkt"
        unit_of_measurement: "Wh"
        state: >
          {% set val = states('sensor.venus_1_energiefluss_wh') %}
          {{ val if is_number(val) else states('sensor.venus_1_soc_reset_punkt') }}

  - trigger:
      - platform: state
        entity_id: sensor.marstek_venus_2_batterie_ladezustand
        to: "100"
    sensor:
      - name: "Venus 2 SOC Reset Punkt"
        unit_of_measurement: "Wh"
        state: >
          {% set val = states('sensor.venus_2_energiefluss_wh') %}
          {{ val if is_number(val) else states('sensor.venus_2_soc_reset_punkt') }}

  - trigger:
      - platform: state
        entity_id: sensor.venus_1_energiefluss_wh
      - platform: homeassistant
        event: start
    sensor:
      - name: "Venus 1 Custom SOC"
        unique_id: venus_1_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
          {% set alt = this.attributes.get('last_wh', 0) | float %}
          {% set neu = states('sensor.venus_1_energiefluss_wh') | float(0) %}

          {% if (neu - alt) | abs > 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
            {% if hw_soc >= 100 %}
              100
            {% else %}
              {% set total_wh = neu %}
              {% set reset_wh = states('sensor.venus_1_soc_reset_punkt') | float(0) %}
              {% set cap_wh = (states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12)) * 1000 %}
              {% set diff_wh = total_wh - reset_wh %}
              {% set calc_soc = 100 + (diff_wh / cap_wh * 100) %}
              {{ [ [calc_soc, 100] | min, 0 ] | max }}
            {% endif %}
          {% else %}
            {{ states('sensor.venus_1_custom_soc') }}
          {% endif %}
        attributes:
          last_wh: "{{ states('sensor.venus_1_energiefluss_wh') | float(0) }}"

  - trigger:
      - platform: state
        entity_id: sensor.venus_2_energiefluss_wh
      - platform: homeassistant
        event: start
    sensor:
      - name: "Venus 2 Custom SOC"
        unique_id: venus_2_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
          {% set alt = float(this.attributes.last_wh | default(0)) %}
          {% set neu = states('sensor.venus_2_energiefluss_wh') | float(0) %}

          {% if (neu - alt) | abs > 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
            {% if hw_soc >= 100 %}
              100
            {% else %}
              {% set total_wh = neu %}
              {% set reset_wh = states('sensor.venus_2_soc_reset_punkt') | float(0) %}
              {% set cap_wh = (states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12)) * 1000 %}
              {% set diff_wh = total_wh - reset_wh %}
              {% set calc_soc = 100 + (diff_wh / cap_wh * 100) %}
              {{ [ [calc_soc, 100] | min, 0 ] | max }}
            {% endif %}
          {% else %}
            {{ states('sensor.venus_2_custom_soc') }}
          {% endif %}
        attributes:
          last_wh: "{{ states('sensor.venus_2_energiefluss_wh') | float(0) }}"

  - sensor:
      - name: "Batterieleistung Watt"
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set b1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %} 
          {% set b2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}
          {{ (b1 + b2) | round(0) }}

      - name: "Battery SOC Total"
        unique_id: battery_soc_total
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set s1 = states('sensor.venus_1_custom_soc') %}
          {% set s2 = states('sensor.venus_2_custom_soc') %}

          {# Sicherstellen, dass wir Zahlen haben #}
          {% set soc1 = s1 | float(-1) if is_number(s1) else -1 %}
          {% set soc2 = s2 | float(-1) if is_number(s2) else -1 %}

          {% if soc1 >= 0 and soc2 >= 0 %}
            {{ ((soc1 + soc2) / 2) | round(0) }}
          {% elif soc1 >= 0 %}
            {{ soc1 | round(0) }}
          {% elif soc2 >= 0 %}
            {{ soc2 | round(0) }}
          {% else %}
            {# Fallback auf Hardware, falls Custom SOCs noch unknown sind #}
            {% set hw1 = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
            {% set hw2 = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
            {{ ((hw1 + hw2) / 2) | round(0) }}
          {% endif %}
        availability: >
          {# Der Sensor ist nur dann verfügbar, wenn mindestens eine Quelle Daten liefert #}
          {{ is_number(states('sensor.venus_1_custom_soc')) or 
              is_number(states('sensor.venus_2_custom_soc')) or
              is_number(states('sensor.marstek_venus_1_batterie_ladezustand')) }}

      - name: "Target Charge Distribution"
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set raw_target = [0, -(states('sensor.hausverbrauch_netto_watt') | float(0))] | max %}
          {% set last = this.state | float(0) %}
          {{ raw_target | round(0) if (raw_target - last) | abs > 15 else last }}

        attributes:
          # Wir speichern das Ergebnis direkt als Objekt (Map), nicht als JSON-String
          charge: >
            {% set manual = states('input_number.manuelle_ladeleistung') | float(0) %} 
            {% if manual > 0 %}
              {{ {'v1': manual, 'v2': manual} }}
            {% else %}
              {% set total = states('sensor.target_charge_distribution') | float(0) %}
              {% set dyn_soc = states('sensor.dynamic_soc') | float(50) %}

              {#{% set s1_raw = states('sensor.marstek_venus_1_batterie_ladezustand') | float(100) %}#}
              {% set s1_raw = states('sensor.venus_1_custom_soc') | float(100) %}
              {% set s1 = 100 if not is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else s1_raw %}

              {#{% set s2_raw = states('sensor.marstek_venus_2_batterie_ladezustand') | float(100) %}#}
              {% set s2_raw = states('sensor.venus_2_custom_soc') | float(100) %}
              {% set s2 = 100 if not is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else s2_raw %}              

              {% set limits = this.attributes.get('max_charge') %}
              {#{% set limits = state_attr('sensor.target_charge_distribution', 'max_charge') %}#}
              {% set lim1 = limits.v1 | int(0) if limits is not none else 2500 %}
              {% set lim2 = limits.v2 | int(0) if limits is not none else 2500 %}

              {% set w1, w2 = [0, dyn_soc - s1] | max, [0, dyn_soc - s2] | max %}
              {% set sum_w = (w1 + w2) %}

              {% if sum_w == 0 %}
                {{ {'v1': 0, 'v2': 0} }}
              {% else %}
                {% set target1 = (w1 / sum_w * total) %}
                {% set target2 = total - target1 %}
                {% if target1 > lim1 and target2 < lim2 %}
                  {% set v2 = [lim2, target2 + target1 - lim1] | min | round(0) %}
                  {{ {'v1': lim1, 'v2': v2} }}
                {% elif target1 < lim1 and target2 > lim2 %}
                  {% set v1 = [lim1, target1 + target2 - lim2] | min | round(0) %}
                  {{ {'v1': v1, 'v2': lim2} }}
                {% elif target1 > lim1 and target2 > lim2 %}
                  {{ {'v1': lim1, 'v2': lim2} }}
                {% else %}
                  {{ {'v1': target1, 'v2': target2} }}
                {% endif %}
              {% endif %}
            {% endif %}
          max_charge: >
            {% set solar_today = states('sensor.pv_forecast_weighted') | float(-1) %}
            {% set load_today = states('sensor.estimated_remaining_consumption') | float(-1) %}
            {% set ts = state_attr('sensor.solar_zeit_logik', 'now_ts') | float(0) %}
            {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
            {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}

            {% if (solar_today > load_today or solar_today == -1) and (ts >= t1130 and ts < b_set) %}               
                {% set reserve = 1.2 %}
                {% set current_soc1 = states('sensor.venus_1_custom_soc') | float(20) %}
                {% set current_soc2 = states('sensor.venus_2_custom_soc') | float(20) %}
                {% set ziel_soc = states('sensor.dynamic_soc') | float(80) %}
                {% if ziel_soc < 100 %}
                {% set diff1 = [[ziel_soc - current_soc1, 0] | max, 100] | min %}
                {% set diff2 = [[ziel_soc - current_soc2, 0] | max, 100] | min %}
                {% set dauer = (b_set - ts) / 3600 %}
                {% set korrigierte_dauer = dauer if dauer > 0.01 else 0.01 %}
                {% set max_ladeleistung1 = [ (5120 * diff1 / 100 / korrigierte_dauer * reserve) | round(0), 2500 ] | min %}
                {% set max_ladeleistung2 = [ (5120 * diff2 / 100 / korrigierte_dauer * reserve) | round(0), 2500 ] | min %}
                {{ {'v1': max_ladeleistung1, 'v2': max_ladeleistung2} }}
              {% else %}
                {{ {'v1': 2500, 'v2': 2500} }}
              {% endif %}              
            {% else %}
                {{ {'v1': 2500, 'v2': 2500} }}
            {% endif %}

      - name: "Venus Maximale Ladeverteilung"
        unit_of_measurement: "%"
        state: >
          {{ 1 }}

      - name: "Target Discharge Distribution"
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set current_soc = states('sensor.battery_soc_total') | float(0) %}
          {% set min_soc = state_attr('sensor.dynamic_soc_grenzen','min') | float(20) %}

          {% if current_soc <= min_soc %}
            0
          {% else %}
            {% set hausverbrauch = [states('sensor.hausverbrauch_netto_watt') | float(0), 0] | max %}

            {# Wir nutzen 'this.state', um den aktuellen Wert des Sensors sicher zu lesen #}
            {% set last = this.state | float(0) %}
            {# Hysterese von 15W #}
            {{ hausverbrauch | round(0) if (hausverbrauch - last) | abs > 15 else last }}
          {% endif %}
        attributes:
          raw: >
            {{ states('sensor.hausverbrauch_netto_watt') | float(0) }}
          discharge: >
            {# Auch hier 'this.state' statt states('sensor.target_discharge_distribution') #}
            {% set total_discharge_power = this.state | float(0) %}

            {% if total_discharge_power <= 0 %}
                {{ {'v1': 0, 'v2': 0} }}
            {% else %}
              {% set min_soc = state_attr('sensor.dynamic_soc_grenzen','min') | float(20) %}
              {% set s1_raw = states('sensor.venus_1_custom_soc') | float(0) %}
              {% set s1 = s1_raw if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 0 %}
              {% set s2_raw = states('sensor.venus_2_custom_soc') | float(0) %}
              {% set s2 = s2_raw if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 0 %}

              {% set w1, w2 = [0, s1 - min_soc] | max, [0, s2 - min_soc] | max %}
              {% set sum_w = (w1 + w2) %}
              
              {% if sum_w == 0 %}
                {{ {'v1': 0, 'v2': 0} }}
              {% else %}
                {% set v1 = (w1 * total_discharge_power / sum_w) | round(0) %}
                {% set v2 = (total_discharge_power - v1) | round(0) %}
                {{ {'v1': v1, 'v2': v2} }}
              {% endif %}
            {% endif %}

      - name: "Battery Free capacity kWh"
        unique_id: battery_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {# Gesamtkapazität der Venus 1 (Standard 5.12 kWh) #}
          {% set cap1 = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12) %}
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(0) %}

          {# Gesamtkapazität der Venus 2 (Standard 5.12 kWh) #}
          {% set cap2 = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(0) %}

          {# Berechnung der freien kWh pro Batterie #}
          {% set free1 = cap1 * (1 - (soc1 / 100)) %}
          {% set free2 = cap2 * (1 - (soc2 / 100)) %}

          {# Summe bilden und auf 2 Nachkommastellen runden #}
          {{ (free1 + free2) | round(2) }}

automation:
  - alias: "Sende Lade und Entladebefehle an Hardware (Optimiert)"
    id: "sende_batterie_targets_v2"
    mode: restart # Bricht laufende Delays ab, wenn ein neuer Wert kommt
    trigger:
      - platform: state
        entity_id:
          - sensor.target_charge_distribution
          - sensor.target_discharge_distribution
        for:
          seconds: 5 # Beruhigungszeit, um Hardware-Stress zu reduzieren
    condition:
      - condition: template
        value_template: "{{ is_number(trigger.to_state.state) }}"
    action:
      - variables:
          # --- Werte für Venus 1 ---
          v1_c_target: >
            {% set v = state_attr('sensor.target_charge_distribution', 'charge') %}
            {{ v.v1 | int(0) if v is not none else 0 }}
          v1_d_target: >
            {% set v = state_attr('sensor.target_discharge_distribution', 'discharge') %}
            {{ v.v1 | int(0) if v is not none else 0 }}
          v1_laden: "{{ [v1_c_target, 2500] | min if v1_c_target >= 20 else 0 }}"
          v1_entladen: "{{ [v1_d_target, 2500] | min if v1_d_target >= 20 else 0 }}"

          # --- Werte für Venus 2 ---
          v2_c_target: >
            {% set v = state_attr('sensor.target_charge_distribution', 'charge') %}
            {{ v.v2 | int(0) if v is not none else 0 }}
          v2_d_target: >
            {% set v = state_attr('sensor.target_discharge_distribution', 'discharge') %}
            {{ v.v2 | int(0) if v is not none else 0 }}
          v2_laden: "{{ [v2_c_target, 2500] | min if v2_c_target >= 20 else 0 }}"
          v2_entladen: "{{ [v2_d_target, 2500] | min if v2_d_target >= 20 else 0 }}"
          # --- Modus Logik ---
          target_mode_v1: >
            {% if v1_laden >= 20 %} charge
            {% elif v1_entladen >= 20 %} discharge
            {% else %} stop
            {% endif %}
          target_mode_v2: >
            {% if v2_laden >= 20 %} charge
            {% elif v2_entladen >= 20 %} discharge
            {% else %} stop
            {% endif %}

      # --- 1. MODUS SETZEN (Nur bei Änderung) ---
      - if:
          - condition: template
            value_template: "{{ states('select.marstek_venus_1_force_mode') != target_mode_v1 }}"
        then:
          - action: select.select_option
            target: { entity_id: select.marstek_venus_1_force_mode }
            data: { option: "{{ target_mode_v1 }}" }

      - if:
          - condition: template
            value_template: "{{ states('select.marstek_venus_2_force_mode') != target_mode_v2 }}"
        then:
          - action: select.select_option
            target: { entity_id: select.marstek_venus_2_force_mode }
            data: { option: "{{ target_mode_v2 }}" }

      - delay: { milliseconds: 300 }

      # --- 2. LADELEISTUNG (Nur bei Änderung > 15W oder aktivem Laden) ---
      - parallel:
          - if:
              - condition: template
                value_template: >
                  {{ (states('number.marstek_venus_1_ladeleistung_einstellen') | int(0) - v1_laden) | abs > 15
                     or (target_mode_v1 == 'charge' and states('number.marstek_venus_1_ladeleistung_einstellen') | int(0) == 0) }}
            then:
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_1_ladeleistung_einstellen }
                data: { value: "{{ v1_laden }}" }

          - if:
              - condition: template
                value_template: >
                  {{ (states('number.marstek_venus_2_ladeleistung_einstellen') | int(0) - v2_laden) | abs > 15
                     or (target_mode_v2 == 'charge' and states('number.marstek_venus_2_ladeleistung_einstellen') | int(0) == 0) }}
            then:
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_2_ladeleistung_einstellen }
                data: { value: "{{ v2_laden }}" }

      - delay: { milliseconds: 300 }

      # --- 3. ENTLADELEISTUNG (Nur bei Änderung > 10W oder aktivem Entladen) ---
      - parallel:
          - if:
              - condition: template
                value_template: >
                  {{ (states('number.marstek_venus_1_entladeleistung_einstellen') | int(0) - v1_entladen) | abs > 15
                     or (target_mode_v1 == 'discharge' and states('number.marstek_venus_1_entladeleistung_einstellen') | int(0) == 0) }}
            then:
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_1_entladeleistung_einstellen,
                  }
                data: { value: "{{ v1_entladen }}" }

          - if:
              - condition: template
                value_template: >
                  {{ (states('number.marstek_venus_2_entladeleistung_einstellen') | int(0) - v2_entladen) | abs > 15
                     or (target_mode_v2 == 'discharge' and states('number.marstek_venus_2_entladeleistung_einstellen') | int(0) == 0) }}
            then:
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_2_entladeleistung_einstellen,
                  }
                data: { value: "{{ v2_entladen }}" }
