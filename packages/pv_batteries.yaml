################################################################################
################################################################################
################################################################################
template:
  - sensor:
      - name: "Venus 1 Energiefluss Wh"
        unique_id: venus_1_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_1_energiefluss_wh_counter') }}
  - sensor:
      - name: "Venus 2 Energiefluss Wh"
        unique_id: venus_2_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_2_energiefluss_wh_counter') }}

  # ==========================================================
  # 1. Venus Last Full Zeitstempel (Korrigiert)
  # ==========================================================
  - trigger:
      - platform: numeric_state
        entity_id: sensor.marstek_venus_1_batterie_ladezustand
        above: 99
        for: "00:01:00"
    sensor:
      - name: "Venus 1 Last Full"
        unique_id: venus_1_last_full_timestamp
        device_class: timestamp
        # Prüft, ob der Quellsensor eine Zahl ist, sonst bleibt der letzte Wert erhalten
        availability: "{{ is_number(states('sensor.marstek_venus_1_batterie_ladezustand')) }}"
        state: "{{ now() }}"

  - trigger:
      - platform: numeric_state
        entity_id: sensor.marstek_venus_2_batterie_ladezustand
        above: 99
        for: "00:01:00"
    sensor:
      - name: "Venus 2 Last Full"
        unique_id: venus_2_last_full_timestamp
        device_class: timestamp
        availability: "{{ is_number(states('sensor.marstek_venus_2_batterie_ladezustand')) }}"
        state: "{{ now() }}"

  # ==========================================================
  # 2. Venus SOC Reset Punkte
  # ==========================================================
  - trigger:
      # Reagiert nur noch auf den geglätteten Custom SOC, um Bouncing
      # des Hardware-Sensors (99 -> 100 -> 99) zu ignorieren.
      - platform: numeric_state
        entity_id: sensor.venus_1_custom_soc
        above: 99.9
      - platform: numeric_state
        entity_id: sensor.marstek_venus_1_batterie_ladezustand
        above: 99.9
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 1 SOC Reset Punkt"
        unique_id: venus_1_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_1_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_1_soc_reset_punkt') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
          {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}

           {% if hw_soc < 15 %}
            {# Sync auf HW-SOC wenn Batterie fast leer #}
            {{ current_energy - (hw_soc / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# Bei 100% nehmen wir den kleineren Wert (da Energiefluss beim Laden sinkt/negativ ist) #}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - trigger:
      - platform: numeric_state
        entity_id: sensor.venus_2_custom_soc
        above: 99.9
      - platform: numeric_state
        entity_id: sensor.marstek_venus_2_batterie_ladezustand
        above: 99.9
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 2 SOC Reset Punkt"
        unique_id: venus_2_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_2_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_2_soc_reset_punkt') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}
          {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
          {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}

           {% if hw_soc < 15 %}
            {# Sync auf HW-SOC wenn Batterie fast leer #}
            {{ current_energy - (hw_soc / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# Bei 100% nehmen wir den kleineren Wert (da Energiefluss beim Laden sinkt/negativ ist) #}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.venus_1_energiefluss_wh
      - platform: homeassistant
        event: start
      - platform: time_pattern
        # Löst alle 5 Minuten aus (z. B. 08:00, 08:05, 08:10...)
        minutes: "/5"
    sensor:
      - name: "Venus 1 Custom SOC"
        unique_id: venus_1_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(-1) %}
          {% set neu_wh = states('sensor.venus_1_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_1_soc_reset_punkt') | float(none) %}

          {# Wenn Hardware offline oder Sensoren nicht bereit -> alten Zustand beibehalten #}
          {% if hw_soc == -1 or neu_wh is none or reset_wh is none %}
            {{ this.state if this.state is defined else 'unknown' }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set cap_wh = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12) * 1000 %}
                  {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
                  {{ calc_soc | round(1) | clamp(0, 100) }}
               {% endif %}
            {% else %}
              {{ this.state if this.state is defined else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >-
            {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(-1) %}
            {% set neu_wh = states('sensor.venus_1_energiefluss_wh') | float(none) %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh is none or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.venus_2_energiefluss_wh
      - platform: homeassistant
        event: start
      - platform: time_pattern
        # Löst alle 5 Minuten aus (z. B. 08:00, 08:05, 08:10...)
        minutes: "/5"
    sensor:
      - name: "Venus 2 Custom SOC"
        unique_id: venus_2_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(-1) %}
          {% set neu_wh = states('sensor.venus_2_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_2_soc_reset_punkt') | float(none) %}

          {# Wenn Hardware offline oder Sensoren nicht bereit -> alten Zustand beibehalten #}
          {% if hw_soc == -1 or neu_wh is none or reset_wh is none %}
            {{ this.state if this.state is defined else 'unknown' }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set cap_wh = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12) * 1000 %}
                {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
                
                {# Begrenzt den Wert sauber zwischen 0 und 100 und rundet #}
                {{ calc_soc | round(1) | clamp(0, 100) }}
              {% endif %}
            {% else %}
              {{ this.state if this.state is defined else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >-
            {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(-1) %}
            {% set neu_wh = states('sensor.venus_2_energiefluss_wh') | float(none) %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh is none or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "Marstek Free capacity kWh"
        unique_id: marstek_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set cap1 = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12) %}
          {% set cap2 = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12) %}
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(0) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(0) %}

          {{ (cap1 * (1 - (soc1 / 100)) + cap2 * (1 - (soc2 / 100))) | round(2) }}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_number.manuelle_ladeleistung
          - input_boolean.override_soc
          - sensor.dynamic_soc
          - sensor.dynamic_soc_grenzen
          - sensor.hausverbrauch_netto_stabil
          - sensor.venus_1_custom_soc
          - sensor.venus_2_custom_soc
        for:
          seconds: 3
    sensor:
      - name: "Target Charge Distribution fast"
        unique_id: target_charge_distribution_fast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charge = state_attr(this.entity_id, 'charge') %}
          {{ (charge.v1 + charge.v2) | round(0) if charge is mapping else 0 }}
        attributes:
          # Wir speichern das Ergebnis direkt als Objekt (Map), nicht als JSON-String
          charge: >-
            {% set manual = states('input_number.manuelle_ladeleistung') | float(0) %} 
            {% if manual > 0 %}
              {{ {'v1': manual, 'v2': manual} }}
            {% else %}
              {# dupliziere this.state um das aktuelle ergebneis und nicht das letzte zu haben #}
              {# Inline statt this.state um Lag zu vermeiden #}
              {% set total = [0, -(states('sensor.hausverbrauch_netto_watt') | float(0))] | max | round(0) %}
              {% set dyn_soc = states('sensor.dynamic_soc') | float(60) %}

              {% set s1 = states('sensor.venus_1_custom_soc') | float(100)
                    if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 100 %}
              {% set s2 = states('sensor.venus_2_custom_soc') | float(100)
                    if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 100 %}

              {% set limits = state_attr('sensor.max_charge_limits', 'limits') %}
              {% set lim1 = limits.v1 | int(2500) if limits is not none else 2500 %}
              {% set lim2 = limits.v2 | int(2500) if limits is not none else 2500 %}

              {% set w1 = [dyn_soc - s1, 0] | max %}
              {% set w2 = [dyn_soc - s2, 0] | max %}
              {% set sum_w = w1 + w2 %}

              {% if sum_w == 0 %}
                {{ {'v1': 0, 'v2': 0} }}
              {% else %}
                {% set t1 = (w1 / sum_w * total) | round(0) | int %}
                {% set t2 = (total - t1) | int %}

                {# Abwechselnd jede stunde eine andere Batterie laden, wenn im unteren Effizienzbereich #}
                {% if t1 < 200 and t2 < 200 %}
                  {% set odd = (now().isoweekday() + now().hour) % 2 %}
                  {% set t1 = total if odd == 1 else 0 %}
                  {% set t2 = total if odd == 0 else 0 %}
                {% endif %}

                {% if t1 > lim1 and t2 < lim2 %}
                  {{ {'v1': lim1, 'v2': [lim2, t2 + t1 - lim1] | min | round(0)} }}
                {% elif t1 < lim1 and t2 > lim2 %}
                  {{ {'v1': [lim1, t1 + t2 - lim2] | min | round(0), 'v2': lim2} }}
                {% elif t1 > lim1 and t2 > lim2 %}
                  {{ {'v1': lim1, 'v2': lim2} }}
                {% else %}
                  {{ {'v1': t1, 'v2': t2} }}
                {% endif %}
              {% endif %}
            {% endif %}

      - name: "Target Discharge Distribution fast"
        unique_id: target_discharge_distribution_fast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set discharge = state_attr(this.entity_id, 'discharge') %}
          {{ (discharge.v1 + discharge.v2) | round(0) if discharge is mapping else 0 }}
        attributes:
          discharge: >-
            {# Inline statt this.state, um den aktuellen Wert zu haben und kein LAG zu vermeiden #}
            {% set total = [states('sensor.hausverbrauch_netto_watt') | float(0), 0] | max | round(0) %}
            {% set zero = {'v1': 0, 'v2': 0} %}

            {% if total > 0 %}
              {% set min_soc = state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) %}
              {% set w1 = [states('sensor.venus_1_custom_soc') | float(0) - min_soc, 0] | max
                          if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 0 %}
              {% set w2 = [states('sensor.venus_2_custom_soc') | float(0) - min_soc, 0] | max
                          if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 0 %}
              {% set sum_w = w1 + w2 %}

              {% if sum_w == 0 %}
                  {{ zero }}
              {% else %}
                {% set t1 = (w1 / sum_w * total) | round(0) | int %}
                {% set t2 = (total - t1) | int %}

                {% if t1 < 200 and t2 < 200 %}
                  {# Beide kleiner als 250: wechselnde Auswahl #}
                  {# Wochentags-Logik: Montag=1, Dienstag=2, ... Sonntag=7 #}
                  {% set odd = (now().isoweekday() + now().hour) % 2 %}
                  {% set t1 = total if odd == 1 else 0 %}
                  {% set t2 = total if odd == 0 else 0 %}
                {% endif %}

                {{ {'v1': t1, 'v2': t2} }}
              {% endif %}
            {% else %}
              {{ zero }}
            {% endif %}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.dynamic_soc
          - sensor.venus_1_custom_soc
          - sensor.venus_2_custom_soc
          - sensor.solar_zeit_logik
          - sensor.pv_forecast_weighted
        for:
          seconds: 2
    sensor:
      - name: "Max Charge Limits"
        unique_id: max_charge_limits
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% set limits = state_attr(this.entity_id, 'limits') %}
          {{ (limits.v1 + limits.v2) | round(0) if limits is mapping else 0 }}

        attributes:
          limits: >-
            {% set default = {'v1': 2500, 'v2': 2500} %}
            {% set ts = state_attr('sensor.solar_zeit_logik', 'now_ts') | float(0) %}
            {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
            {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
            {% set ziel_soc = states('sensor.dynamic_soc') | float(80) %}

            {% if ts >= t1130 and ts < b_set and ziel_soc < 100 %}
              {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}
              {% set dauer = [(b_set - ts) / 3600, 0.01] | max %}
              {% set fak = capacity / 100 / dauer * 1.25 %}
              {% set soc1 = states('sensor.venus_1_custom_soc') | float(20) %}
              {% set soc2 = states('sensor.venus_2_custom_soc') | float(20) %}
              {% set raw1 = [((ziel_soc - soc1) | clamp(0,100) * fak) | round(0), 2500] | min %}
              {% set raw2 = [((ziel_soc - soc2) | clamp(0,100) * fak) | round(0), 2500] | min %}
              {{ {
                'v1': [raw1, 200] | max if raw1 > 0 else 0,
                'v2': [raw2, 200] | max if raw2 > 0 else 0
              } }}
            {% else %}
              {{ default }}
            {% endif %}

  # für Dashboard
  - sensor:
      - name: "Battery SOC Total"
        unique_id: battery_soc_total
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(-1) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(-1) %}

          {% if soc1 >= 0 and soc2 >= 0 %}
            {{ ((soc1 + soc2) / 2) | round(0) }}
          {% elif soc1 >= 0 %}
            {{ soc1 | round(0) }}
          {% elif soc2 >= 0 %}
            {{ soc2 | round(0) }}
          {% else %}
            {# Fallback auf Hardware, falls Custom SOCs noch unknown sind #}
            {% set hw1 = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
            {% set hw2 = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
            {{ ((hw1 + hw2) / 2) | round(0) }}
          {% endif %}
        availability: >-
          {# Der Sensor ist nur dann verfügbar, wenn mindestens eine Quelle Daten liefert #}
          {{ is_number(states('sensor.venus_1_custom_soc')) or 
              is_number(states('sensor.venus_2_custom_soc')) or
              is_number(states('sensor.marstek_venus_1_batterie_ladezustand')) or
              is_number(states('sensor.marstek_venus_2_batterie_ladezustand')) }}

      - name: "Marstek Batterieleistung Gesamt"
        unique_id: marstek_batterieleistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {# Rohwerte einlesen und sicherheitshalber auf 0 setzen, falls ein Sensor offline ist #}
          {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}
          {{ (venus1 + venus2) | round(0) }}
        availability: >-
          {# Der Sensor ist nur verfügbar, wenn mindestens einer der Quellsensoren einen gültigen Wert liefert #}
          {{ is_number(states('sensor.marstek_venus_1_ac_leistung')) or 
             is_number(states('sensor.marstek_venus_2_ac_leistung')) }}

automation:
  - alias: "Venus 1 Energieintegration"
    mode: queued

    trigger:
      - platform: time_pattern
        seconds: "/10"

    variables:
      power: "{{ states('sensor.marstek_venus_1_ac_leistung') | float(0) }}"
      delta_wh: >-
        {% set delta = power * 10 / 3600 %}
        {% set max_delta = 2500 * 10 / 3600 * 6 %}
        {{ delta if delta < max_delta else 0 }}

    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.venus_1_energiefluss_wh_counter
        data:
          value: >
            {{
              (
                states('input_number.venus_1_energiefluss_wh_counter') | float(0)
                + delta_wh
              ) | round(3)
            }}

  - alias: "Venus 2 Energieintegration"
    mode: queued

    trigger:
      - platform: time_pattern
        seconds: "/10"

    variables:
      power: "{{ states('sensor.marstek_venus_2_ac_leistung') | float(0) }}"
      delta_wh: >-
        {% set delta = power * 10 / 3600 %}
        {% set max_delta = 2500 * 10 / 3600 * 6 %}
        {{ delta if delta < max_delta else 0 }}

    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.venus_2_energiefluss_wh_counter
        data:
          value: >
            {{
              (
                states('input_number.venus_2_energiefluss_wh_counter') | float(0)
                + delta_wh
              ) | round(3)
            }}

  - alias: "Sende Lade und Entladebefehle an Hardware"
    id: "sende_batterie_targets_v2"
    mode: restart
    #max: 3
    trigger:
      - platform: state
        entity_id: sensor.hausverbrauch_netto_stabil
      - platform: state
        entity_id: sensor.target_charge_distribution_fast
      - platform: state
        entity_id: sensor.target_discharge_distribution_fast
      - platform: state
        entity_id: input_boolean.override_soc
        for:
          seconds: 3
    action:
      - delay: # ← Debounce: wartet ob noch mehr Trigger kommen
          milliseconds: 500

      - variables:
          v1_laden: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set c = c if c is mapping else {} %}
            {% set c1 = c.v1 | default(0) | int(0) %}
            {{ [c1, 2500] | min if c1 >= 20 else 0 }}

          v1_entladen: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set d = state_attr('sensor.target_discharge_distribution_fast', 'discharge') %}
            {% set c = c if c is mapping else {} %}
            {% set d = d if d is mapping else {} %}
            {% set c1 = c.v1 | default(0) | int(0) %}
            {% set d1 = d.v1 | default(0) | int(0) %}
            {{ [d1, 2500] | min if d1 >= 20 and c1 < 20 else 0 }}

          v2_laden: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set c = c if c is mapping else {} %}
            {% set c2 = c.v2 | default(0) | int(0) %}
            {{ [c2, 2500] | min if c2 >= 20 else 0 }}

          v2_entladen: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set d = state_attr('sensor.target_discharge_distribution_fast', 'discharge') %}
            {% set c = c if c is mapping else {} %}
            {% set d = d if d is mapping else {} %}
            {% set c2 = c.v2 | default(0) | int(0) %}
            {% set d2 = d.v2 | default(0) | int(0) %}
            {{ [d2, 2500] | min if d2 >= 20 and c2 < 20 else 0 }}

          target_mode_v1: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set d = state_attr('sensor.target_discharge_distribution_fast', 'discharge') %}
            {% set c = c if c is mapping else {} %}
            {% set d = d if d is mapping else {} %}
            {% set c1 = c.v1 | default(0) | int(0) %}
            {% set d1 = d.v1 | default(0) | int(0) %}
            {% if c1 >= 20 %}charge{% elif d1 >= 20 %}discharge{% else %}standby{% endif %}

          target_mode_v2: >-
            {% set c = state_attr('sensor.target_charge_distribution_fast', 'charge') %}
            {% set d = state_attr('sensor.target_discharge_distribution_fast', 'discharge') %}
            {% set c = c if c is mapping else {} %}
            {% set d = d if d is mapping else {} %}
            {% set c2 = c.v2 | default(0) | int(0) %}
            {% set d2 = d.v2 | default(0) | int(0) %}
            {% if c2 >= 20 %}charge{% elif d2 >= 20 %}discharge{% else %}standby{% endif %}

          # Sicherheitscheck: Verhindert nur, dass eine lädt während die andere entlädt.
          # Wenn eine auf 'standby' steht und die andere arbeitet, ist das erlaubt.
          target_mode_v1_safe: >-
            {% if (target_mode_v1 == 'charge' and target_mode_v2 == 'discharge') or (target_mode_v1 == 'discharge' and target_mode_v2 == 'charge') %}
              stop
            {% else %}
              {{ target_mode_v1 }}
            {% endif %}

          target_mode_v2_safe: >-
            {% if (target_mode_v1 == 'charge' and target_mode_v2 == 'discharge') or (target_mode_v1 == 'discharge' and target_mode_v2 == 'charge') %}
              stop
            {% else %}
              {{ target_mode_v2 }}
            {% endif %}

      - parallel:
          # --- Venus 1 komplett ---
          - sequence:
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_1_force_mode') != target_mode_v1_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_1_force_mode }
                    data: { option: "{{ target_mode_v1_safe }}" }
                  - delay:
                      milliseconds: 200 # Kurze Pause für die Verarbeitung
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_1_ladeleistung_einstellen }
                data: { value: "{{ v1_laden }}" }
              - delay:
                  milliseconds: 200
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_1_entladeleistung_einstellen,
                  }
                data: { value: "{{ v1_entladen }}" }

          - delay:
              milliseconds: 10

          # --- Venus 2 komplett ---
          - sequence:
              - delay:
                  milliseconds: 150 # start venus 2 a tad later
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_2_force_mode') != target_mode_v2_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_2_force_mode }
                    data: { option: "{{ target_mode_v2_safe }}" }
                  - delay:
                      milliseconds: 200 # Kurze Pause für die Verarbeitung
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_2_ladeleistung_einstellen }
                data: { value: "{{ v2_laden }}" }
              - delay:
                  milliseconds: 200
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_2_entladeleistung_einstellen,
                  }
                data: { value: "{{ v2_entladen }}" }
