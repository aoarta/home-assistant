# packages/pv_batteries.yaml

sensor:
  # DB
  - platform: filter
    name: "Marstek Venus 1 AC Leistung glatt"
    unique_id: marstek_venus_1_ac_leistung_glatt
    entity_id: sensor.marstek_venus_1_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 5 # Glättet über ca. 5 Messwerte (ca. 5-10 Sek. Trägheit)
        precision: 0 # Rundet auf eine Nachkommastelle
      - filter: time_throttle
        window_size: "00:00:30" # Schreibt nur alle 30 Sekunden einen Wert in die DB

  # DB
  - platform: filter
    name: "Marstek Venus 2 AC Leistung glatt"
    unique_id: marstek_venus_2_ac_leistung_glatt
    entity_id: sensor.marstek_venus_2_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 5 # Glättet über ca. 5 Messwerte (ca. 5-10 Sek. Trägheit)
        precision: 0 # Rundet auf eine Nachkommastelle
      - filter: time_throttle
        window_size: "00:00:30" # Schreibt nur alle 30 Sekunden einen Wert in die DB

  - platform: integration
    source: sensor.marstek_venus_1_ac_leistung # positiv ist entladen
    name: "Venus 1 Energiefluss Wh"
    unique_id: marstek_venus_1_energiefluss_wh
    round: 0
    method: left

  - platform: integration
    source: sensor.marstek_venus_2_ac_leistung # positiv ist entladen
    name: "Venus 2 Energiefluss Wh"
    unique_id: marstek_venus_2_energiefluss_wh
    round: 0
    method: left

  - platform: filter
    name: "Target Charge Distribution"
    unique_id: target_charge_distribution
    entity_id: sensor.target_charge_distribution_fast
    scan_interval: 300
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 1

  - platform: filter
    name: "Target Discharge Distribution"
    unique_id: target_discharge_distribution
    entity_id: sensor.target_discharge_distribution_fast
    scan_interval: 300
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 1

