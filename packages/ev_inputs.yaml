# ============================================================
# PV surplus wallbox charging (WARP3) - Inputs
# ============================================================

input_select:
  ev_vehicle_mode:
    name: "EV Vehicle Mode"
    options:
      - "off"
      - "zero"
      - "honda_e"
    initial: "off"
    icon: mdi:car-electric

  ev_charge_mode:
    name: "EV Charge Mode"
    options:
      - "pv_shared_50_50" # 3. PV-Überschuss Fahrzeug-Batterie halbe/halbe
      - "pv_ev_first" # 1. PV-Überschuss Fahrzeug priorisiert
      - "pv_battery_first" # 2. PV-Überschuss Batterien priorisiert
      - "min_6a_floor_battery" # 4. Min. 1.3kW (6A), Max aus PV, Batterie-Schutz aktiv
      - "min_6a_floor_grid" # 5. Min. 1.3kW (6A), Max aus PV, ohne Batterie-Schutz
    initial: "pv_ev_first"
    icon: mdi:ev-station

input_number:
  ev_manual_charging_current:
    name: "EV Manual Charging Current (0 = Automatic)"
    initial: 0
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:car-speed-limiter

  ev_charge_percent:
    name: "EV Charge Target (% of battery)"
    initial: 50
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging-50

  ev_session_start_energy_kwh:
    name: "EV Session Start Energy (snapshot)"
    min: 0
    max: 9999999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:counter
