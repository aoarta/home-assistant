#########
## Die Control-Logik: Das Setzen des dynamischen SOC
#########

input_boolean:
  override_soc:
    name: "Manueller SOC Override"
    icon: mdi:battery-lock
    initial: false

template:
  - sensor:
      - name: "Solar Zeit-Logik"
        unique_id: solar_zeit_logik
        availability: "{{ state_attr('sun.sun', 'next_setting') is not none }}"
        state: >-
          {% set ts = as_timestamp(now()) %}
          {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) | default(0) %}
          {% set sr = as_timestamp(state_attr('sun.sun', 'next_rising')) | default(0) %}
          {% set today_sr = sr - 86400 if sr > ts else sr %}
          {% set today_ss = ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss %}
          {{ 'Tag' if today_sr <= ts <= today_ss else 'Nacht' }}
        attributes:
          now_ts: "{{ as_timestamp(now()) }}"
          sun_rise: "{{ as_timestamp(state_attr('sun.sun', 'next_rising')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_rising')) > as_timestamp(now()) else as_timestamp(state_attr('sun.sun', 'next_rising')) }}"
          sun_set: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_setting')) > as_timestamp(now().replace(hour=23, minute=59)) else as_timestamp(state_attr('sun.sun', 'next_setting')) }}"
          t1130: "{{ as_timestamp(now().replace(hour=11, minute=30, second=0, microsecond=0)) }}"
          b_set: >-
            {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
            {{ (ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss) - 3*3600 }}

      - name: "Dynamic SOC Grenzen"
        unique_id: dynamic_soc_grenzen
        state: "OK"
        attributes:
          min: "10"
          low: "{{ 60 if not is_state('input_boolean.override_soc', 'on') else 101 }}"
          mid: "{{ 80 if not is_state('input_boolean.override_soc', 'on') else 101 }}"
          max: "100.5"
          high: >-
            {% if is_state('input_boolean.override_soc', 'on') %}
              101
            {% else %}
              {% set prognose_morgen = states('sensor.pv_forecast_weighted_morgen') | float(0) %}
              {% set expected_need_tomorrow = 1.5 * states('sensor.hausverbrauch_energie_gestern_2345') | float(15) %}
              {% if prognose_morgen > expected_need_tomorrow %}
                85
              {% else %}
                103
              {% endif %}
            {% endif %}

      - name: "Batterieleistung gesamt"
        unique_id: batterieleistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}
          {% set ups = states('sensor.ups_ac_leistung') | float(0) %}
          {{ (venus1 + venus2 + ups) | round(0) }}

  # 2. Trigger-basierte Sensoren
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - input_number.manuelle_ladeleistung
          - input_boolean.override_soc
          - sensor.dynamic_soc_grenzen
          - binary_sensor.batterie_wartung_erforderlich
          - sensor.pv_forecast_weighted
          - sensor.expected_need_today
          - sensor.solar_zeit_logik

    sensor:
      - name: "Dynamic SOC"
        unique_id: dynamic_soc
        unit_of_measurement: "%"
        state: >-
          {% if states('input_number.manuelle_ladeleistung') | float(0) > 0 %}
            110
          {% elif is_state('binary_sensor.batterie_wartung_erforderlich', 'on') %}
            120
          {% else %}
            {% set solar_today = states('sensor.pv_forecast_weighted') | float(-1) %}
            {% set expected_need_today = states('sensor.expected_need_today') | float(0) %}

            {% if solar_today > 1.2 * expected_need_today or solar_today == -1 %}
              {% set ts = as_timestamp(now()) %} 
              {% set s_rise = state_attr('sensor.solar_zeit_logik', 'sun_rise') | float(0) %}
              {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
              {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
              {% set s_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}

              {% if ts < s_rise %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
              {% elif ts < t1130 %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'low') | float(60) }}
              {% elif ts < b_set %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'mid') | float(80) }}
              {% elif ts < s_set %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'high') | float(100) }}
              {% else %}
                {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
              {% endif %}
            {% else %}
              130
            {% endif %}
          {% endif %}

  - binary_sensor:
      - name: "Batterie Wartung Erforderlich"
        unique_id: batterie_wartung_erforderlich
        state: >-
          {% set v1_last = states('sensor.venus_1_last_full') %}
          {% set v2_last = states('sensor.venus_2_last_full') %}
          {% set ups_last = states('sensor.ups_last_full') %}

          {% set days = state_attr('sensor.zentrale_parameter', 'battery_care_days') | float(5) %}
          {% set threshold = days * 86400 %} {# in Sekunden #}
          {% set now_ts = as_timestamp(now()) %}

          {% set v1_age = (now_ts - as_timestamp(v1_last)) if has_value('sensor.venus_1_last_full') else 9999999 %}
          {% set v2_age = (now_ts - as_timestamp(v2_last)) if has_value('sensor.venus_2_last_full') else 9999999 %}
          {% set ups_age = (now_ts - as_timestamp(ups_last)) if has_value('sensor.ups_last_full') else 9999999 %}

          {{ v1_age > threshold or v2_age > threshold or ups_age > threshold}}
        attributes:
          v1_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('sensor.venus_1_last_full'))) / 86400) | int if has_value('sensor.venus_1_last_full') else '?' }}"
          v2_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('sensor.venus_2_last_full'))) / 86400) | int if has_value('sensor.venus_2_last_full') else '?' }}"
          ups_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('sensor.ups_last_full'))) / 86400) | int if has_value('sensor.ups_last_full') else '?' }}"
