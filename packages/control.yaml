# packages/control.yaml

#########
## The Control Logic: Setting the Dynamic SOC
#########

input_boolean:
  override_soc:
    name: "Manual SOC Override"
    icon: mdi:battery-lock

input_number:
  takt_interval_sekunden:
    min: 1
    max: 300
    step: 1

input_datetime:
  takt_base:
    has_date: true
    has_time: true

template:
  - sensor:
      - name: "Tick"
        unique_id: takt
        device_class: timestamp
        state: >
          {{ as_timestamp(states('input_datetime.takt_base'), 0) | timestamp_utc }}

      - name: "Solar Time Logic"
        unique_id: solar_zeit_logik
        availability: "{{ state_attr('sun.sun', 'next_setting') is not none }}"
        state: >-
          {% set ts = as_timestamp(now()) %}
          {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) | default(0) %}
          {% set sr = as_timestamp(state_attr('sun.sun', 'next_rising')) | default(0) %}
          {% set today_sr = sr - 86400 if sr > ts else sr %}
          {% set today_ss = ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss %}
          {{ 'Day' if today_sr <= ts <= today_ss else 'Night' }}
        attributes:
          now_ts: "{{ as_timestamp(now()) }}"
          sun_rise: "{{ as_timestamp(state_attr('sun.sun', 'next_rising')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_rising')) > as_timestamp(now()) else as_timestamp(state_attr('sun.sun', 'next_rising')) }}"
          sun_set: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_setting')) > as_timestamp(now().replace(hour=23, minute=59)) else as_timestamp(state_attr('sun.sun', 'next_setting')) }}"
          t1130: "{{ as_timestamp(now().replace(hour=11, minute=30, second=0, microsecond=0)) }}"
          sun_set_minus_3h: >-
            {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
            {{ (ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss) - 3*3600 }}

      - name: "Dynamic SOC Limits"
        unique_id: dynamic_soc_grenzen
        state: "OK"
        attributes:
          min: "10"
          low: "60"
          mid: "80"
          high: "90"
          max: "100.5"

      - name: "Battery AC Power total"
        unique_id: battery_ac_power_total
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set venus1 = states('sensor.marstek_venus_1_ac_power') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_power') | float(0) %}
          {% set ups = states('sensor.ups_ac_power') | float(0) %}
          {{ (venus1 + venus2 + ups) | round(0) }}

      - name: "Target SOC Status"
        unique_id: target_soc_status
        icon: mdi:battery-clock
        state: >-
          {% set t = states('sensor.target_soc') | int(-1) %}
          {% if t == 101 %}
            Manual override active — charging to 100%
          {% elif t == 110 %}
            Manual charge power set — target ignored
          {% elif t == 120 %}
            Battery maintenance cycle — charging to 100%
          {% elif t == 130 %}
            Today's energy balance negative — charging to 100% now
          {% elif t == 131 %}
            Tomorrow's energy balance negative — charging to 100%
          {% elif t == 133 %}
            Day after tomorrow's energy balance negative — charging to 100%
          {% else %}
            {% set dynamic = states('sensor.dynamic_soc') | float(0) %}
            {% set grenzen_max = state_attr('sensor.dynamic_soc_grenzen', 'max') | float(100.5) %}
            {% if t | float(-1) == grenzen_max %}
              PV surplus insufficient for dynamic target — cap opened to max
            {% elif t == dynamic | int %}
              Following dynamic schedule — target {{ t }}%
            {% else %}
              Unknown state ({{ t }})
            {% endif %}
          {% endif %}
        attributes:
          target_soc_raw: "{{ states('sensor.target_soc') | int(-1) }}"
          dynamic_soc: "{{ states('sensor.dynamic_soc') | float(0) }}"
          override_active: "{{ is_state('input_boolean.override_soc', 'on') }}"
          maintenance_active: "{{ is_state('binary_sensor.battery_maintenance_required', 'on') }}"

  # 2. Trigger-based sensors
  - triggers:
      - trigger: time_pattern
        minutes: "/2"
      - trigger: state
        entity_id:
          - input_number.manual_charge_power
          - input_boolean.override_soc
          - binary_sensor.battery_maintenance_required
          - sensor.pv_forecast_weighted
          - sensor.pv_forecast_weighted_tomorrow
          - sensor.pv_forecast_weighted_day_after
          - sensor.pv_energy_yield_today_um
          - sensor.expected_daily_consumption
          - sensor.expected_daily_consumption_tomorrow
          - sensor.expected_daily_consumption_day_after
          - sensor.house_consumption_energy_today
          - sensor.dynamic_soc
    sensor:
      - name: "Remaining PV Today"
        unique_id: remaining_pv_today
        unit_of_measurement: "kWh"
        state: >-
          {% set pv_forecast_today = states('sensor.pv_forecast_weighted') | float(0) %}
          {{ ([0, pv_forecast_today] | max) | round(2) }}

      - name: "Remaining Consumption Today"
        unique_id: remaining_consumption_today
        unit_of_measurement: "kWh"
        state: >-
          {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
          {% set hausverbrauch_heute = states('sensor.house_consumption_energy_today') | float(0) %}
          {{ ([0, expected_daily_consumption - hausverbrauch_heute] | max) | round(2) }}

      - name: "Target SOC"
        unique_id: target_soc
        unit_of_measurement: "%"
        state: >-
          {% if is_state('input_boolean.override_soc', 'on') %}
            101
          {% elif states('input_number.manual_charge_power') | float(0) > 0 %}
            110
          {% elif is_state('binary_sensor.battery_maintenance_required', 'on') %}
            120
          {% else %}
            {# === Usable energy in battery (discharge capacity, incl. safety margin) === #}
            {% set usable_energy = states('sensor.marstek_usable_energy') | float(0) %}

            {# === Max storable energy (battery cap) === #}
            {% set max_storage = state_attr('sensor.global_parameter', 'max_usable_energy') | float(10) %}

            {# === Safety factors === #}
            {% set pv_factor = 0.85 %}
            {% set consumption_buffer = 1%}

            {# === Today (remaining) === #}
            {% set pv_forecast_today = states('sensor.pv_forecast_weighted') | float(0) %}
            {% set pv_yield_today = states('sensor.pv_energy_yield_today_um') | float(0) %}
            {#{% set pv_remaining_today = ([0, pv_forecast_today - pv_yield_today] | max) * pv_factor %}#}  
            {% set pv_remaining_today = pv_forecast_today %}
            {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
            {% set consumption_today = states('sensor.house_consumption_energy_today') | float(0) %}

            {# Static estimate: learned daily bucket minus what's already used this cycle #}
            {% set consumption_static = [0, expected_daily_consumption - consumption_today] | max %}
            {# Live estimate: current 1h-avg power projected to next sunrise (same window) #}
            {% set consumption_live = states('sensor.estimated_remaining_consumption') | float(none) %}
            {# Blend both (fallback to static if live is unavailable), then apply the buffer #}
            {% set consumption_blended = (0.5 * consumption_static + 0.5 * consumption_live)
                                          if consumption_live is not none else consumption_static %}
            {% set consumption_remaining_today = consumption_blended * consumption_buffer %}

            {# === Tomorrow === #}
            {% set pv_tomorrow = states('sensor.pv_forecast_weighted_tomorrow') | float(0) * pv_factor %}
            {% set consumption_tomorrow = states('sensor.expected_daily_consumption_tomorrow') | float(expected_daily_consumption) * consumption_buffer %}

            {# === Day after tomorrow === #}
            {% set pv_day_after = states('sensor.pv_forecast_weighted_day_after') | float(0) * pv_factor %}
            {% set consumption_day_after = states('sensor.expected_daily_consumption_day_after') | float(expected_daily_consumption) * consumption_buffer %}

            {# === Rolling balance: simulate battery state over the next days === #}
            {% set balance_today = [usable_energy + pv_remaining_today - consumption_remaining_today, max_storage] | min %}
            {% set balance_tomorrow = [balance_today + pv_tomorrow - consumption_tomorrow, max_storage] | min %}
            {% set balance_day_after = [balance_tomorrow + pv_day_after - consumption_day_after, max_storage] | min %}

            {# === Decision: most urgent shortfall wins === #}
            {% if balance_today < 0 %}
              130   {# Today's energy insufficient — charge to 100% now #}
            {% elif balance_tomorrow < 0 %}
              131   {# Tomorrow will fall short #}
            {% elif balance_day_after < 0 %}
              133   {# Day after tomorrow will fall short #}
            {% else %}
              {# No multi-day shortfall — normally follow the dynamic schedule.        #}
              {# But: if today's remaining PV surplus cannot lift the battery to the   #}
              {# dynamic target, open the cap to maximum to capture every available    #}
              {# Wh instead of exporting it.                                           #}
              {% set target = states('sensor.dynamic_soc') | float(50) %}

              {# Energy still chargeable into the battery from today's PV (after house load) #}
              {% set chargeable_pv = [0, pv_remaining_today - consumption_remaining_today] | max %}
              {% set projected_energy = usable_energy + chargeable_pv %}

              {# Energy level the dynamic target corresponds to #}
              {% set target_energy = (target / 100) * max_storage %}

              {% if projected_energy < target_energy %}
                {#{{ state_attr('sensor.dynamic_soc_grenzen', 'max') }}#}
                {{ target }}
              {% else %}
                {{ target }}
              {% endif %}
            {% endif %}

          {% endif %}

  - triggers:
      - trigger: time_pattern
        minutes: "/2"
    sensor:
      - name: "Dynamic SOC"
        unique_id: dynamic_soc
        unit_of_measurement: "%"
        state: >-
          {% set ts = as_timestamp(now()) %}
          {% set s_rise = state_attr('sensor.solar_zeit_logik', 'sun_rise') | float(0) %}
          {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
          {% set sun_set_minus_3h = state_attr('sensor.solar_zeit_logik', 'sun_set_minus_3h') | float(0) %}
          {% set s_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}

          {% if ts < s_rise %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
          {% elif ts < t1130 %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'low') | float(60) }}
          {% elif ts < sun_set_minus_3h %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'mid') | float(90) }}
          {% elif ts < s_set %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'high') | float(100) }}
          {% else %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
          {% endif %}

  - binary_sensor:
      - name: "Battery Maintenance Required"
        unique_id: battery_maintenance_required
        state: >-
          {% set v1_last = states('input_datetime.venus_1_last_full') %}
          {% set v2_last = states('input_datetime.venus_2_last_full') %}
          {% set ups_last = states('input_datetime.ups_last_full') %}

          {% set days = state_attr('sensor.global_parameter', 'battery_care_days') | float(5) %}
          {% set threshold = days * 86400 %} {# in seconds #}
          {% set now_ts = as_timestamp(now()) %}

          {# Fallback to 0 to avoid false triggers on restarts/connection drops.
             as_timestamp also secured with default value (now_ts). #}
          {% set v1_age = (now_ts - as_timestamp(v1_last, now_ts)) if has_value('input_datetime.venus_1_last_full') else 0 %}
          {% set v2_age = (now_ts - as_timestamp(v2_last, now_ts)) if has_value('input_datetime.venus_2_last_full') else 0 %}
          {% set ups_age = (now_ts - as_timestamp(ups_last, now_ts)) if has_value('input_datetime.ups_last_full') else 0 %}

          {{ v1_age > threshold or v2_age > threshold or ups_age > threshold }}
        attributes:
          # as_timestamp also secured with default (0) here to avoid log errors
          v1_days: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.venus_1_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.venus_1_last_full') else '?' }}"
          v2_days: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.venus_2_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.venus_2_last_full') else '?' }}"
          ups_days: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.ups_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.ups_last_full') else '?' }}"

automation:
  - alias: "Tick Engine"
    mode: single

    triggers:
      - trigger: time_pattern
        seconds: "/1"

    conditions:
      - condition: template
        value_template: >
          {% set interval = states('input_number.takt_interval_sekunden') | int(10) %}
          {% set last = as_timestamp(states('input_datetime.takt_base')) %}
          {{ as_timestamp(now()) - last >= interval }}

    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.takt_base
        data:
          datetime: "{{ now().isoformat() }}"
