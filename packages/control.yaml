#########
## Die Control-Logik: Das Setzen des dynamischen SOC
#########

input_boolean:
  override_soc:
    name: "Manueller SOC Override"
    icon: mdi:battery-lock

input_number:
  takt_interval_sekunden:
    min: 1
    max: 300
    step: 1

input_datetime:
  takt_anker:
    has_date: true
    has_time: true

template:
  - sensor:
      - name: "Takt"
        unique_id: takt
        device_class: timestamp
        state: >
          {{ states('input_datetime.takt_anker') |  timestamp_utc  }}

      - name: "Solar Zeit-Logik"
        unique_id: solar_zeit_logik
        availability: "{{ state_attr('sun.sun', 'next_setting') is not none }}"
        state: >-
          {% set ts = as_timestamp(now()) %}
          {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) | default(0) %}
          {% set sr = as_timestamp(state_attr('sun.sun', 'next_rising')) | default(0) %}
          {% set today_sr = sr - 86400 if sr > ts else sr %}
          {% set today_ss = ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss %}
          {{ 'Tag' if today_sr <= ts <= today_ss else 'Nacht' }}
        attributes:
          now_ts: "{{ as_timestamp(now()) }}"
          sun_rise: "{{ as_timestamp(state_attr('sun.sun', 'next_rising')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_rising')) > as_timestamp(now()) else as_timestamp(state_attr('sun.sun', 'next_rising')) }}"
          sun_set: "{{ as_timestamp(state_attr('sun.sun', 'next_setting')) - 86400 if as_timestamp(state_attr('sun.sun', 'next_setting')) > as_timestamp(now().replace(hour=23, minute=59)) else as_timestamp(state_attr('sun.sun', 'next_setting')) }}"
          t1130: "{{ as_timestamp(now().replace(hour=11, minute=30, second=0, microsecond=0)) }}"
          b_set: >-
            {% set ss = as_timestamp(state_attr('sun.sun', 'next_setting')) %}
            {{ (ss - 86400 if ss > as_timestamp(now().replace(hour=23, minute=59)) else ss) - 3*3600 }}

      - name: "Dynamic SOC Grenzen"
        unique_id: dynamic_soc_grenzen
        state: "OK"
        attributes:
          min: "10"
          low: "60"
          mid: "80"
          high: "85"
          max: "100.5"

      - name: "Batterieleistung gesamt"
        unique_id: batterieleistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}
          {% set ups = states('sensor.ups_ac_leistung') | float(0) %}
          {{ (venus1 + venus2 + ups) | round(0) }}

  # 2. Trigger-basierte Sensoren
  - trigger:
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id:
          - input_number.manuelle_ladeleistung
          - input_boolean.override_soc
          - binary_sensor.batterie_wartung_erforderlich
          - sensor.pv_forecast_weighted
          - sensor.pv_forecast_weighted_morgen
          - sensor.pv_forecast_ml_ubermorgen
          - sensor.pv_ertrag_heute_um
          - sensor.expected_daily_consumption
          - sensor.expected_daily_consumption_tomorrow
          - sensor.expected_daily_consumption_day_after
          - sensor.hausverbrauch_energie_heute
          - sensor.dynamic_soc
    sensor:
      - name: "Rest PV Heute"
        unique_id: rest_pv_heute
        unit_of_measurement: "kWh" # Falls deine Sensoren Wh liefern, hier anpassen
        state: >-
          {% set pv_forecast_today = states('sensor.pv_forecast_weighted') | float(0) %}
          {% set pv_ertrag_heute = states('sensor.pv_ertrag_heute_um') | float(0) %}
          {{ ([0, pv_forecast_today - pv_ertrag_heute] | max) | round(2) }}

      - name: "Rest Verbrauch Heute"
        unique_id: rest_verbrauch_heute
        unit_of_measurement: "kWh"
        state: >-
          {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
          {% set hausverbrauch_heute = states('sensor.hausverbrauch_energie_heute') | float(0) %}
          {{ ([0, expected_daily_consumption - hausverbrauch_heute] | max) | round(2) }}

      - name: "Target SOC"
        unique_id: target_soc
        unit_of_measurement: "%"
        state: >-
          {% if is_state('input_boolean.override_soc', 'on') %}
            101
          {% elif states('input_number.manuelle_ladeleistung') | float(0) > 0 %}
            110
          {% elif is_state('binary_sensor.batterie_wartung_erforderlich', 'on') %}
            120
          {% else %}
            {% set pv_forecast_today = states('sensor.pv_forecast_weighted') | float(0) %}
            {% set pv_ertrag_heute = states('sensor.pv_ertrag_heute_um') | float(0) %}

            {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
            {% set hausverbrauch_heute = states('sensor.hausverbrauch_energie_heute') | float(0) %}

            {# Variablen für Morgen #}
            {% set pv_forecast_tomorrow = states('sensor.pv_forecast_weighted_morgen') | float(0) %}
            {% set expected_daily_consumption_tomorrow = states('sensor.expected_daily_consumption_tomorrow') | float(expected_daily_consumption) %}

            {# Variablen für Übermorgen #}
            {% set pv_forecast_uebermorgen = states('sensor.pv_forecast_ml_ubermorgen') | float(0) %}
            {% set expected_daily_consumption_uebermorgen = states('sensor.expected_daily_consumption_day_after') | float(expected_daily_consumption) %}

            {# Berechnung der Restwerte für heute (nicht kleiner als 0) #}
            {% set rest_pv_heute = ([0, pv_forecast_today - pv_ertrag_heute] | max) %}
            {% set rest_verbrauch_heute = ([0, expected_daily_consumption - hausverbrauch_heute] | max) %}

            {# Summen-Check #}
            {% set sum_pv_3tage = rest_pv_heute + pv_forecast_tomorrow + pv_forecast_uebermorgen %}
            {% set sum_verbrauch_3tage = rest_verbrauch_heute + expected_daily_consumption_tomorrow + expected_daily_consumption_uebermorgen %}

            {% if sum_pv_3tage < sum_verbrauch_3tage %}
              {# Wenn die nächsten 3 Tage insgesamt nicht reichen #}
              133
            {% elif pv_forecast_tomorrow < expected_daily_consumption_tomorrow %}
              {# Wenn morgen alleine nicht reicht #}
              131
            {% elif rest_pv_heute < rest_verbrauch_heute %}
              {# Wenn der heutige Rest-Tag nicht reicht #}
              130
            {% else %}
              {{ states('sensor.dynamic_soc') | default(10, true) }}
            {% endif %}
          {% endif %}

  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Dynamic SOC"
        unique_id: dynamic_soc
        unit_of_measurement: "%"
        state: >-
          {% set ts = as_timestamp(now()) %} 
          {% set s_rise = state_attr('sensor.solar_zeit_logik', 'sun_rise') | float(0) %}
          {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
          {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
          {% set s_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}

          {% if ts < s_rise %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
          {% elif ts < t1130 %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'low') | float(60) }}
          {% elif ts < b_set %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'mid') | float(80) }}
          {% elif ts < s_set %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'high') | float(100) }}
          {% else %}
            {{ state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) }}
          {% endif %}

  - binary_sensor:
      - name: "Batterie Wartung Erforderlich"
        unique_id: batterie_wartung_erforderlich
        state: >-
          {% set v1_last = states('input_datetime.venus_1_last_full') %}
          {% set v2_last = states('input_datetime.venus_2_last_full') %}
          {% set ups_last = states('input_datetime.ups_last_full') %}

          {% set days = state_attr('sensor.zentrale_parameter', 'battery_care_days') | float(5) %}
          {% set threshold = days * 86400 %} {# in Sekunden #}
          {% set now_ts = as_timestamp(now()) %}

          {# Fallback auf 0 Sekunden gesetzt, um Fehlauslösungen bei Neustarts/Verbindungsabbrüchen zu vermeiden. Zudem as_timestamp mit Default-Wert (now_ts) abgesichert. #}
          {% set v1_age = (now_ts - as_timestamp(v1_last, now_ts)) if has_value('input_datetime.venus_1_last_full') else 0 %}
          {% set v2_age = (now_ts - as_timestamp(v2_last, now_ts)) if has_value('input_datetime.venus_2_last_full') else 0 %}
          {% set ups_age = (now_ts - as_timestamp(ups_last, now_ts)) if has_value('input_datetime.ups_last_full') else 0 %}

          {{ v1_age > threshold or v2_age > threshold or ups_age > threshold }}
        attributes:
          # Hier ebenfalls as_timestamp mit Default (0) versehen, um Log-Fehler zu vermeiden
          v1_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.venus_1_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.venus_1_last_full') else '?' }}"
          v2_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.venus_2_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.venus_2_last_full') else '?' }}"
          ups_tage: "{{ ((as_timestamp(now()) - as_timestamp(states('input_datetime.ups_last_full'), as_timestamp(now()))) / 86400) | int if has_value('input_datetime.ups_last_full') else '?' }}"

automation:
  - alias: "Takt Engine"
    mode: single

    trigger:
      - platform: time_pattern
        seconds: "/1"

    condition:
      - condition: template
        value_template: >
          {% set interval = states('input_number.takt_interval_sekunden')|int(10) %}
          {% set last = as_timestamp(states('input_datetime.takt_anker')) %}
          {{ as_timestamp(now()) - last >= interval }}

    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.takt_anker
        data:
          datetime: "{{ now().isoformat() }}"
