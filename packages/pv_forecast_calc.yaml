# packages/pv_forecast_calc.yaml
template:
  - sensor:
      - name: "PV Forecast Solcast all"
        unique_id: pv_forecast_solcast_all
        unit_of_measurement: "kWh"
        availability: "{{ is_number(states('sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute')) }}"
        state: "{{ states('sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute') | float(0) | round(1) }}"

      - name: "PV Height Correction Factor"
        unique_id: pv_height_correction_factor
        unit_of_measurement: ""
        state: "1.053"

      - name: "PV Albedo Correction Factor"
        unique_id: pv_albedo_correction_factor
        unit_of_measurement: ""
        state: >-
          {% set month = now().month %}
          {% if month in [12, 1, 2, 3] %}
            1.1
          {% elif month in [4, 5, 10, 11] %}
            1.05
          {% else %}
            1.0
          {% endif %}

      - name: "PV Total Correction Factor"
        unique_id: pv_total_correction_factor
        unit_of_measurement: ""
        state: >-
          {{ (states('sensor.pv_height_correction_factor') | float(1)) *
             (states('sensor.pv_albedo_correction_factor') | float(1)) | round(3) }}

  - trigger:
      - trigger: time_pattern
        minutes: "/5"
    variables:
      r_reg: 0.1
      bias: "{{ states('input_number.pv_forecast_bias_korrekturfaktor') | float(1) }}"
      total_correction: "{{ states('sensor.pv_total_correction_factor') | float(1) }}"

      bw_sc: "{{ (states('input_number.pv_kalman_score_solcast') | float(0)) / (states('input_number.pv_kalman_r_solcast') | float(0.1) + r_reg) }}"
      bw_sp: "{{ (states('input_number.pv_kalman_score_solarprognose') | float(0)) / (states('input_number.pv_kalman_r_solarprognose') | float(0.1) + r_reg) }}"
      bw_fs: "{{ (states('input_number.pv_kalman_score_forecastsolar') | float(0)) / (states('input_number.pv_kalman_r_forecastsolar') | float(0.1) + r_reg) }}"
      bw_om: "{{ (states('input_number.pv_kalman_score_openmeteo') | float(0)) / (states('input_number.pv_kalman_r_openmeteo') | float(0.1) + r_reg) }}"
      bw_dw: "{{ (states('input_number.pv_kalman_score_dwd') | float(0)) / (states('input_number.pv_kalman_r_dwd') | float(0.1) + r_reg) }}"

      sc_today: "{{ states('sensor.pv_forecast_solcast_all') | float(0) }}"

      sp_today: >-
        {% from 'horizon_dach.jinja' import horizon_factor as hf_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor as hf_fassade %}
        {% set dach = state_attr('sensor.solarprognose_api_raw_dach_stable', 'data') %}
        {% set fassade = state_attr('sensor.solarprognose_api_raw_fassade_stable', 'data') %}
        {% if dach is mapping %}
          {% set ns = namespace(total=0) %}
          {% set now_dt = now() %}
          {% set md = '%02d-%02d' % (now_dt.month, now_dt.day) %}
          {% set start_ts = now_dt.replace(hour=0, minute=0, second=0, microsecond=0).timestamp() | int %}
          {% set current_hour = now_dt.hour %}
          {% set ts_now = (start_ts + current_hour * 3600) | string %}
          {% set fraction_left = (3600 - (now_dt.minute * 60 + now_dt.second)) / 3600 %}
          {% set d_now = dach[ts_now][1] | float(0) if ts_now in dach else 0 %}
          {% set f_now = fassade[ts_now][1] | float(0) if (fassade is mapping and ts_now in fassade) else 0 %}
          {% set ns.total = (d_now * (hf_dach(md, current_hour) | float(1)) + f_now * (hf_fassade(md, current_hour) | float(1))) * fraction_left %}
          {% for i in range(current_hour + 1, 24) %}
            {% set ts = (start_ts + i * 3600) | string %}
            {% set d = dach[ts][1] | float(0) if ts in dach else 0 %}
            {% set f = fassade[ts][1] | float(0) if (fassade is mapping and ts in fassade) else 0 %}
            {% set ns.total = ns.total + (d * (hf_dach(md, i) | float(1)) + f * (hf_fassade(md, i) | float(1))) %}
          {% endfor %}
          {{ ns.total | round(1) }}
        {% else %}
          {{ states('sensor.pv_forecast_solarprognose_all') | float(0) }}
        {% endif %}

      fs_today: >-
        {% from 'horizon_dach.jinja' import horizon_factor as hf_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor as hf_fassade %}
        {% set today = now().strftime('%Y-%m-%d') %}
        {% set md = now().strftime('%m-%d') %}
        {% set dach = state_attr('sensor.forecastsolar_api_raw_dach_stable', 'result') %}
        {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade_stable', 'result') %}
        {% if dach is mapping and fassade is mapping %}
          {% set now_ts = now().timestamp() %}
          {% set tz = now().strftime('%z') %}
          {% set ns = namespace(prev_t=0, prev_v=0, rem=0) %}
          {% for ts, val in dach.items() if ts.startswith(today) %}
            {% set t = as_timestamp(ts ~ tz) %}
            {% set v = val | float(0) %}
            {% if ns.prev_t != 0 %}
              {% set delta = [v - ns.prev_v, 0] | max %}
              {% set h = (((ns.prev_t + t) / 2) | timestamp_custom('%H', true)) | int %}
              {% set f = hf_dach(md, h) | float(1) %}
              {% if ns.prev_t >= now_ts %}
                {% set ns.rem = ns.rem + delta * f %}
              {% elif t > now_ts %}
                {% set ns.rem = ns.rem + delta * f * ((t - now_ts) / (t - ns.prev_t)) %}
              {% endif %}
            {% endif %}
            {% set ns.prev_t = t %}{% set ns.prev_v = v %}
          {% endfor %}
          {% set ns.prev_t = 0 %}{% set ns.prev_v = 0 %}
          {% for ts, val in fassade.items() if ts.startswith(today) %}
            {% set t = as_timestamp(ts ~ tz) %}
            {% set v = val | float(0) %}
            {% if ns.prev_t != 0 %}
              {% set delta = [v - ns.prev_v, 0] | max %}
              {% set h = (((ns.prev_t + t) / 2) | timestamp_custom('%H', true)) | int %}
              {% set f = hf_fassade(md, h) | float(1) %}
              {% if ns.prev_t >= now_ts %}
                {% set ns.rem = ns.rem + delta * f %}
              {% elif t > now_ts %}
                {% set ns.rem = ns.rem + delta * f * ((t - now_ts) / (t - ns.prev_t)) %}
              {% endif %}
            {% endif %}
            {% set ns.prev_t = t %}{% set ns.prev_v = v %}
          {% endfor %}
          {{ (ns.rem / 1000) | round(1) }}
        {% else %}
          {{ states('sensor.pv_forecast_forecastsolar_all') | float(0) }}
        {% endif %}

      om_today: >-
        {% from 'horizon_dach.jinja' import horizon_factor_ts as hf_ts_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor_ts as hf_ts_fassade %}
        {% set dach = state_attr('sensor.pv_roof_openmeteo_production_today', 'wh_period') %}
        {% set fassade = state_attr('sensor.pv_fassade_openmeteo_production_today', 'wh_period') %}
        {% if dach is mapping and fassade is mapping %}
          {% set ns = namespace(total=0) %}
          {% set now_dt = now() %}
          {% set today = now_dt.strftime('%Y-%m-%d') %}
          {% set current_hour_ts = now_dt.replace(minute=0, second=0, microsecond=0).timestamp() %}
          {% set fraction_left = (3600 - (now_dt.minute * 60 + now_dt.second)) / 3600 %}
          {% for ts, d_val in dach.items() if ts.startswith(today) %}
            {% set t = as_timestamp(ts) %}
            {% set f_val = fassade[ts] | float(0) if ts in fassade else 0 %}
            {% set combined_wh = ((d_val | float(0)) * (hf_ts_dach(ts) | float(1))) + (f_val * (hf_ts_fassade(ts) | float(1))) %}
            {% if t == current_hour_ts %}{% set ns.total = ns.total + (combined_wh * fraction_left) %}
            {% elif t > current_hour_ts %}{% set ns.total = ns.total + combined_wh %}{% endif %}
          {% endfor %}
          {{ (ns.total / 1000) | round(1) }}
        {% else %}
          {{ states('sensor.pv_forecast_openmeteo_all') | float(0) }}
        {% endif %}

      dw_today: >-
        {% from 'horizon_dach.jinja' import horizon_factor_ts as hf_ts_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor_ts as hf_ts_fassade %}
        {% set dach = state_attr('sensor.pv_roof_dwd_production_today', 'wh_period') %}
        {% set fassade = state_attr('sensor.pv_fassade_dwd_production_today', 'wh_period') %}
        {% if dach is mapping and fassade is mapping %}
          {% set ns = namespace(total=0) %}
          {% set now_dt = now() %}
          {% set today = now_dt.strftime('%Y-%m-%d') %}
          {% set current_hour_ts = now_dt.replace(minute=0, second=0, microsecond=0).timestamp() %}
          {% set fraction_left = (3600 - (now_dt.minute * 60 + now_dt.second)) / 3600 %}
          {% for ts, d_val in dach.items() if ts.startswith(today) %}
            {% set t = as_timestamp(ts) %}
            {% set f_val = fassade[ts] | float(0) if ts in fassade else 0 %}
            {% set combined_wh = ((d_val | float(0)) * (hf_ts_dach(ts) | float(1))) + (f_val * (hf_ts_fassade(ts) | float(1))) %}
            {% if t == current_hour_ts %}{% set ns.total = ns.total + (combined_wh * fraction_left) %}
            {% elif t > current_hour_ts %}{% set ns.total = ns.total + combined_wh %}{% endif %}
          {% endfor %}
          {{ (ns.total / 1000) | round(1) }}
        {% else %}
          {{ states('sensor.pv_forecast_dwd_all') | float(0) }}
        {% endif %}

      sc_tomorrow: >-
        {% set val = states('sensor.solcast_pv_forecast_prognose_morgen') %}
        {{ val | float if is_number(val) else states('sensor.pv_forecast_solcast_tomorrow') | float(0) }}

      sp_tomorrow: >-
        {% from 'horizon_dach.jinja' import horizon_factor as hf_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor as hf_fassade %}
        {% set dach_data = state_attr('sensor.solarprognose_api_raw_dach_stable', 'data') %}
        {% set fassade_data = state_attr('sensor.solarprognose_api_raw_fassade_stable', 'data') %}
        {% if dach_data is mapping %}
          {% set ns = namespace(total=0) %}
          {% set md = (now() + timedelta(days=1)).strftime('%m-%d') %}
          {% set start_ts = (now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() + 86400) | int %}
          {% for i in range(24) %}
            {% set ts = (start_ts + i * 3600) | string %}
            {% set d = dach_data[ts][1] | float(0) if ts in dach_data else 0 %}
            {% set f = fassade_data[ts][1] | float(0) if fassade_data is mapping and ts in fassade_data else 0 %}
            {% set ns.total = ns.total + (d * (hf_dach(md, i) | float(1)) + f * (hf_fassade(md, i) | float(1))) %}
          {% endfor %}
          {{ ns.total | round(2) }}
        {% else %}
          0.0
        {% endif %}

      fs_tomorrow: >-
        {% from 'horizon_dach.jinja' import horizon_factor as hf_dach %}
        {% from 'horizon_fassade.jinja' import horizon_factor as hf_fassade %}
        {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
        {% set md = (now() + timedelta(days=1)).strftime('%m-%d') %}
        {% set dach = state_attr('sensor.forecastsolar_api_raw_dach_stable', 'result') %}
        {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade_stable', 'result') %}
        {% if dach is mapping and fassade is mapping %}
          {% set tomorrow_suffix = tomorrow ~ ' ' %}
          {% set tz = now().strftime('%z') %}
          {% set ns = namespace(prev_t=0, prev_v=0, total=0) %}
          {% for ts, val in dach.items() if ts.startswith(tomorrow_suffix) %}
            {% set t = as_timestamp(ts ~ tz) %}
            {% set v = val | float(0) %}
            {% if ns.prev_t != 0 %}
              {% set h = (((ns.prev_t + t) / 2) | timestamp_custom('%H', true)) | int %}
              {% set ns.total = ns.total + ([v - ns.prev_v, 0] | max) * (hf_dach(md, h) | float(1)) %}
            {% endif %}
            {% set ns.prev_t = t %}{% set ns.prev_v = v %}
          {% endfor %}
          {% set ns.prev_t = 0 %}{% set ns.prev_v = 0 %}
          {% for ts, val in fassade.items() if ts.startswith(tomorrow_suffix) %}
            {% set t = as_timestamp(ts ~ tz) %}
            {% set v = val | float(0) %}
            {% if ns.prev_t != 0 %}
              {% set h = (((ns.prev_t + t) / 2) | timestamp_custom('%H', true)) | int %}
              {% set ns.total = ns.total + ([v - ns.prev_v, 0] | max) * (hf_fassade(md, h) | float(1)) %}
            {% endif %}
            {% set ns.prev_t = t %}{% set ns.prev_v = v %}
          {% endfor %}
          {{ (ns.total / 1000) | round(2) }}
        {% else %}
          0.0
        {% endif %}

      om_tomorrow: >-
        {% set dach = states('sensor.pv_roof_openmeteo_production_tomorrow') | float(0) %}
        {% set fassade = states('sensor.pv_fassade_openmeteo_production_tomorrow') | float(0) %}
        {{ dach + fassade }}

      dw_tomorrow: >-
        {% set dach = states('sensor.pv_roof_dwd_production_tomorrow') | float(0) %}
        {% set fassade = states('sensor.pv_fassade_dwd_production_tomorrow') | float(0) %}
        {{ dach + fassade }}

      om_day_after: >-
        {% set dach = states('sensor.pv_roof_openmeteo_production_day_after') | float(0) %}
        {% set fassade = states('sensor.pv_fassade_openmeteo_production_day_after') | float(0) %}
        {{ (dach + fassade) | round(2) }}

      dw_day_after: >-
        {% set dach = states('sensor.pv_roof_dwd_production_day_after') | float(0) %}
        {% set fassade = states('sensor.pv_fassade_dwd_production_day_after') | float(0) %}
        {{ (dach + fassade) | round(2) }}

    sensor:
      - name: "PV Forecast Solarprognose all"
        unique_id: pv_forecast_solarprognose_all
        unit_of_measurement: "kWh"
        state: "{{ sp_today }}"

      - name: "PV Forecast Forecastsolar all"
        unique_id: pv_forecast_forecastsolar_all
        unit_of_measurement: "kWh"
        state: "{{ fs_today }}"

      - name: "PV Forecast openmeteo all"
        unique_id: pv_forecast_openmeteo_all
        unit_of_measurement: "kWh"
        state: "{{ om_today }}"

      - name: "PV Forecast DWD all"
        unique_id: pv_forecast_dwd_all
        unit_of_measurement: "kWh"
        state: "{{ dw_today }}"

      - name: "PV Forecast Solcast Tomorrow"
        unique_id: pv_forecast_solcast_tomorrow
        unit_of_measurement: "kWh"
        state: "{{ sc_tomorrow }}"

      - name: "PV Forecast Solarprognose Tomorrow"
        unique_id: pv_forecast_solarprognose_tomorrow
        unit_of_measurement: "kWh"
        state: "{{ sp_tomorrow }}"

      - name: "PV Forecast ForecastSolar Tomorrow"
        unique_id: pv_forecast_forecastsolar_tomorrow
        unit_of_measurement: "kWh"
        state: "{{ fs_tomorrow }}"

      - name: "PV Forecast Openmeteo Tomorrow"
        unique_id: pv_forecast_openmeteo_tomorrow
        unit_of_measurement: "kWh"
        state: "{{ om_tomorrow }}"

      - name: "PV Forecast DWD tomorrow"
        unique_id: pv_forecast_dwd_tomorrow
        unit_of_measurement: "kWh"
        state: "{{ dw_tomorrow }}"

      - name: "PV Forecast OpenMeteo Day After"
        unique_id: pv_forecast_openmeteo_day_after
        unit_of_measurement: "kWh"
        state: "{{ om_day_after }}"

      - name: "PV Forecast DWD Day After"
        unique_id: pv_forecast_dwd_day_after
        unit_of_measurement: "kWh"
        state: "{{ dw_day_after }}"

      - name: "PV Forecast Weighted"
        unique_id: pv_forecast_weighted
        unit_of_measurement: "kWh"
        state: >-
          {% set sc = sc_today | float(0) %}
          {% set sp = sp_today | float(0) %}
          {% set fs = fs_today | float(0) %}
          {% set om = om_today | float(0) %}
          {% set dw = dw_today | float(0) %}
          {% set sc_w = bw_sc if sc > 0 else 0 %}
          {% set sp_w = bw_sp if sp > 0 else 0 %}
          {% set fs_w = bw_fs if fs > 0 else 0 %}
          {% set om_w = bw_om if om > 0 else 0 %}
          {% set dw_w = bw_dw if dw > 0 else 0 %}
          {% set total_weight = sc_w + sp_w + fs_w + om_w + dw_w %}
          {% if total_weight > 0 %}
            {{ ((sc_w * sc + sp_w * sp + fs_w * fs + om_w * om + dw_w * dw) / total_weight * bias * total_correction) | round(1) }}
          {% elif is_state('sun.sun', 'below_horizon') and not state_attr('sun.sun', 'rising') %}
            0.0
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

      - name: "PV Forecast Weighted Tomorrow"
        unique_id: pv_forecast_weighted_tomorrow
        unit_of_measurement: "kWh"
        state: >-
          {% set sc = sc_tomorrow | float(0) %}
          {% set sp = sp_tomorrow | float(0) %}
          {% set fs = fs_tomorrow | float(0) %}
          {% set om = om_tomorrow | float(0) %}
          {% set dw = dw_tomorrow | float(0) %}
          {% set sc_w = bw_sc if sc > 0 else 0 %}
          {% set sp_w = bw_sp if sp > 0 else 0 %}
          {% set fs_w = bw_fs if fs > 0 else 0 %}
          {% set om_w = bw_om if om > 0 else 0 %}
          {% set dw_w = bw_dw if dw > 0 else 0 %}
          {% set total_weight = sc_w + sp_w + fs_w + om_w + dw_w %}
          {% if total_weight > 0 %}
            {{ ((sc_w * sc + sp_w * sp + fs_w * fs + om_w * om + dw_w * dw) / total_weight * bias * total_correction) | round(2) }}
          {% else %}
            0.0
          {% endif %}

      - name: "PV Forecast Weighted Day After"
        unique_id: pv_forecast_weighted_day_after
        unit_of_measurement: "kWh"
        state: >-
          {% set om = om_day_after | float(0) %}
          {% set dw = dw_day_after | float(0) %}
          {% set om_w = bw_om if om > 0 else 0 %}
          {% set dw_w = bw_dw if dw > 0 else 0 %}
          {% set total_weight = om_w + dw_w %}
          {% if total_weight > 0 %}
            {{ ((om_w * om + dw_w * dw ) / total_weight * bias * total_correction) | round(2) }}
          {% else %}
            0.0
          {% endif %}
