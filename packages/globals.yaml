################################################################################
# 1. CENTRAL PARAMETERS (Single Source of Truth)
################################################################################

template:
  - sensor:
      - name: "Central Parameters"
        unique_id: zentrale_parameter
        state: "OK"
        attributes:
          # chemistry
          lfp_min_voltage: 3.00
          lfp_max_voltage: 3.58
          lfp_hysteresis: 0.020
          # batteries: capacity
          venus_capacity_wh: 5120
          ups_capacity_wh: 2200
          # batteries: own consumption
          venus_own_consumption_h: 9
          ups_own_consumption_h: 22
          # battery care
          override_soc_days: 5
          battery_care_days: 8
