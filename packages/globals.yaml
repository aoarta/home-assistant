################################################################################
# 1. CENTRAL PARAMETERS (Single Source of Truth)
################################################################################

template:
  - sensor:
      - name: "Global Parameter"
        unique_id: global_parameter
        state: "OK"
        attributes:
          # chemistry
          lfp_min_voltage: 3.00
          lfp_max_voltage: 3.565
          lfp_hysteresis: 0.040
          # batteries: capacity
          venus_capacity_wh: 5120
          ups_capacity_wh: 2200
          # batteries: safety
          lowest_soc: 12 # below that emergency start
          stop_soc: 15
          # batteries: own consumption
          ups_own_consumption_w: 0 #22 too much
          # battery care
          override_soc_days: 5
          battery_care_days: 8
          # Wallbox
          wallbox_max_amps: 22
          # Zero
          zero_capacity: 14.4
          zero_charge_efficienty: 0.88 # AC-DC efficiency
          # Honda e
          honda_e_capacity: 35.5 # NEU — Honda e: 35,5 kWh brutto
          honda_e_charge_efficiency: 0.88 # NEU — anpassen wenn gemessen

          # calculated Attribut (2* Venus * 0.8 + UPS * 0.6)
          calculated_combined_capacity_kwh: >-
            {% set venus = this.attributes.get('venus_capacity_wh', 0) | float(0) %}
            {% set ups = this.attributes.get('ups_capacity_wh', 0) | float(0) %}
            {{ ((venus * 2 * 0.8) + (ups * 0.6)) / 1000 }}

          battery_floor_soc_for_ev: 50
