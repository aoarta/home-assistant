# --- UTILITY METER (Verbrauchsstatistiken) ---
utility_meter:
  pv_ertrag_heute_um:
    unique_id: pv_ertrag_heute_um
    source: sensor.pv_energy_total_realtime
    name: "PV Ertrag Heute UM"
    cycle: daily

  pv_ertrag_balkon_heute_um:
    unique_id: pv_ertrag_balkon_heute_um
    source: sensor.pv_energy_balkon_realtime
    name: "PV Ertrag Balkon Heute UM"
    cycle: daily

  pv_ertrag_dach_heute_um:
    unique_id: pv_ertrag_dach_heute_um
    source: sensor.dach_energie_clean
    name: "PV Ertrag Dach Heute UM"
    cycle: daily

sensor:
  - platform: filter
    name: "PV Energy Ertrag heute"
    unique_id: pv_ertrag_heute
    entity_id: sensor.pv_ertrag_heute_um
    filters:
      - filter: range
        upper_bound: 100 # Alles über 100 kWh pro Tag wird ignoriert
  - platform: filter
    name: "PV Energy Ertrag Balkon heute"
    entity_id: sensor.pv_ertrag_balkon_heute_um
    filters:
      - filter: range
        upper_bound: 15 # Alles über 15 kWh pro Tag wird ignoriert
  - platform: filter
    name: "PV Energy Ertrag Dach heute"
    entity_id: sensor.pv_ertrag_dach_heute_um
    filters:
      - filter: range
        upper_bound: 60 # Alles über 60 kWh pro Tag wird ignoriert

template:
  - sensor:
      # --- EINZEL-FILTER (Inverter Energie) ---
      # Diese Sensoren verhindern, dass der Zählerstand jemals sinkt oder bei Fehlern auf 0 springt.
      - name: "Balkon Inverter 1 Clean"
        unique_id: balkon_inverter_1_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter_energy_total')) }}"
        state: >-
          {% set val = states('sensor.balkon_inverter_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "Balkon Inverter 2 Clean"
        unique_id: balkon_inverter_2_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter2_energy_total')) }}"
        state: >-
          {% set val = states('sensor.balkon_inverter2_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "Garage Inverter Clean"
        unique_id: garage_inverter_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.garage_inverter_energy_total')) }}"
        state: >-
          {% set val = states('sensor.garage_inverter_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "PV Produktion Balkon Watt fast"
        unique_id: pv_produktion_balkon_watt_fast
        unit_of_measurement: "W"
        device_class: power
        availability: >-
          {{ is_number(states('sensor.balkon_inverter_energy_power')) or 
             is_number(states('sensor.balkon_inverter2_energy_power')) or
             is_number(states('sensor.garage_inverter_energy_power')) }}
        state: >-
          {% set s1 = states('sensor.balkon_inverter_energy_power') | float(0) %}
          {% set s2 = states('sensor.balkon_inverter2_energy_power') | float(0) %}
          {% set s3 = states('sensor.garage_inverter_energy_power') | float(0) %}
          {# Nur addieren, was wirklich als Zahl vorliegt #}
          {{ (s1 + s2 + s3) | round(0) }}

      - name: "Dach Energie Clean"
        unique_id: dach_energie_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.zwicknagl_martin_energie_gesamt')) }}"
        state: >-
          {% set raw = states('sensor.zwicknagl_martin_energie_gesamt') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if raw is not none %}
            {% set val = (raw / 1000) | round(2) %}
            {% if last is not none %}
              {# Verhindert das Sinken des Wertes, aber erlaubt Initialisierung #}
              {{ [val, last] | max }}
            {% else %}
              {{ val }}
            {% endif %}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "PV Produktion Watt fast"
        unique_id: pv_produktion_watt_fast
        unit_of_measurement: "W"
        device_class: power
        availability: >-
          {{ is_number(states('sensor.zwicknagl_martin_leistung_ac')) and 
             is_number(states('sensor.pv_produktion_balkon_watt_fast')) }}
        state: >-
          {% set s1 = states('sensor.zwicknagl_martin_leistung_ac') | float(0) %}
          {% set s2 = states('sensor.pv_produktion_balkon_watt_fast') | float(0) %}
          {# Nur addieren, was wirklich als Zahl vorliegt #}
          {{ (s1 + s2) | round(0) }}

  - trigger:
      - platform: state
        entity_id:
          - sensor.balkon_inverter_1_clean
          - sensor.balkon_inverter_2_clean
          - sensor.garage_inverter_clean
          - sensor.dach_energie_clean
    sensor:
      - name: "PV Energy Realtime Aggregator"
        unique_id: pv_energy_realtime_aggregator
        # Dieser Hilfssensor nutzt die Variablen, um die anderen zu füttern
        state: "OK"
        attributes:
          # --- HIER DER TRICK: Alle Werte einmal abrufen ---
          balkon_1: "{{ states('sensor.balkon_inverter_1_clean') | float(0) }}"
          balkon_2: "{{ states('sensor.balkon_inverter_2_clean') | float(0) }}"
          garage: "{{ states('sensor.garage_inverter_clean') | float(0) }}"
          dach: "{{ states('sensor.dach_energie_clean') | float(0) }}"

      - name: "PV Energy Balkon Realtime"
        unique_id: pv_energy_balkon_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set attr = state_attr('sensor.pv_energy_realtime_aggregator', 'all') %}
          {% set b1 = state_attr('sensor.pv_energy_realtime_aggregator', 'balkon_1') | float(0) %}
          {% set b2 = state_attr('sensor.pv_energy_realtime_aggregator', 'balkon_2') | float(0) %}
          {% set g = state_attr('sensor.pv_energy_realtime_aggregator', 'garage') | float(0) %}
          {{ (b1 + b2 + g) | round(2) }}

      - name: "PV Energy Total Realtime"
        unique_id: pv_energy_total_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set b_total = states('sensor.pv_energy_balkon_realtime') | float(0) %}
          {% set dach = state_attr('sensor.pv_energy_realtime_aggregator', 'dach') | float(0) %}
          {{ (b_total + dach) | round(2) }}

  - trigger:
      - platform: time_pattern
        seconds: "/15"
    sensor:
      - name: "PV Produktion Watt"
        unique_id: pv_produktion_watt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        # gerundeter wert auf Vielfache von 15
        state: >-
          {{ ((states('sensor.pv_produktion_watt_fast') | float(0)) / 15) | int * 15 }}
