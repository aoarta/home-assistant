# --- UTILITY METER (Consumption Statistics) ---
utility_meter:
  pv_energy_yield_today_um:
    name: "PV Energy Yield Today UM"
    unique_id: pv_energy_yield_today_um
    source: sensor.pv_energy_total_realtime
    cycle: daily

  pv_energy_yield_balcony_today_um:
    name: "PV Energy Yield Balcony Today UM"
    unique_id: pv_energy_yield_balcony_today_um
    source: sensor.pv_energy_balcony_realtime
    cycle: daily

  pv_energy_yield_roof_today_um:
    name: "PV Energy Yield Roof Today UM"
    unique_id: pv_energy_yield_roof_today_um
    source: sensor.roof_energy
    cycle: daily

sensor:
  - platform: filter
    name: "PV Energy Yield Today"
    unique_id: pv_energy_yield_today
    entity_id: sensor.pv_energy_yield_today_um
    filters:
      - filter: range
        upper_bound: 100

  - platform: filter
    name: "PV Energy Yield Balcony Today"
    unique_id: pv_energy_yield_balcony_today
    entity_id: sensor.pv_energy_yield_balcony_today_um
    filters:
      - filter: range
        upper_bound: 15

  - platform: filter
    name: "PV Energy Yield Roof Today"
    unique_id: pv_energy_yield_roof_today
    entity_id: sensor.pv_energy_yield_roof_today_um
    filters:
      - filter: range
        upper_bound: 70

template:
  - sensor:
      # --- SINGLE FILTERS (Inverter Energy) ---
      # These sensors prevent the counter from ever decreasing or jumping to 0 on errors.
      - name: "Balcony Inverter 1 Energy"
        unique_id: balcony_inverter_1_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter_energy_total')) }}"
        state: >-
          {% set val = states('sensor.balkon_inverter_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "Balcony Inverter 2 Energy"
        unique_id: balcony_inverter_2_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter2_energy_total')) }}"
        state: >-
          {% set val = states('sensor.balkon_inverter2_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "Garage Inverter Energy"
        unique_id: garage_inverter_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.garage_inverter_energy_total')) }}"
        state: >-
          {% set val = states('sensor.garage_inverter_energy_total') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if last is not none %}
            {{ [val, last] | max }}
          {% else %}
            {{ val }}
          {% endif %}

      - name: "PV Production Balcony power"
        unique_id: pv_production_balcony_power
        unit_of_measurement: "W"
        device_class: power
        availability: >-
          {{ is_number(states('sensor.balkon_inverter_energy_power')) or
             is_number(states('sensor.balkon_inverter2_energy_power')) or
             is_number(states('sensor.garage_inverter_energy_power')) }}
        state: >-
          {% set s1 = states('sensor.balkon_inverter_energy_power') | float(0) %}
          {% set s2 = states('sensor.balkon_inverter2_energy_power') | float(0) %}
          {% set s3 = states('sensor.garage_inverter_energy_power') | float(0) %}
          {# Only add values that are actually available as numbers #}
          {{ (s1 + s2 + s3) | round(0) }}

      - name: "Roof Energy"
        unique_id: roof_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.zwicknagl_martin_energie_gesamt')) }}"
        state: >-
          {% set raw = states('sensor.zwicknagl_martin_energie_gesamt') | float(none) %}
          {% set last = this.state | float(none) %}
          {% if raw is not none %}
            {% set val = (raw / 1000) | round(2) %}
            {% if last is not none %}
              {# Prevents value from decreasing but allows initialization #}
              {{ [val, last] | max }}
            {% else %}
              {{ val }}
            {% endif %}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "PV Production Power"
        unique_id: pv_production_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ is_number(states('sensor.zwicknagl_martin_leistung_ac')) and
             is_number(states('sensor.pv_production_balcony_power')) }}
        state: >-
          {% set s1 = states('sensor.zwicknagl_martin_leistung_ac') | float(0) %}
          {% set s2 = states('sensor.pv_production_balcony_power') | float(0) %}
          {# Only add values that are actually available as numbers #}
          {{ (s1 + s2) | round(0) }}

  # ==========================================================================
  # Realtime energy aggregation.
  #
  # Refactor: the separate "PV Energy Realtime Aggregator" snapshot sensor is
  # gone. All four inverter totals are read ONCE into `variables:` per trigger,
  # and both realtime sensors read those variables. Same consistent snapshot,
  # no in-block ordering dependency (Balcony/Total no longer read the aggregator
  # sensor that had to be evaluated first), one sensor fewer.
  # ==========================================================================
  - trigger:
      - trigger: state
        entity_id:
          - sensor.balcony_inverter_1_energy
          - sensor.balcony_inverter_2_energy
          - sensor.garage_inverter_energy
          - sensor.roof_energy
    variables:
      # One consistent snapshot of all four inverter totals for this trigger.
      b1: "{{ states('sensor.balcony_inverter_1_energy') | float(0) }}"
      b2: "{{ states('sensor.balcony_inverter_2_energy') | float(0) }}"
      g: "{{ states('sensor.garage_inverter_energy') | float(0) }}"
      roof: "{{ states('sensor.roof_energy') | float(0) }}"
    sensor:
      - name: "PV Energy Balcony Realtime"
        unique_id: pv_energy_balcony_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set computed = (b1 + b2 + g) | round(2) %}
          {% set last = this.state | float(none) %}
          {# Sum must never decrease - prevents phantom utility_meter resets #}
          {{ [computed, last] | max if last is not none else computed }}

      - name: "PV Energy Total Realtime"
        unique_id: pv_energy_total_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set computed = (b1 + b2 + g + roof) | round(2) %}
          {% set last = this.state | float(none) %}
          {# Sum must never decrease - prevents phantom utility_meter resets #}
          {{ [computed, last] | max if last is not none else computed }}
