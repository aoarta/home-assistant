# --- UTILITY METER (Verbrauchsstatistiken) ---
utility_meter:
  pv_ertrag_heute:
    unique_id: pv_ertrag_heute
    source: sensor.pv_energy_total_realtime
    name: "PV Ertrag Heute"
    cycle: daily

  pv_ertrag_balkon_heute:
    unique_id: pv_ertrag_balkon_heute
    source: sensor.pv_energy_balkon_realtime
    name: "PV Ertrag Balkon Heute"
    cycle: daily

  pv_ertrag_dach_heute:
    unique_id: pv_ertrag_dach_heute
    source: sensor.dach_energie_clean
    name: "PV Ertrag Dach Heute"
    cycle: daily

  hausverbrauch_heute:
    unique_id: hausverbrauch_heute
    source: sensor.hausverbrauch_energy
    name: "Hausverbrauch Heute"
    cycle: daily

template:
  - sensor:
      # --- EINZEL-FILTER (Inverter Energie) ---
      # Diese Sensoren verhindern, dass der Zählerstand jemals sinkt oder bei Fehlern auf 0 springt.
      - name: "Balkon Inverter 1 Clean"
        unique_id: balkon_inverter_1_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter_energy_total')) }}"
        state: >
          {% set val = states('sensor.balkon_inverter_energy_total') | float(0) %}
          {% set last = this.state | float(0) %}
          {% if val is not none %}
            {% if last is not none %}
              {# Verhindert das Sinken des Wertes, aber erlaubt Initialisierung #}
              {{ [val, last] | max }}
            {% else %}
              {{ val }}
            {% endif %}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "Balkon Inverter 2 Clean"
        unique_id: balkon_inverter_2_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.balkon_inverter2_energy_total')) }}"
        state: >
          {% set val = states('sensor.balkon_inverter2_energy_total') | float(0) %}
          {% set last = this.state | float(0) %}
          {% if val is not none %}
            {% if last is not none %}
              {# Verhindert das Sinken des Wertes, aber erlaubt Initialisierung #}
              {{ [val, last] | max }}
            {% else %}
              {{ val }}
            {% endif %}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "Garage Inverter Clean"
        unique_id: garage_inverter_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.garage_inverter_energy_total')) }}"
        state: >
          {% set val = states('sensor.garage_inverter_energy_total') | float(0) %}
          {% set last = this.state | float(0) %}
          {% if val is not none %}
            {% if last is not none %}
              {# Verhindert das Sinken des Wertes, aber erlaubt Initialisierung #}
              {{ [val, last] | max }}
            {% else %}
              {{ val }}
            {% endif %}
          {% else %}
            {{ last }}
          {% endif %}

      - name: "Dach Energie Clean"
        unique_id: dach_energie_clean
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ is_number(states('sensor.zwicknagl_martin_energie_gesamt')) }}"
        state: >
          {% set raw = states('sensor.zwicknagl_martin_energie_gesamt') | float(0) %}
          {% set last = this.state | float(0) %}
          {% set val = (raw / 1000) | round(2) %}
          {{ [val, last] | max }}
        # WICHTIG: Der Sensor ist nur verfügbar, wenn alle Unter-Sensoren Zahlen liefern
        availability: >
          {{ is_number(states('sensor.balkon_inverter_1_clean')) and 
             is_number(states('sensor.balkon_inverter_2_clean')) and
             is_number(states('sensor.garage_inverter_clean')) }}
        state: >
          {% set s2 = states('sensor.balkon_inverter_1_clean') | float(none) %}
          {% set s3 = states('sensor.balkon_inverter_2_clean') | float(none) %}
          {% set s4 = states('sensor.garage_inverter_clean') | float(none) %}
          
          {% if s2 is not none and s3 is not none and s4 is not none %}
            {{ (s2 + s3 + s4) | round(2) }}
          {% else %}
            {# Falls Verfügbarkeit oben nicht greift, niemals 0 ausgeben! #}
            {{ states('sensor.pv_energy_balkon_realtime') }}
          {% endif %}


      - name: "PV Produktion Balkon Watt fast"
        unique_id: pv_produktion_balkon_watt_fast
        unit_of_measurement: "W"
        device_class: power
        availability: >
          {{ is_number(states('sensor.balkon_inverter_energy_power')) or 
             is_number(states('sensor.balkon_inverter2_energy_power')) or
             is_number(states('sensor.garage_inverter_energy_power')) }}
        state: >
          {% set s1 = states('sensor.balkon_inverter_energy_power') | float(0) %}
          {% set s2 = states('sensor.balkon_inverter2_energy_power') | float(0) %}
          {% set s3 = states('sensor.garage_inverter_energy_power') | float(0) %}
          {# Nur addieren, was wirklich als Zahl vorliegt #}
          {% set total = (s1|default(0) + s2|default(0) + s3|default(0)) %}
          {{ total | round(0) }}

      - name: "PV Produktion Watt fast"
        unique_id: pv_produktion_watt_fast
        unit_of_measurement: "W"
        device_class: power
        availability: >
          {{ is_number(states('sensor.zwicknagl_martin_leistung_ac')) and 
             is_number(states('sensor.pv_produktion_balkon_watt_fast')) }}
        state: >
          {% set s1 = states('sensor.zwicknagl_martin_leistung_ac') | float(0) %}
          {% set s2 = states('sensor.pv_produktion_balkon_watt_fast') | float(0) %}
          {# Nur addieren, was wirklich als Zahl vorliegt #}
          {% set total = (s1|default(0) + s2|default(0)) %}
          {{ total | round(0) }}

  - trigger:
      - platform: time_pattern
        seconds: "/15"
    sensor:
      - name: "PV Energy Balkon Realtime"
        unique_id: pv_energy_balkon_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        #zeilen: Summiert die oben erstellten "Clean" Sensoren
        availability: >
          {{ is_number(states('sensor.balkon_inverter_1_clean')) and 
             is_number(states('sensor.balkon_inverter_2_clean')) and
             is_number(states('sensor.garage_inverter_clean')) }}
        state: >
          {% set s1 = states('sensor.balkon_inverter_1_clean') | float(0) %}
          {% set s2 = states('sensor.balkon_inverter_2_clean') | float(0) %}
          {% set s3 = states('sensor.garage_inverter_clean') | float(0) %}
          {{ (s1 + s2 + s3) | round(2) }}

      - name: "PV Energy Total Realtime"
        unique_id: pv_energy_total_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        #zeilen: Dach + Balkon Gesamt
        availability: >
          {{ is_number(states('sensor.zwicknagl_martin_energie_tag')) and 
             is_number(states('sensor.pv_energy_balkon_realtime')) }}
        state: >
          {% set dach = states('sensor.zwicknagl_martin_energie_tag') | float(0) %}
          {% set balkon = states('sensor.pv_energy_balkon_realtime') | float(0) %}
          {{ (dach + balkon) | round(2) }}
