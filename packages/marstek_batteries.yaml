template:
  - triggers:
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Venus 1 Energy Wh"
        unique_id: venus_1_energy_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_1_energy_wh_counter') }}

      - name: "Venus 2 Energy Wh"
        unique_id: venus_2_energy_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_2_energy_wh_counter') }}

  # ==========================================================
  # Venus SOC Reset Points
  # ==========================================================
  - triggers:
      - trigger: homeassistant
        event: start
      # Only reacts to the smoothed Custom SOC to ignore bouncing
      # of the hardware sensor (99 -> 100 -> 99)
      - trigger: numeric_state
        entity_id: sensor.venus_1_custom_soc
        above: 99.9
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_1_soc
        above: 99.9
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 1 SOC Reset Point"
        unique_id: venus_1_soc_reset_point
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_1_energy_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_1_soc_reset_point') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {% set hw_soc = states('sensor.marstek_venus_1_soc') | float(0) %}
          {% set custom_soc = states('sensor.venus_1_custom_soc') | float(none) %}          
          {% set stop_soc =state_attr('sensor.global_parameter', 'stop_soc') | float(15) %}
          {% set capacity = state_attr('sensor.global_parameter', 'venus_capacity_wh') | float(5120) %}

          {% set drift_too_high = custom_soc is not none and (hw_soc - custom_soc) | abs > 25 %}

          {% if hw_soc <= stop_soc or drift_too_high %}
            {{ current_energy - ((100 - hw_soc) / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# At 100% we take the higher value (since energy flow decreases/goes negative when charging) #}
            {{ current_energy }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - triggers:
      - trigger: numeric_state
        entity_id: sensor.venus_2_custom_soc
        above: 99.9
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_2_soc
        above: 99.9
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 2 SOC Reset Point"
        unique_id: venus_2_soc_reset_point
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_2_energy_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_2_soc_reset_point') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {% set hw_soc = states('sensor.marstek_venus_2_soc') | float(0) %}
          {% set custom_soc = states('sensor.venus_2_custom_soc') | float(none) %}          
          {% set stop_soc =state_attr('sensor.global_parameter', 'stop_soc') | float(15) %}
          {% set capacity = state_attr('sensor.global_parameter', 'venus_capacity_wh') | float(5120) %}

          {% set drift_too_high = custom_soc is not none and (hw_soc - custom_soc) | abs > 25 %}

          {% if hw_soc <= stop_soc or drift_too_high %}
            {{ current_energy - ((100 - hw_soc) / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# At 100% we take the higher value (since energy flow decreases/goes negative when charging) #}
            {{ current_energy }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: sensor.venus_1_energy_wh
      - trigger: state
        entity_id: sensor.venus_1_soc_reset_point
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 1 Custom SOC"
        unique_id: venus_1_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_1_soc') | float(-1) %}
          {% set neu_wh = states('sensor.venus_1_energy_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_1_soc_reset_point') | float(none) %}

          {% if neu_wh is none or reset_wh is none %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% elif hw_soc >= 100 %}
            100
          {% else %}
            {% set cap_wh = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.120) * 1000 %}
            {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
            {{ calc_soc | round(1) | clamp(0, 100) }}
          {% endif %}

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: sensor.venus_2_energy_wh
      - trigger: state
        entity_id: sensor.venus_2_soc_reset_point
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 2 Custom SOC"
        unique_id: venus_2_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_2_soc') | float(-1) %}
          {% set neu_wh = states('sensor.venus_2_energy_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_2_soc_reset_point') | float(none) %}

          {% if neu_wh is none or reset_wh is none %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% elif hw_soc >= 100 %}
            100
          {% else %}
            {% set cap_wh = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.120) * 1000 %}
            {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
            {{ calc_soc | round(1) | clamp(0, 100) }}
          {% endif %}

      - name: "Marstek usable Energy"
        unique_id: marstek_usable_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set min_soc = state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) %}
          {% set cap1 = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.120) %}
          {% set cap2 = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.120) %}

          {% set soc1 = states('sensor.venus_1_custom_soc') | 
               float(states('sensor.marstek_venus_1_soc') | float(0)
          ) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | 
               float(states('sensor.marstek_venus_2_soc') | float(0)
          ) %}

          {% set usable_soc1 = [0, soc1 - min_soc] | max %}
          {% set usable_soc2 = [0, soc2 - min_soc] | max %}

          {% set usable_cap1 = usable_soc1 / 100 * cap1 %}
          {% set usable_cap2 = usable_soc2 / 100 * cap2 %}

          {{ (usable_cap1 + usable_cap2) | round(3) }}
        availability: >-
          {{ is_number(states('sensor.venus_1_custom_soc')) and
             is_number(states('sensor.venus_2_custom_soc')) and
             is_number(states('sensor.marstek_venus_1_soc')) and
             is_number(states('sensor.marstek_venus_2_soc')) }}

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_number.manual_charge_power
          - input_boolean.override_soc
        for:
          milliseconds: 500
      - trigger: state
        entity_id: sensor.target_soc
      - trigger: time_pattern
        seconds: "/15"
    # trigger: 15s, start, target_soc, manual_charge_power, override_soc
    variables:
      # =====================================================================
      # Compute everything ONCE per trigger. State + attributes of every
      # sensor below read from these variables — no more
      # state_attr(this.entity_id, ...) self-reference, no stale cross-sensor
      # reads inside this block.
      # =====================================================================

      # --- Max charge limits per battery (used by charge_map below) ---
      limits_map: >-
        {% set default = {'v1': 2500, 'v2': 2500} %}
        {% set ts = state_attr('sensor.solar_zeit_logik', 'now_ts') | float(0) %}
        {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
        {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
        {% set ziel_soc = states('sensor.target_soc') | float(80) %}

        {% if ts >= t1130 and ts < b_set and ziel_soc < 100 %}
          {% set capacity = state_attr('sensor.global_parameter', 'venus_capacity_wh') | float(5120) %}
          {% set dauer = [(b_set - ts) / 3600, 0.01] | max %}
          {% set fak = capacity / 100 / dauer * 1.25 %}
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(20) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(20) %}
          {% set raw1 = [((ziel_soc - soc1) | clamp(0,100) * fak) | round(0), 2500] | min %}
          {% set raw2 = [((ziel_soc - soc2) | clamp(0,100) * fak) | round(0), 2500] | min %}
          {{ {
            'v1': [raw1, 200] | max if raw1 > 0 else 0,
            'v2': [raw2, 200] | max if raw2 > 0 else 0
          } }}
        {% else %}
          {{ default }}
        {% endif %}

      # --- Charge distribution per battery (references limits_map above) ---
      charge_map: >-
        {% set manual = states('input_number.manual_charge_power') | float(0) %}
        {% if manual > 0 %}
          {{ {'v1': manual, 'v2': manual} }}
        {% else %}
          {% set total = [0, -(states('sensor.charge_power') | float(0))] | max | round(0) %}
          {% set dyn_soc = states('sensor.target_soc') | float(60) %}

          {% set s1 = states('sensor.venus_1_custom_soc') | float(100)
                if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 100 %}
          {% set s2 = states('sensor.venus_2_custom_soc') | float(100)
                if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 100 %}

          {# Use limits_map from above — no cross-sensor state_attr lookup #}
          {% set lim1 = limits_map.v1 | int(2500) if limits_map is mapping else 2500 %}
          {% set lim2 = limits_map.v2 | int(2500) if limits_map is mapping else 2500 %}

          {% set w1 = [dyn_soc - s1, 0] | max %}
          {% set w2 = [dyn_soc - s2, 0] | max %}
          {% set sum_w = w1 + w2 %}

          {% if sum_w == 0 %}
            {{ {'v1': 0, 'v2': 0} }}
          {% else %}
            {% set t1 = (w1 / sum_w * total) | round(0) | int %}
            {% set t2 = (total - t1) | int %}

            {# Only charge one battery when in the lower efficiency range #}
            {% if t1 < 200 and t2 < 200 %}
              {% if (w1 - w2) | abs > 10 %}
                {# Difference greater than 10: prefer battery with higher w #}
                {% set t1 = total if w1 > w2 else 0 %}
                {% set t2 = total if w2 > w1 else 0 %}
              {% else %}
                {# No significant difference: charge alternately #}
                {# Weekday logic: Monday=0, Tuesday=1, ... Sunday=6 #}
                {% set odd = (now().weekday() + now().hour) % 2 %}
                {% set t1 = total if odd == 1 else 0 %}
                {% set t2 = total if odd == 0 else 0 %}
              {% endif %}
            {% endif %}

            {# Overflow only if the receiving battery still has headroom #}
            {% if t1 > lim1 and t2 < lim2 and s2 < 100 %}
              {{ {'v1': lim1, 'v2': [lim2, t2 + t1 - lim1] | min | round(0) | int} }}
            {% elif t1 < lim1 and t2 > lim2 and s1 < 100 %}
              {{ {'v1': [lim1, t1 + t2 - lim2] | min | round(0) | int, 'v2': lim2} }}
            {% elif t1 > lim1 and t2 > lim2 %}
              {{ {'v1': lim1, 'v2': lim2} }}
            {% elif t1 > lim1 %}
              {# v2 is full — cap v1, drop the excess #}
              {{ {'v1': lim1, 'v2': t2} }}
            {% elif t2 > lim2 %}
              {# v1 is full — cap v2, drop the excess #}
              {{ {'v1': t1, 'v2': lim2} }}
            {% else %}
              {{ {'v1': t1, 'v2': t2} }}
            {% endif %}
          {% endif %}
        {% endif %}

      # --- Discharge distribution per battery ---
      discharge_map: >-
        {% set raw = states('sensor.charge_power') | float(0) %}
        {% set total = [raw, 0] | max | round(0) | int %}
        {% set zero = {'v1': 0, 'v2': 0} %}

        {% if total > 0 %}
          {% set min_soc = state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) %}
          {% set w1 = [states('sensor.venus_1_custom_soc') | float(0) - min_soc, 0] | max
                      if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 0 %}
          {% set w2 = [states('sensor.venus_2_custom_soc') | float(0) - min_soc, 0] | max
                      if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 0 %}
          {% set sum_w = w1 + w2 %}

          {% if sum_w == 0 %}
              {{ zero }}
          {% else %}
            {% set t1 = (w1 / sum_w * total) | round(0) | int %}
            {% set t2 = (total - t1) | int %}

            {# Only discharge one battery when in the poor efficiency range #}
            {% if t1 < 200 and t2 < 200 %}
              {% if (w1 - w2) | abs > 10 %}
                {% set t1 = total if w1 > w2 else 0 %}
                {% set t2 = total if w2 > w1 else 0 %}
              {% else %}
                {% set odd = (now().weekday() + now().hour) % 2 %}
                {% set t1 = total if odd == 1 else 0 %}
                {% set t2 = total if odd == 0 else 0 %}
              {% endif %}
            {% endif %}

            {{ {'v1': t1, 'v2': t2} }}
          {% endif %}
        {% else %}
          {{ zero }}
        {% endif %}

    sensor:
      # Combined charge/discharge target sensor.
      # state: positive = charge target (W), negative = discharge target (W), 0 = standby.
      # attributes.charge and attributes.discharge hold the per-battery distribution maps.
      - name: "Target Power Distribution fast"
        unique_id: target_power_distribution_fast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set c_total = (charge_map.v1 + charge_map.v2) if charge_map is mapping else 0 %}
          {% set d_total = (discharge_map.v1 + discharge_map.v2) if discharge_map is mapping else 0 %}
          {{ (c_total - d_total) | round(0) | int }}
        attributes:
          charge: "{{ charge_map }}"
          discharge: "{{ discharge_map }}"

      - name: "Max Charge Limits"
        unique_id: max_charge_limits
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {{ (limits_map.v1 + limits_map.v2) | round(0) | int if limits_map is mapping else 0 }}
        attributes:
          limits: "{{ limits_map }}"

  # for dashboard
  - sensor:
      - name: "Battery SOC Total"
        unique_id: battery_soc_total
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(-1) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(-1) %}

          {% if soc1 >= 0 and soc2 >= 0 %}
            {{ ((soc1 + soc2) / 2) | round(0) }}
          {% elif soc1 >= 0 %}
            {{ soc1 | round(0) }}
          {% elif soc2 >= 0 %}
            {{ soc2 | round(0) }}
          {% else %}
            {# Fallback to hardware if Custom SOCs are still unknown #}
            {% set hw1 = states('sensor.marstek_venus_1_soc') | float(0) %}
            {% set hw2 = states('sensor.marstek_venus_2_soc') | float(0) %}
            {{ ((hw1 + hw2) / 2) | round(0) }}
          {% endif %}
        availability: >-
          {# The sensor is only available when at least one source provides data #}
          {{ is_number(states('sensor.venus_1_custom_soc')) and
              is_number(states('sensor.venus_2_custom_soc')) and
              is_number(states('sensor.marstek_venus_1_soc')) and
              is_number(states('sensor.marstek_venus_2_soc')) }}

      - name: "Marstek AC Power Total"
        unique_id: marstek_ac_power_total
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {# Read raw values and set to 0 as a safety measure if a sensor is offline #}
          {% set venus1 = states('sensor.marstek_venus_1_ac_power') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_power') | float(0) %}
          {{ (venus1 + venus2) | round(0) }}
        availability: >-
          {# The sensor is only available when at least one of the source sensors provides a valid value #}
          {{ is_number(states('sensor.marstek_venus_1_ac_power')) and
             is_number(states('sensor.marstek_venus_2_ac_power')) }}

      - name: "Marstek DC Leistung Gesamt"
        # positiv wenn entladen
        # Batterieleistung ist das Negative der AC-Leistung, wir wollen es aber einfach halten!
        unique_id: marstek_dc_leistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {# Read raw values and set to 0 as a safety measure if a sensor is offline #}
          {% set venus1 = states('sensor.marstek_venus_1_batterieleistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_batterieleistung') | float(0) %}
          {{ (-(venus1 + venus2)) | round(0) }}
        availability: >-
          {# The sensor is only available when at least one of the source sensors provides a valid value #}
          {{ is_number(states('sensor.marstek_venus_1_batterieleistung')) and
             is_number(states('sensor.marstek_venus_2_batterieleistung')) }}

automation:
  - alias: "Venus Energieintegration"
    mode: queued
    triggers:
      #      - platform: time_pattern
      #        seconds: "/15"
      - trigger: state
        entity_id: sensor.takt
    actions:
      - variables:
          delta_t_h: "{{ (states('input_number.takt_interval_sekunden') | float(1)) / 3600 }}"

      - parallel:
          - sequence:
              - variables:
                  #power: "{{ states('sensor.marstek_venus_1_ac_power') | float(0) }}"
                  power: "{{ -(states('sensor.marstek_venus_1_batterieleistung') | float(0)) }}"
                  # No self-consumption here
                  delta_wh: >-
                    {# if delta > max_delta, something is wrong #}
                    {{ (power * delta_t_h) if (power | abs) < 2500 else 0 }}
              - action: input_number.set_value
                target:
                  entity_id: input_number.venus_1_energy_wh_counter
                data:
                  value: >
                    {% set new = states('input_number.venus_1_energy_wh_counter') | float(0) + delta_wh %}
                    {{ [[new, -50000] | max, 50000] | min }}

          - sequence:
              - variables:
                  #power: "{{ states('sensor.marstek_venus_2_ac_power') | float(0) }}"
                  power: "{{ -(states('sensor.marstek_venus_2_batterieleistung') | float(0)) }}"
                  # Add self-consumption of 9W (9W / 3600s * 15s = 0.0375 Wh per interval)
                  delta_wh: >-
                    {# if delta > max_delta, something is wrong #}
                    {{ (power * delta_t_h) if (power | abs) < 2500 else 0 }}
              - action: input_number.set_value
                target:
                  entity_id: input_number.venus_2_energy_wh_counter
                data:
                  value: >
                    {% set new = states('input_number.venus_2_energy_wh_counter') | float(0) + delta_wh %}
                    {{ [[new, -50000] | max, 50000] | min }}

  - alias: "Sende Lade und Entladebefehle an Hardware"
    id: "sende_batterie_targets_v2"
    mode: queued
    max: 15
    triggers:
      - trigger: state
        entity_id: sensor.target_power_distribution_fast
      - trigger: state
        entity_id:
          - input_boolean.override_soc
          - input_number.manual_charge_power
    actions:
      - delay: # ← Debounce: waits to see if more triggers arrive
          milliseconds: 100

      - variables:
          # 1. --- FETCH + SAFE MAPPING in one go (atomic per variable) ---
          c: >-
            {% set raw = state_attr('sensor.target_power_distribution_fast', 'charge') %}
            {{ raw if raw is mapping else {'v1': 0, 'v2': 0} }}
          d: >-
            {% set raw = state_attr('sensor.target_power_distribution_fast', 'discharge') %}
            {{ raw if raw is mapping else {'v1': 0, 'v2': 0} }}

          # 2. --- EXTRACT INDIVIDUAL VALUES ---
          c1: "{{ c.v1 | default(0) | int(0) }}"
          d1: "{{ d.v1 | default(0) | int(0) }}"
          c2: "{{ c.v2 | default(0) | int(0) }}"
          d2: "{{ d.v2 | default(0) | int(0) }}"

          # 3. --- CALCULATE POWER VALUES ---
          v1_laden: "{{ [c1, 2500] | min if c1 >= 20 else 0 }}"
          v1_entladen: "{{ [d1, 2500] | min if d1 >= 20 and c1 < 20 else 0 }}"

          v2_laden: "{{ [c2, 2500] | min if c2 >= 20 else 0 }}"
          v2_entladen: "{{ [d2, 2500] | min if d2 >= 20 and c2 < 20 else 0 }}"

          # 4. --- DETERMINE TARGET MODES ---
          target_mode_v1: "{{ 'charge' if c1 >= 20 else ('discharge' if d1 >= 20 else 'standby') }}"
          target_mode_v2: "{{ 'charge' if c2 >= 20 else ('discharge' if d2 >= 20 else 'standby') }}"

          # 5. --- SAFETY CHECK (Conflict Resolution) ---
          is_conflict: >-
            {{ (target_mode_v1 == 'charge' and target_mode_v2 == 'discharge') or
               (target_mode_v1 == 'discharge' and target_mode_v2 == 'charge') }}

          target_mode_v1_safe: "{{ 'standby' if is_conflict else target_mode_v1 }}"
          target_mode_v2_safe: "{{ 'standby' if is_conflict else target_mode_v2 }}"

      - parallel:
          # --- Venus 1 complete ---
          - sequence:
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_1_force_mode') != target_mode_v1_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_1_force_mode }
                    data: { option: "{{ target_mode_v1_safe }}" }
                  - delay:
                      milliseconds: 150 # Short pause for processing
              - action: number.set_value
                target: { entity_id: number.marstek_venus_1_charge_power }
                data: { value: "{{ v1_laden }}" }
                continue_on_error: true
              - delay:
                  milliseconds: 150
              - action: number.set_value
                target: { entity_id: number.marstek_venus_1_discharge_power }
                data: { value: "{{ v1_entladen }}" }
                continue_on_error: true

          # --- Venus 2 complete ---
          - sequence:
              - delay:
                  milliseconds: 20 # start venus 2 a tad later
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_2_force_mode') != target_mode_v2_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_2_force_mode }
                    data: { option: "{{ target_mode_v2_safe }}" }
                  - delay:
                      milliseconds: 150
              - action: number.set_value
                target: { entity_id: number.marstek_venus_2_charge_power }
                data: { value: "{{ v2_laden }}" }
                continue_on_error: true

              - delay:
                  milliseconds: 150
              - action: number.set_value
                target: { entity_id: number.marstek_venus_2_discharge_power }
                data: { value: "{{ v2_entladen }}" }
                continue_on_error: true

  # ==========================================================
  # Marstek: Last Full Timestamp
  # ==========================================================
  - alias: "Marstek: Zeitstempel Batterie voll aktualisieren"
    id: marstek_set_last_full_timestamp
    triggers:
      - trigger: numeric_state
        entity_id:
          - sensor.marstek_venus_1_soc
          - sensor.marstek_venus_2_soc
        above: 99
        for: "00:00:10"
        id: "sensor_update"

      - trigger: time_pattern
        minutes: "/10"
        id: "timer_update"

    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: "sensor_update"
            sequence:
              - variables:
                  device_id: "{{ trigger.entity_id.split('_')[2] }}"
              - action: input_datetime.set_datetime
                target:
                  entity_id: "input_datetime.venus_{{ device_id }}_last_full"
                data:
                  timestamp: "{{ now().timestamp() }}"
              - action: number.set_value
                target:
                  entity_id: "number.marstek_venus_{{ device_id }}_charge_power"
                data:
                  value: 0
                continue_on_error: true

          - conditions:
              - condition: trigger
                id: "timer_update"
            sequence:
              - repeat:
                  for_each:
                    - num: "1"
                      ent: sensor.marstek_venus_1_soc
                    - num: "2"
                      ent: sensor.marstek_venus_2_soc
                  sequence:
                    # Hier nutzen wir jetzt ein Template statt der Standard-Bedingung
                    - if:
                        - condition: template
                          value_template: "{{ states(repeat.item.ent) | float(0) > 99 }}"
                      then:
                        - action: input_datetime.set_datetime
                          target:
                            entity_id: "input_datetime.venus_{{ repeat.item.num }}_last_full"
                          data:
                            timestamp: "{{ now().timestamp() }}"
                        - action: number.set_value
                          target:
                            entity_id: "number.marstek_venus_{{ repeat.item.num }}_charge_power"
                          data:
                            value: 0
                          continue_on_error: true

  - alias: "Marstek Venus: Ladeleistung zurücksetzen wenn SOC > Target"
    id: marstek_venus_reset_charge_over_target
    mode: queued
    max: 15
    triggers:
      - trigger: time_pattern
        minutes: "/2"
      - trigger: state
        entity_id:
          - sensor.venus_1_custom_soc
          - sensor.venus_2_custom_soc
          - sensor.target_soc

    actions:
      - variables:
          target: "{{ states('sensor.target_soc') | float(100) }}"

      - parallel:
          - sequence:
              - if:
                  - condition: template
                    value_template: >-
                      {% set ladeleistung = states('number.marstek_venus_1_charge_power') | float(0) %}
                      {% set soc = states('sensor.venus_1_custom_soc') | float(0) %}
                      {{ ladeleistung != 0 and soc > target }}
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.marstek_venus_1_charge_power
                    data:
                      value: 0
                    continue_on_error: true # ← NEU

          - sequence:
              - delay: "00:00:00.150"
              - if:
                  - condition: template
                    value_template: >-
                      {% set ladeleistung = states('number.marstek_venus_2_charge_power') | float(0) %}
                      {% set soc = states('sensor.venus_2_custom_soc') | float(0) %}
                      {{ ladeleistung != 0 and soc > target }}
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.marstek_venus_2_charge_power
                    data:
                      value: 0
                    continue_on_error: true # ← NEU

