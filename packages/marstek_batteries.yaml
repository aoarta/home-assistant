################################################################################
################################################################################
################################################################################
template:
  - triggers:
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Venus 1 Energiefluss Wh"
        unique_id: venus_1_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_1_energiefluss_wh_counter') }}

      - name: "Venus 2 Energiefluss Wh"
        unique_id: venus_2_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.venus_2_energiefluss_wh_counter') }}

  # ==========================================================
  # Venus SOC Reset Points
  # ==========================================================
  - triggers:
      # Only reacts to the smoothed Custom SOC to ignore bouncing
      # of the hardware sensor (99 -> 100 -> 99)
      - trigger: numeric_state
        entity_id: sensor.venus_1_custom_soc
        above: 99.9
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_1_batterie_ladezustand
        above: 99.9
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 1 SOC Reset Punkt"
        unique_id: venus_1_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_1_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_1_soc_reset_punkt') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
          {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}

           {% if hw_soc < 15 %}
            {# Sync to HW-SOC when battery is almost empty #}
            {{ current_energy - (hw_soc / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# At 100% we take the smaller value (since energy flow decreases/goes negative when charging) #}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - triggers:
      - trigger: numeric_state
        entity_id: sensor.venus_2_custom_soc
        above: 99.9
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_2_batterie_ladezustand
        above: 99.9
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 2 SOC Reset Punkt"
        unique_id: venus_2_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.venus_2_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.venus_2_soc_reset_punkt') %}
          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}
          {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
          {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}

           {% if hw_soc < 15 %}
            {# Sync to HW-SOC when battery is almost empty #}
            {{ current_energy - (hw_soc / 100 * capacity) }}
          {% elif hw_soc >= 100 %}
            {# At 100% we take the smaller value (since energy flow decreases/goes negative when charging) #}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/1"
    sensor:
      - name: "Venus 1 Custom SOC"
        unique_id: venus_1_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(-1) %}
          {% set neu_wh = states('sensor.venus_1_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_1_soc_reset_punkt') | float(none) %}

          {# If hardware is offline or sensors are not ready -> retain old state #}
          {% if hw_soc == -1 or neu_wh is none or reset_wh is none %}
            {{ this.state if this.state is defined else 'unknown' }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set cap_wh = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12) * 1000 %}
                  {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
                  {{ calc_soc | round(1) | clamp(0, 100) }}
               {% endif %}
            {% else %}
              {{ this.state if this.state is defined else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >-
            {% set hw_soc = states('sensor.marstek_venus_1_batterie_ladezustand') | float(-1) %}
            {% set neu_wh = states('sensor.venus_1_energiefluss_wh') | float(none) %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh is none or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

      - name: "Venus 2 Custom SOC"
        unique_id: venus_2_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(-1) %}
          {% set neu_wh = states('sensor.venus_2_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.venus_2_soc_reset_punkt') | float(none) %}

          {# If hardware is offline or sensors are not ready -> retain old state #}
          {% if hw_soc == -1 or neu_wh is none or reset_wh is none %}
            {{ this.state if this.state is defined else 'unknown' }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set cap_wh = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12) * 1000 %}
                {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
                
                {# Clamps the value cleanly between 0 and 100 and rounds #}
                {{ calc_soc | round(1) | clamp(0, 100) }}
              {% endif %}
            {% else %}
              {{ this.state if this.state is defined else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >-
            {% set hw_soc = states('sensor.marstek_venus_2_batterie_ladezustand') | float(-1) %}
            {% set neu_wh = states('sensor.venus_2_energiefluss_wh') | float(none) %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh is none or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

      - name: "Marstek Free capacity kWh"
        unique_id: marstek_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set cap1 = states('sensor.marstek_venus_1_batterie_gesamtenergie') | float(5.12) %}
          {% set cap2 = states('sensor.marstek_venus_2_batterie_gesamtenergie') | float(5.12) %}
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(0) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(0) %}

          {{ (cap1 * (1 - (soc1 / 100)) + cap2 * (1 - (soc2 / 100))) | round(2) }}

  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_number.manuelle_ladeleistung
          - input_boolean.override_soc
        for:
          seconds: 3
      - trigger: time_pattern
        seconds: "/15"
    # trigger: 15s, start, manuelle_ladeleistung, override_soc
    sensor:
      # Combined charge/discharge target sensor.
      # state: positive = charge target (W), negative = discharge target (W), 0 = standby.
      # attributes.charge and attributes.discharge hold the per-battery distribution maps.
      - name: "Target Power Distribution fast"
        unique_id: target_power_distribution_fast
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set c = state_attr(this.entity_id, 'charge') %}
          {% set d = state_attr(this.entity_id, 'discharge') %}
          {% set c_total = (c.v1 + c.v2) if c is mapping else 0 %}
          {% set d_total = (d.v1 + d.v2) if d is mapping else 0 %}
          {{ (c_total - d_total) | round(0) | int }}
        attributes:
          # We store the result directly as an object (map), not as a JSON string
          charge: >-
            {% set manual = states('input_number.manuelle_ladeleistung') | float(0) %}
            {% if manual > 0 %}
              {{ {'v1': manual, 'v2': manual} }}
            {% else %}
              {# Inline instead of this.state to avoid lag #}
              {% set total = [0, -(states('sensor.ladeleistung') | float(0))] | max | round(0) %}
              {% set dyn_soc = states('sensor.target_soc') | float(60) %}

              {% set s1 = states('sensor.venus_1_custom_soc') | float(100)
                    if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 100 %}
              {% set s2 = states('sensor.venus_2_custom_soc') | float(100)
                    if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 100 %}

              {% set limits = state_attr('sensor.max_charge_limits', 'limits') %}
              {% set lim1 = limits.v1 | int(2500) if limits is not none else 2500 %}
              {% set lim2 = limits.v2 | int(2500) if limits is not none else 2500 %}

              {% set w1 = [dyn_soc - s1, 0] | max %}
              {% set w2 = [dyn_soc - s2, 0] | max %}
              {% set sum_w = w1 + w2 %}

              {% if sum_w == 0 %}
                {{ {'v1': 0, 'v2': 0} }}
              {% else %}
                {% set t1 = (w1 / sum_w * total) | round(0) | int %}
                {% set t2 = (total - t1) | int %}

                {# Only charge one battery when in the lower efficiency range #}
                {% if t1 < 200 and t2 < 200 %}
                  {% if (w1 - w2) | abs > 10 %}
                    {# Difference greater than 10: prefer battery with higher w #}
                    {% set t1 = total if w1 > w2 else 0 %}
                    {% set t2 = total if w2 > w1 else 0 %}
                  {% else %}
                    {# No significant difference: charge alternately #}
                    {# Weekday logic: Monday=0, Tuesday=1, ... Sunday=6 #}
                    {% set odd = (now().weekday() + now().hour) % 2 %}
                    {% set t1 = total if odd == 1 else 0 %}
                    {% set t2 = total if odd == 0 else 0 %}
                  {% endif %}
                {% endif %}

                {% if t1 > lim1 and t2 < lim2 %}
                  {{ {'v1': lim1, 'v2': [lim2, t2 + t1 - lim1] | min | round(0) | int} }}
                {% elif t1 < lim1 and t2 > lim2 %}
                  {{ {'v1': [lim1, t1 + t2 - lim2] | min | round(0) | int, 'v2': lim2} }}
                {% elif t1 > lim1 and t2 > lim2 %}
                  {{ {'v1': lim1, 'v2': lim2} }}
                {% else %}
                  {{ {'v1': t1, 'v2': t2} }}
                {% endif %}
              {% endif %}
            {% endif %}

          discharge: >-
            {# Inline instead of this.state to get the current value and avoid lag #}
            {% set raw = states('sensor.ladeleistung') | float(0) %}
            {% set total = [raw, 0] | max | round(0) | int %}
            {% set zero = {'v1': 0, 'v2': 0} %}

            {% if total > 0 %}
              {% set min_soc = state_attr('sensor.dynamic_soc_grenzen', 'min') | float(20) %}
              {% set w1 = [states('sensor.venus_1_custom_soc') | float(0) - min_soc, 0] | max
                          if is_state('switch.marstek_venus1_modbus_rs485_steuermodus', 'on') else 0 %}
              {% set w2 = [states('sensor.venus_2_custom_soc') | float(0) - min_soc, 0] | max
                          if is_state('switch.marstek_venus2_modbus_rs485_steuermodus', 'on') else 0 %}
              {% set sum_w = w1 + w2 %}

              {% if sum_w == 0 %}
                  {{ zero }}
              {% else %}
                {% set t1 = (w1 / sum_w * total) | round(0) | int %}
                {% set t2 = (total - t1) | int %}

                {# Only discharge one battery when in the poor efficiency range #}
                {% if t1 < 200 and t2 < 200 %}
                  {% if (w1 - w2) | abs > 10 %}
                    {# Difference greater than 10: prefer battery with higher w #}
                    {% set t1 = total if w1 > w2 else 0 %}
                    {% set t2 = total if w2 > w1 else 0 %}
                  {% else %}
                    {# No significant difference: discharge alternately #}
                    {# Weekday logic: Monday=0, Tuesday=1, ... Sunday=6 #}
                    {% set odd = (now().weekday() + now().hour) % 2 %}
                    {% set t1 = total if odd == 1 else 0 %}
                    {% set t2 = total if odd == 0 else 0 %}
                  {% endif %}
                {% endif %}

                {{ {'v1': t1, 'v2': t2} }}
              {% endif %}
            {% else %}
              {{ zero }}
            {% endif %}

      # trigger: 15s, start, manuelle_ladeleistung, override_soc
      - name: "Max Charge Limits"
        unique_id: max_charge_limits
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% set limits = state_attr(this.entity_id, 'limits') %}
          {{ (limits.v1 + limits.v2) | round(0) |int if limits is mapping else 0 }}

        attributes:
          limits: >-
            {% set default = {'v1': 2500, 'v2': 2500} %}
            {% set ts = state_attr('sensor.solar_zeit_logik', 'now_ts') | float(0) %}
            {% set b_set = state_attr('sensor.solar_zeit_logik', 'b_set') | float(0) %}
            {% set t1130 = state_attr('sensor.solar_zeit_logik', 't1130') | float(0) %}
            {% set ziel_soc = states('sensor.target_soc') | float(80) %}

            {% if ts >= t1130 and ts < b_set and ziel_soc < 100 %}
              {% set capacity = state_attr('sensor.zentrale_parameter', 'venus_capacity_wh') | float(5120) %}
              {% set dauer = [(b_set - ts) / 3600, 0.01] | max %}
              {% set fak = capacity / 100 / dauer * 1.25 %}
              {% set soc1 = states('sensor.venus_1_custom_soc') | float(20) %}
              {% set soc2 = states('sensor.venus_2_custom_soc') | float(20) %}
              {% set raw1 = [((ziel_soc - soc1) | clamp(0,100) * fak) | round(0), 2500] | min %}
              {% set raw2 = [((ziel_soc - soc2) | clamp(0,100) * fak) | round(0), 2500] | min %}
              {{ {
                'v1': [raw1, 200] | max if raw1 > 0 else 0,
                'v2': [raw2, 200] | max if raw2 > 0 else 0
              } }}
            {% else %}
              {{ default }}
            {% endif %}

  # for dashboard
  - sensor:
      - name: "Battery SOC Total"
        unique_id: battery_soc_total
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set soc1 = states('sensor.venus_1_custom_soc') | float(-1) %}
          {% set soc2 = states('sensor.venus_2_custom_soc') | float(-1) %}

          {% if soc1 >= 0 and soc2 >= 0 %}
            {{ ((soc1 + soc2) / 2) | round(0) }}
          {% elif soc1 >= 0 %}
            {{ soc1 | round(0) }}
          {% elif soc2 >= 0 %}
            {{ soc2 | round(0) }}
          {% else %}
            {# Fallback to hardware if Custom SOCs are still unknown #}
            {% set hw1 = states('sensor.marstek_venus_1_batterie_ladezustand') | float(0) %}
            {% set hw2 = states('sensor.marstek_venus_2_batterie_ladezustand') | float(0) %}
            {{ ((hw1 + hw2) / 2) | round(0) }}
          {% endif %}
        availability: >-
          {# The sensor is only available when at least one source provides data #}
          {{ is_number(states('sensor.venus_1_custom_soc')) or 
              is_number(states('sensor.venus_2_custom_soc')) or
              is_number(states('sensor.marstek_venus_1_batterie_ladezustand')) or
              is_number(states('sensor.marstek_venus_2_batterie_ladezustand')) }}

      - name: "Marstek Batterieleistung Gesamt"
        unique_id: marstek_batterieleistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {# Read raw values and set to 0 as a safety measure if a sensor is offline #}
          {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}
          {{ (venus1 + venus2) | round(0) }}
        availability: >-
          {# The sensor is only available when at least one of the source sensors provides a valid value #}
          {{ is_number(states('sensor.marstek_venus_1_ac_leistung')) or 
             is_number(states('sensor.marstek_venus_2_ac_leistung')) }}

automation:
  - alias: "Venus Energieintegration"
    mode: queued
    triggers:
      #      - platform: time_pattern
      #        seconds: "/15"
      - trigger: state
        entity_id: sensor.takt
    actions:
      - variables:
          own_consumption_w: "{{ state_attr('sensor.zentrale_parameter', 'venus_own_consumption') | float(10) }}"
          delta_t_h: "{{ (states('input_number.tack_interval_sekunden') | float(1)) / 3600 }}"

      - parallel:
          - sequence:
              - variables:
                  power: "{{ states('sensor.marstek_venus_1_ac_leistung') | float(0) }}"
                  # Add self-consumption of 9W (9W / 3600s * 15s = 0.0375 Wh per interval)
                  delta_wh: >-
                    {# if delta > max_delta, something is wrong #}
                    {{ ((power + own_consumption_w) * delta_t_h) if power < 2500 else own_consumption_w * delta_t_h }}
              - action: input_number.set_value
                target:
                  entity_id: input_number.venus_1_energiefluss_wh_counter
                data:
                  value: >
                    {{ states('input_number.venus_1_energiefluss_wh_counter') | float(0) + delta_wh }}

          - sequence:
              - variables:
                  power: "{{ states('sensor.marstek_venus_2_ac_leistung') | float(0) }}"
                  # Add self-consumption of 9W (9W / 3600s * 15s = 0.0375 Wh per interval)
                  delta_wh: >-
                    {# if delta > max_delta, something is wrong #}
                    {{ ((power + own_consumption_w) * delta_t_h) if power < 2500 else own_consumption_w * delta_t_h }}
              - action: input_number.set_value
                target:
                  entity_id: input_number.venus_2_energiefluss_wh_counter
                data:
                  value: >
                    {{ states('input_number.venus_2_energiefluss_wh_counter') | float(0) + delta_wh }}

  - alias: "Sende Lade und Entladebefehle an Hardware"
    id: "sende_batterie_targets_v2"
    mode: restart
    #max: 3
    triggers:
      - trigger: state
        entity_id: sensor.target_power_distribution_fast
      - trigger: state
        entity_id:
          - input_boolean.override_soc
          - input_number.manuelle_ladeleistung
    actions:
      - delay: # ← Debounce: waits to see if more triggers arrive
          milliseconds: 300

      - variables:
          # 1. --- FETCH DATA ONCE ---
          c_raw: "{{ state_attr('sensor.target_power_distribution_fast', 'charge') }}"
          d_raw: "{{ state_attr('sensor.target_power_distribution_fast', 'discharge') }}"

          # 2. --- SAFE MAPPING (fallback if empty) ---
          c: "{{ c_raw if c_raw is mapping else {'v1': 0, 'v2': 0} }}"
          d: "{{ d_raw if d_raw is mapping else {'v1': 0, 'v2': 0} }}"

          # 3. --- EXTRACT INDIVIDUAL VALUES ---
          c1: "{{ c.v1 | default(0) | int(0) }}"
          d1: "{{ d.v1 | default(0) | int(0) }}"
          c2: "{{ c.v2 | default(0) | int(0) }}"
          d2: "{{ d.v2 | default(0) | int(0) }}"

          # 4. --- CALCULATE POWER VALUES ---
          v1_laden: "{{ [c1, 2500] | min if c1 >= 20 else 0 }}"
          v1_entladen: "{{ [d1, 2500] | min if d1 >= 20 and c1 < 20 else 0 }}"

          v2_laden: "{{ [c2, 2500] | min if c2 >= 20 else 0 }}"
          v2_entladen: "{{ [d2, 2500] | min if d2 >= 20 and c2 < 20 else 0 }}"

          # 5. --- DETERMINE TARGET MODES ---
          target_mode_v1: "{{ 'charge' if c1 >= 20 else ('discharge' if d1 >= 20 else 'standby') }}"
          target_mode_v2: "{{ 'charge' if c2 >= 20 else ('discharge' if d2 >= 20 else 'standby') }}"

          # 6. --- SAFETY CHECK (Conflict Resolution) ---
          is_conflict: >-
            {{ (target_mode_v1 == 'charge' and target_mode_v2 == 'discharge') or
               (target_mode_v1 == 'discharge' and target_mode_v2 == 'charge') }}

          target_mode_v1_safe: "{{ 'standby' if is_conflict else target_mode_v1 }}"
          target_mode_v2_safe: "{{ 'standby' if is_conflict else target_mode_v2 }}"

      - parallel:
          # --- Venus 1 complete ---
          - sequence:
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_1_force_mode') != target_mode_v1_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_1_force_mode }
                    data: { option: "{{ target_mode_v1_safe }}" }
                  - delay:
                      milliseconds: 200 # Short pause for processing
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_1_ladeleistung_einstellen }
                data: { value: "{{ v1_laden }}" }
              - delay:
                  milliseconds: 200
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_1_entladeleistung_einstellen,
                  }
                data: { value: "{{ v1_entladen }}" }

          - delay:
              milliseconds: 10

          # --- Venus 2 complete ---
          - sequence:
              - delay:
                  milliseconds: 150 # start venus 2 a tad later
              - if:
                  - condition: template
                    value_template: "{{ states('select.marstek_venus_2_force_mode') != target_mode_v2_safe }}"
                then:
                  - action: select.select_option
                    target: { entity_id: select.marstek_venus_2_force_mode }
                    data: { option: "{{ target_mode_v2_safe }}" }
                  - delay:
                      milliseconds: 200 # Short pause for processing
              - action: number.set_value
                target:
                  { entity_id: number.marstek_venus_2_ladeleistung_einstellen }
                data: { value: "{{ v2_laden }}" }
              - delay:
                  milliseconds: 200
              - action: number.set_value
                target:
                  {
                    entity_id: number.marstek_venus_2_entladeleistung_einstellen,
                  }
                data: { value: "{{ v2_entladen }}" }

  # ==========================================================
  # Marstek: Last Full Timestamp
  # ==========================================================

  - alias: "Marstek: Zeitstempel Batterie voll aktualisieren"
    id: marstek_set_last_full_timestamp
    triggers:
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_1_batterie_ladezustand
        above: 99
        for: "00:01:00"
        id: "venus1"
      - trigger: numeric_state
        entity_id: sensor.marstek_venus_2_batterie_ladezustand
        above: 99
        for: "00:01:00"
        id: "venus2"
    actions:
      - variables:
          ziel: "input_datetime.{{ trigger.id }}_last_full"
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ ziel }}"
        data:
          timestamp: "{{ now().timestamp() }}"

  - alias: "Marstek Venus: Ladeleistung zurücksetzen wenn SOC > Target"
    id: marstek_venus_reset_charge_over_target
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/2"
      - trigger: state
        entity_id:
          - sensor.venus_1_custom_soc
          - sensor.venus_2_custom_soc
          - sensor.target_soc

    actions:
      - variables:
          target: "{{ states('sensor.target_soc') | float(100) }}"

      - parallel:
          - sequence:
              - if:
                  - condition: template
                    value_template: >-
                      {% set ladeleistung = states('number.marstek_venus_1_ladeleistung_einstellen') | float(0) %}
                      {% set soc = states('sensor.venus_1_custom_soc') | float(0) %}
                      {{ ladeleistung != 0 and soc > target }}
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.marstek_venus_1_ladeleistung_einstellen
                    data:
                      value: 0

          - sequence:
              - delay: "00:00:00.150"
              - if:
                  - condition: template
                    value_template: >-
                      {% set ladeleistung = states('number.marstek_venus_2_ladeleistung_einstellen') | float(0) %}
                      {% set soc = states('sensor.venus_2_custom_soc') | float(0) %}
                      {{ ladeleistung != 0 and soc > target }}
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.marstek_venus_2_ladeleistung_einstellen
                    data:
                      value: 0
