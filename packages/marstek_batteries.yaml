# packages/marstek_batteries.yaml

input_number:
  venus_1_energiefluss_wh_counter:
    name: Venus 1 Energiefluss Counter
    min: -50000
    max: 50000
    step: 1

  venus_2_energiefluss_wh_counter:
    name: Venus 2 Energiefluss Counter
    min: -50000
    max: 50000
    step: 1

sensor:
  - platform: filter
    name: "Marstek Venus 1 AC Leistung glatt"
    unique_id: marstek_venus_1_ac_leistung_glatt
    entity_id: sensor.marstek_venus_1_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 5 # Smooths over approx. 5 measurements (approx. 5-10 sec. inertia)
        precision: 0 # Rounds to one decimal place
      - filter: time_throttle
        window_size: "00:01:00" # Writes a value to the DB only every 30 seconds

  - platform: filter
    name: "Marstek Venus 2 AC Leistung glatt"
    unique_id: marstek_venus_2_ac_leistung_glatt
    entity_id: sensor.marstek_venus_2_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 5 # Smooths over approx. 5 measurements (approx. 5-10 sec. inertia)
        precision: 0 # Rounds to one decimal place
      - filter: time_throttle
        window_size: "00:01:00" # Writes a value to the DB only every 30 seconds

