# packages/pv_prognose.yaml

input_number:
  pv_forecast_bias_korrekturfaktor:
    name: "Forecast Bias Korrekturfaktor"
    min: 0
    max: 100
    initial: 1.00
    step: 0.001

  pv_kalman_score_solcast:
    name: "Kalman Score Solcast"
    min: 0
    max: 100
    initial: 0.25
    step: 0.001

  pv_kalman_score_solarprognose:
    name: "Kalman Score Solarprognose"
    min: 0
    max: 100
    initial: 0.15
    step: 0.001

  pv_kalman_score_forecastsolar:
    name: "Kalman Score ForecastSolar"
    min: 0
    max: 100
    initial: 0.15
    step: 0.001

  pv_kalman_score_openmeteo:
    name: "Kalman Score OpenMeteo"
    min: 0
    max: 100
    initial: 0.45
    step: 0.001

  pv_kalman_p_bias:
    name: "Kalman P Bias"
    min: 0
    max: 1
    initial: 0.02
    step: 0.0001

  pv_kalman_p_solcast:
    name: "Kalman P Solcast"
    min: 0
    max: 1
    initial: 0.1
    step: 0.0001

  pv_kalman_p_solarprognose:
    name: "Kalman P Solarprognose"
    min: 0
    max: 1
    initial: 0.1
    step: 0.0001

  pv_kalman_p_forecastsolar:
    name: "Kalman P ForecastSolar"
    min: 0
    max: 1
    initial: 0.1
    step: 0.0001

  pv_kalman_p_openmeteo:
    name: "Kalman P OpenMeteo"
    min: 0
    max: 1
    initial: 0.1
    step: 0.0001

  # --- Solar Forecast ML ---
  pv_kalman_score_ml:
    name: "Kalman Score ML"
    min: 0
    max: 100
    initial: 0.001
    step: 0.001

  pv_kalman_p_ml:
    name: "Kalman P ML"
    min: 0
    max: 1
    initial: 0.1
    step: 0.0001

  weight_ml:
    name: "Gewicht ML"
    min: 0
    max: 1
    step: 0.001

  pv_save_ml_morgens:
    name: "ML Referenz heute früh"
    min: 0
    max: 150
    unit_of_measurement: "kWh"

  # --- Normierte Gewichte (Visualisierung) ---
  weight_solcast:
    name: "Gewicht Solcast"
    min: 0
    max: 1
    step: 0.001
  weight_solarprognose:
    name: "Gewicht Solarprognose"
    min: 0
    max: 1
    step: 0.001
  weight_forecastsolar:
    name: "Gewicht ForecastSolar"
    min: 0
    max: 1
    step: 0.001
  weight_openmeteo:
    name: "Gewicht OpenMeteo"
    min: 0
    max: 1
    step: 0.001

  # --- Referenzspeicher & Statistik ---
  pv_save_solcast_morgens:
    name: "Solcast Referenz heute früh"
    min: 0
    max: 150
    unit_of_measurement: "kWh"
  pv_save_solarprognose_morgens:
    name: "Solarprognose Referenz heute früh"
    min: 0
    max: 150
    unit_of_measurement: "kWh"
  pv_save_forecastsolar_morgens:
    name: "ForecastSolar Referenz heute früh"
    min: 0
    max: 150
    unit_of_measurement: "kWh"
  pv_save_openmeteo_morgens:
    name: "OpenMeteo Referenz heute früh"
    min: 0
    max: 150
    unit_of_measurement: "kWh"

  pv_prognose_von_gestern:
    name: "PV Prognose von gestern"
    min: 0
    max: 150
    unit_of_measurement: "kWh"
  pv_reale_ernte_von_gestern:
    name: "PV Reale Ernte von gestern"
    min: 0
    max: 150
    unit_of_measurement: "kWh"
  pv_prognose_festwert_heute:
    name: "PV Prognose Festwert heute"
    min: 0
    max: 150
    unit_of_measurement: "kWh"

sensor:
  # --- PASSIVE REST-QUELLEN ---
  - platform: rest
    name: "Solarprognose API Source Dach"
    resource: "https://www.solarprognose.de/web/solarprediction/api/v1?access-token=c2a2da7b09c3c2e2a20651a2223e7fa7&item=module_field&id=14443&type=hourly"
    scan_interval: 86400
    json_attributes: [data]
    value_template: "{{ value_json.status if value_json is defined else 'OK' }}"

  - platform: rest
    name: "Solarprognose API Source Fassade"
    resource: "https://www.solarprognose.de/web/solarprediction/api/v1?access-token=c2a2da7b09c3c2e2a20651a2223e7fa7&item=module_field&id=14337&type=hourly"
    scan_interval: 86400
    json_attributes: [data]
    value_template: "{{ value_json.status if value_json is defined else 'OK' }}"

  - platform: rest
    name: "Forecastsolar API Source Dach"
    resource_template: "https://api.forecast.solar/estimate/watthours/47.5151/12.0897/30/-45/7.5"
    scan_interval: 86400
    json_attributes: [result]
    value_template: "{{ value_json.message.info.place if value_json is defined else 'OK' }}"

  - platform: rest
    name: "Forecastsolar API Source Fassade"
    resource_template: "https://api.forecast.solar/estimate/watthours/47.5151/12.0897/85/90/2.4"
    scan_interval: 86400
    json_attributes: [result]
    value_template: "{{ value_json.message.info.place if value_json is defined else 'OK' }}"

template:
  # --- TRIGGER-BASIERTE SPEICHER-SENSOREN (Überleben Neustart) ---
  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.solarprognose_api_source_dach
          - sensor.solarprognose_api_source_fassade
    sensor:
      - name: "Solarprognose Api Raw Dach Stable"
        unique_id: solarprognose_api_raw_dach_stable
        state: "OK"
        availability: "{{ state_attr('sensor.solarprognose_api_source_dach', 'data') is mapping }}"
        attributes:
          data: >-
            {% set val = state_attr('sensor.solarprognose_api_source_dach', 'data') %}
            {{ val if val is mapping else state_attr('this', 'data') }}

      - name: "Solarprognose Api Raw Fassade Stable"
        unique_id: solarprognose_api_raw_fassade_stable
        state: "OK"
        availability: "{{ state_attr('sensor.solarprognose_api_source_fassade', 'data') is mapping }}"
        attributes:
          data: >-
            {% set val = state_attr('sensor.solarprognose_api_source_fassade', 'data') %}
            {{ val if val is mapping else state_attr('this', 'data') }}

  - trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.forecastsolar_api_source_dach
          - sensor.forecastsolar_api_source_fassade
    sensor:
      - name: "Forecastsolar API Raw Dach Stable"
        unique_id: forecastsolar_api_raw_dach_stable
        state: "OK"
        availability: "{{ state_attr('sensor.forecastsolar_api_source_dach', 'result') is mapping }}"
        attributes:
          result: >-
            {% set val = state_attr('sensor.forecastsolar_api_source_dach', 'result') %}
            {{ val if val is mapping else state_attr('this', 'result') }}

      - name: "Forecastsolar API Raw Fassade Stable"
        unique_id: forecastsolar_api_raw_fassade_stable
        state: "OK"
        availability: "{{ state_attr('sensor.forecastsolar_api_source_fassade', 'result') is mapping }}"
        attributes:
          result: >-
            {% set val = state_attr('sensor.forecastsolar_api_source_fassade', 'result') %}
            {{ val if val is mapping else state_attr('this', 'result') }}

  # --- BERECHNUNGS-SENSOREN ---
  - sensor:
      - name: "PV Forecast ML alles"
        unique_id: pv_forecast_ml_alles
        unit_of_measurement: "kWh"
        # Ersetze 'sensor.dein_ml_sensor_heute' durch deinen echten Sensor
        state: "{{ states('sensor.prognose_heute') | float(0) | round(1) }}"

      - name: "PV Forecast ML morgen"
        unique_id: pv_forecast_ml_morgen
        unit_of_measurement: "kWh"
        # Ersetze 'sensor.dein_ml_sensor_morgen' durch deinen echten Sensor
        state: "{{ states('sensor.prognose_morgen') | float(0) | round(1) }}"

      - name: "PV Forecast Solcast alles"
        unique_id: pv_forecast_solcast_alles
        unit_of_measurement: "kWh"
        availability: "{{ is_number(states('sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute')) }}"
        state: "{{ states('sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute') | float(0) | round(1)}}"

      - name: "PV Forecast Solarprognose alles"
        unique_id: pv_forecast_solarprognose_alles
        unit_of_measurement: "kWh"
        availability: >-
          {{ state_attr('sensor.solarprognose_api_raw_dach_stable', 'data') is mapping and 
             state_attr('sensor.solarprognose_api_raw_fassade_stable', 'data') is mapping }}
        state: >-
          {% set dach = state_attr('sensor.solarprognose_api_raw_dach_stable', 'data') %}
          {% set fassade = state_attr('sensor.solarprognose_api_raw_fassade_stable', 'data') %}

          {% if dach is mapping %}
            {% set ns = namespace(total=0) %}
            {% set now_dt = now() %}
            {% set start_ts = now_dt.replace(hour=0, minute=0, second=0, microsecond=0).timestamp() | int %}
            
            {% set current_hour = now_dt.hour %}
            {% set ts_now = (start_ts + current_hour * 3600) | string %}
            
            {% set seconds_passed = (now_dt.minute * 60) + now_dt.second %}
            {% set fraction_left = (3600 - seconds_passed) / 3600 %}
            
            {% set d_now = dach[ts_now][1] | float(0) if ts_now in dach else 0 %}
            {% set f_now = fassade[ts_now][1] | float(0) if (fassade is mapping and ts_now in fassade) else 0 %}
            
            {% set ns.total = (d_now + f_now) * fraction_left %}
            
            {% if current_hour < 23 %}
              {% for i in range(current_hour + 1, 24) %}
                {% set ts = (start_ts + i * 3600) | string %}
                {% set d = dach[ts][1] | float(0) if ts in dach else 0 %}
                {% set f = fassade[ts][1] | float(0) if (fassade is mapping and ts in fassade) else 0 %}
                {% set ns.total = ns.total + (d + f) %}
              {% endfor %}
            {% endif %}
            
            {{ ns.total | round(1) }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

      - name: "PV Forecast Forecastsolar alles"
        unique_id: pv_forecast_forecastsolar_alles
        unit_of_measurement: "kWh"
        availability: >-
          {{ state_attr('sensor.forecastsolar_api_raw_dach_stable', 'result') is mapping and 
             state_attr('sensor.forecastsolar_api_raw_fassade_stable', 'result') is mapping }}
        state: >-
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set dach = state_attr('sensor.forecastsolar_api_raw_dach_stable', 'result') %}
          {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade_stable', 'result') %}

          {% if dach is mapping and fassade is mapping %}
            {% set ns = namespace(d_max=0, f_max=0, d_now=0, f_now=0, prev_t=0, prev_v=0) %}
            {% set now_ts = now().timestamp() %}
            {% set tz = now().strftime('%z') %}
            
            {% for ts, val in dach.items() if ts.startswith(today) %}
              {% set t = as_timestamp(ts ~ tz) %}
              {% set v = val | float(0) %}
              {% if v > ns.d_max %}{% set ns.d_max = v %}{% endif %}
              
              {% if ns.prev_t <= now_ts <= t and ns.prev_t != 0 %}
                {% set fraction = (now_ts - ns.prev_t) / (t - ns.prev_t) %}
                {% set ns.d_now = ns.prev_v + (v - ns.prev_v) * fraction %}
              {% elif now_ts > t %}
                {% set ns.d_now = v %}
              {% endif %}
              {% set ns.prev_t, ns.prev_v = t, v %}
            {% endfor %}

            {% set ns.prev_t, ns.prev_v = 0, 0 %}
            
            {% for ts, val in fassade.items() if ts.startswith(today) %}
              {% set t = as_timestamp(ts ~ tz) %}
              {% set v = val | float(0) %}
              {% if v > ns.f_max %}{% set ns.f_max = v %}{% endif %}
              
              {% if ns.prev_t <= now_ts <= t and ns.prev_t != 0 %}
                {% set fraction = (now_ts - ns.prev_t) / (t - ns.prev_t) %}
                {% set ns.f_now = ns.prev_v + (v - ns.prev_v) * fraction %}
              {% elif now_ts > t %}
                {% set ns.f_now = v %}
              {% endif %}
              {% set ns.prev_t, ns.prev_v = t, v %}
            {% endfor %}

            {{ ([0, ( (ns.d_max - ns.d_now) + (ns.f_max - ns.f_now)) / 1000] | max) | round(1) }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

      - name: "PV Forecast openmeteo alles"
        unique_id: pv_forecast_openmeteo_alles
        unit_of_measurement: "kWh"
        availability: >-
          {{ state_attr('sensor.home_energy_pv_dach_production_today', 'wh_period') is mapping and
             state_attr('sensor.home_energy_pv_fassade_production_today', 'wh_period') is mapping }}

        state: >-
          {% set dach = state_attr('sensor.home_energy_pv_dach_production_today', 'wh_period') %}
          {% set fassade = state_attr('sensor.home_energy_pv_fassade_production_today', 'wh_period') %}

          {% if dach is mapping and fassade is mapping %}
            {% set ns = namespace(total=0) %}
            {% set now_dt = now() %}
            {% set today = now_dt.strftime('%Y-%m-%d') %}
            
            {% set current_hour_ts = now_dt.replace(minute=0, second=0, microsecond=0).timestamp() %}
            
            {% set seconds_passed = (now_dt.minute * 60) + now_dt.second %}
            {% set fraction_left = (3600 - seconds_passed) / 3600 %}
            
            {% for ts, d_val in dach.items() %}
              {% if ts.startswith(today) %}
                {% set t = as_timestamp(ts) %}
                {% set f_val = fassade[ts] | float(0) if ts in fassade else 0 %}
                {% set combined_wh = (d_val | float(0)) + f_val %}
                
                {% if t == current_hour_ts %}
                  {% set ns.total = ns.total + (combined_wh * fraction_left) %}
                {% elif t > current_hour_ts %}
                  {% set ns.total = ns.total + combined_wh %}
                {% endif %}
              {% endif %}
            {% endfor %}
            
            {{ (ns.total / 1000) | round(1) }}
          {% else %} 
            {{ this.state | float(0) }} 
          {% endif %}

      - name: "PV Forecast Weighted"
        unique_id: pv_forecast_weighted
        unit_of_measurement: "kWh"
        availability: >-
          {{ is_number(states('sensor.pv_forecast_solcast_alles')) or
             is_number(states('sensor.pv_forecast_solarprognose_alles')) or
             is_number(states('sensor.pv_forecast_forecastsolar_alles')) or
             is_number(states('sensor.pv_forecast_openmeteo_alles')) or 
             is_number(states('sensor.pv_forecast_ml_alles')) }}
        state: >-
          {% set sc = states('sensor.pv_forecast_solcast_alles') | float(0) %}
          {% set sp = states('sensor.pv_forecast_solarprognose_alles') | float(0) %}
          {% set fs = states('sensor.pv_forecast_forecastsolar_alles') | float(0) %}
          {% set om = states('sensor.pv_forecast_openmeteo_alles') | float(0) %}
          {% set ml = states('sensor.pv_forecast_ml_alles') | float(0) %}

          {% set sc_w = states('input_number.pv_kalman_score_solcast') | float(0.25) if sc > 0 else 0 %}
          {% set sp_w = states('input_number.pv_kalman_score_solarprognose') | float(0.15) if sp > 0 else 0 %}
          {% set fs_w = states('input_number.pv_kalman_score_forecastsolar') | float(0.15) if fs > 0 else 0 %}
          {% set om_w = states('input_number.pv_kalman_score_openmeteo') | float(0.45) if om > 0 else 0 %}
          {% set ml_w = states('input_number.pv_kalman_score_ml') | float(0.01) if ml > 0 else 0 %}          
          {% set total_weight = sc_w + sp_w + fs_w + om_w + ml_w %}
          {% set bias = states('input_number.pv_forecast_bias_korrekturfaktor') | float(1) %}
          {% if total_weight > 0 %}
            {{ ((sc_w * sc + sp_w * sp + fs_w * fs + om_w * om + ml_w * ml) / total_weight * bias) | round(2) }}
          {% else %} {{ this.state | float(0) }} {% endif %}

      # --- PROGNOSE des nächsten Tages---

      - name: "PV Forecast Solcast morgen"
        unique_id: pv_forecast_solcast_morgen
        unit_of_measurement: "kWh"
        state: >-
          {% set val = states('sensor.solcast_pv_forecast_prognose_morgen') %}
          {{ val if is_number(val) else states('sensor.pv_forecast_solcast_morgen') }}

      - name: "PV Forecast Solarprognose Morgen"
        unique_id: pv_forecast_solarprognose_morgen
        unit_of_measurement: "kWh"
        state: >-
          {% set dach_data = state_attr('sensor.solarprognose_api_raw_dach_stable', 'data') %}
          {% set fassade_data = state_attr('sensor.solarprognose_api_raw_fassade_stable', 'data') %}
          {% if dach_data is mapping %}
            {% set ns = namespace(total=0) %}
            {% set start_ts = (now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() + 86400) | int %}
            {% for i in range(24) %}
              {% set ts = (start_ts + i * 3600) | string %}
              {% set d = dach_data[ts][1] | float(0) if ts in dach_data else 0 %}
              {% set f = fassade_data[ts][1] | float(0) if fassade_data is mapping and ts in fassade_data else 0 %}
              {% set ns.total = ns.total + (d + f) %}
            {% endfor %}
            {{ ns.total | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast ForecastSolar Morgen"
        unique_id: pv_forecast_forecastsolar_morgen
        unit_of_measurement: "kWh"
        state: >-
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {% set dach = state_attr('sensor.forecastsolar_api_raw_dach_stable', 'result') %}
          {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade_stable', 'result') %}

          {% if dach is mapping and fassade is mapping %}
            {% set tomorrow_suffix = tomorrow ~ ' ' %}
            {% set ns = namespace(d_max=0, f_max=0) %}
            
            {% for ts, val in dach.items() if ts.startswith(tomorrow_suffix) %}
              {% if val > ns.d_max %}{% set ns.d_max = val %}{% endif %}
            {% endfor %}
            
            {% for ts, val in fassade.items() if ts.startswith(tomorrow_suffix) %}
              {% if val > ns.f_max %}{% set ns.f_max = val %}{% endif %}
            {% endfor %}

            {{ ((ns.d_max + ns.f_max) / 1000) | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast Openmeteo Morgen"
        unique_id: pv_forecast_openmeteo_morgen
        unit_of_measurement: "kWh"
        state: >-
          {% set dach = states('sensor.home_energy_pv_dach_production_tomorrow') | float(0) %}
          {% set fassade = states('sensor.home_energy_pv_fassade_production_tomorrow') | float(0) %}
          {{ dach + fassade }}

      - name: "PV Forecast Weighted Morgen"
        unique_id: pv_forecast_weighted_morgen
        unit_of_measurement: "kWh"
        state: >-
          {% set sc = states('sensor.pv_forecast_solcast_morgen') | float(0) %}
          {% set sp = states('sensor.pv_forecast_solarprognose_morgen') | float(0) %}
          {% set fs = states('sensor.pv_forecast_forecastsolar_morgen') | float(0) %}
          {% set om = states('sensor.pv_forecast_openmeteo_morgen') | float(0) %}
          {% set ml = states('sensor.pv_forecast_ml_morgen') | float(0) %}

          {% set sc_w = states('input_number.pv_kalman_score_solcast') | float(0.25) if sc > 0 else 0 %}
          {% set sp_w = states('input_number.pv_kalman_score_solarprognose') | float(0.15) if sp > 0 else 0 %}
          {% set fs_w = states('input_number.pv_kalman_score_forecastsolar') | float(0.15) if fs > 0 else 0 %}
          {% set om_w = states('input_number.pv_kalman_score_openmeteo') | float(0.45) if om > 0 else 0 %}
          {% set ml_w = states('input_number.pv_kalman_score_ml') | float(0.01) if ml > 0 else 0 %}

          {% set total_weight = sc_w + sp_w + fs_w + om_w + ml_w %}
          {% set bias = states('input_number.pv_forecast_bias_korrekturfaktor') | float(1) %}

          {% if total_weight > 0 %}
            {{ ((sc_w * sc + sp_w * sp + fs_w * fs + om_w * om + ml_w * ml) / total_weight * bias) | round(2) }}
          {% else %}
            0.0
          {% endif %}

automation:
  - alias: "PV: API Daten gezielt mehrmals täglich holen"
    id: pv_fetch_api_data_updates
    triggers:
      - trigger: time
        at:
          - "06:00:00"
          - "11:30:00"
          - "17:30:00"
    actions:
      - action: homeassistant.update_entity
        target:
          entity_id:
            - sensor.solarprognose_api_source_dach
            - sensor.solarprognose_api_source_fassade
            - sensor.forecastsolar_api_source_dach
            - sensor.forecastsolar_api_source_fassade

  - alias: "PV: Tagesprognosen morgens fixieren & speichern"
    id: pv_fix_daily_forecast_morning
    triggers:
      - trigger: time
        at:
          - "06:30:00"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.pv_prognose_festwert_heute
        data:
          value: "{{ states('sensor.pv_forecast_weighted') | float(0) }}"
      - repeat:
          for_each:
            - { id: "solcast" }
            - { id: "solarprognose" }
            - { id: "forecastsolar" }
            - { id: "openmeteo" }
            - { id: "ml" } # <-- Neu hinzugefügt
          sequence:
            - action: input_number.set_value
              target:
                entity_id: "input_number.pv_save_{{ repeat.item.id }}_morgens"
              data:
                value: "{{ states('sensor.pv_forecast_' ~ repeat.item.id ~ '_alles') | float(0) }}"

  - alias: "PV: Kalman-Update am Ende des Tages"
    id: pv_daily_kalman_update
    triggers:
      - trigger: time
        at: "23:55:00"
    variables:
      real: "{{ states('sensor.pv_ertrag_heute') | float(0) }}"
      forecast_heute: "{{ states('input_number.pv_prognose_festwert_heute') | float(0) }}"
      Q_bias: 0.001
      R_bias: 0.04
      Q_w: 0.005
      R_w: 0.1
    actions:
      # ── 1. BIAS – Kalman Update ─────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ forecast_heute > 2 and real > 0 }}"
        then:
          - variables:
              bias_alt: "{{ states('input_number.pv_forecast_bias_korrekturfaktor') | float(1.0) }}"
              P_bias_alt: "{{ states('input_number.pv_kalman_p_bias') | float(0.1) }}"
              messung_bias: "{{ real / forecast_heute }}"
              P_bias_pred: "{{ P_bias_alt + Q_bias }}"
              K_bias: "{{ P_bias_pred / (P_bias_pred + R_bias) }}"
              bias_neu: "{{ (bias_alt + K_bias * (messung_bias - bias_alt)) | clamp(0.6, 1.4) | round(4) }}"
              P_bias_neu: "{{ ((1 - K_bias) * P_bias_pred) | clamp(0.0001, 1.0) | round(5) }}"
          - action: input_number.set_value
            target:
              entity_id: input_number.pv_forecast_bias_korrekturfaktor
            data:
              value: "{{ bias_neu }}"
          - action: input_number.set_value
            target:
              entity_id: input_number.pv_kalman_p_bias
            data:
              value: "{{ P_bias_neu }}"

      # ── 2. Statistik wegschreiben ────────────────────────────────────────────
      - action: input_number.set_value
        target:
          entity_id: input_number.pv_prognose_von_gestern
        data:
          value: "{{ forecast_heute }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.pv_reale_ernte_von_gestern
        data:
          value: "{{ real | round(1) }}"

      # ── 3. GEWICHTE – Kalman Update (nur wenn genug Ertrag) ─────────────────
      - if:
          - condition: template
            value_template: "{{ real > 1.0 }}"
        then:
          - variables:
              obs_sc: "{{ 1.0 / ((states('input_number.pv_save_solcast_morgens')      | float(0) - real) | abs + 0.1) if states('input_number.pv_save_solcast_morgens')      | float > 0 else -1 }}"
              obs_sp: "{{ 1.0 / ((states('input_number.pv_save_solarprognose_morgens') | float(0) - real) | abs + 0.1) if states('input_number.pv_save_solarprognose_morgens') | float > 0 else -1 }}"
              obs_fs: "{{ 1.0 / ((states('input_number.pv_save_forecastsolar_morgens') | float(0) - real) | abs + 0.1) if states('input_number.pv_save_forecastsolar_morgens') | float > 0 else -1 }}"
              obs_om: "{{ 1.0 / ((states('input_number.pv_save_openmeteo_morgens')     | float(0) - real) | abs + 0.1) if states('input_number.pv_save_openmeteo_morgens')     | float > 0 else -1 }}"
              obs_ml: "{{ 1.0 / ((states('input_number.pv_save_ml_morgens')            | float(0) - real) | abs + 0.1) if states('input_number.pv_save_ml_morgens')            | float > 0 else -1 }}"

          - repeat:
              for_each:
                - id: "solcast"
                  obs: "{{ obs_sc }}"
                - id: "solarprognose"
                  obs: "{{ obs_sp }}"
                - id: "forecastsolar"
                  obs: "{{ obs_fs }}"
                - id: "openmeteo"
                  obs: "{{ obs_om }}"
                - id: "ml" # <-- Neu hinzugefügt
                  obs: "{{ obs_ml }}"

              sequence:
                - if:
                    - condition: template
                      value_template: "{{ repeat.item.obs | float(-1) >= 0 }}"
                  then:
                    - variables:
                        score_alt: "{{ states('input_number.pv_kalman_score_' ~ repeat.item.id) | float(1.0) }}"
                        P_alt: "{{ states('input_number.pv_kalman_p_' ~ repeat.item.id) | float(0.1) }}"
                        P_pred: "{{ P_alt + Q_w }}"
                        K: "{{ P_pred / (P_pred + R_w) }}"
                        score_neu: "{{ (score_alt + K * (repeat.item.obs | float(0) - score_alt)) | round(5) }}"
                        P_neu: "{{ ((1 - K) * P_pred) | clamp(0.0001, 1.0) | round(5) }}"
                    - action: input_number.set_value
                      target:
                        entity_id: "input_number.pv_kalman_score_{{ repeat.item.id }}"
                      data:
                        value: "{{ score_neu }}"
                    - action: input_number.set_value
                      target:
                        entity_id: "input_number.pv_kalman_p_{{ repeat.item.id }}"
                      data:
                        value: "{{ P_neu }}"

          # Scores → normierte Gewichte schreiben
          - variables:
              total_score: >-
                {{ [states('input_number.pv_kalman_score_solcast') | float(0), 0] | max +
                   [states('input_number.pv_kalman_score_solarprognose') | float(0), 0] | max +
                   [states('input_number.pv_kalman_score_forecastsolar') | float(0), 0] | max +
                   [states('input_number.pv_kalman_score_openmeteo') | float(0), 0] | max +
                   [states('input_number.pv_kalman_score_ml') | float(0), 0] | max }}
          - if:
              - condition: template
                value_template: "{{ total_score > 0 }}"
            then:
              - repeat:
                  for_each:
                    - "solcast"
                    - "solarprognose"
                    - "forecastsolar"
                    - "openmeteo"
                    - "ml"
                  sequence:
                    - action: input_number.set_value
                      target:
                        entity_id: "input_number.weight_{{ repeat.item }}"
                      data:
                        value: >-
                          {{ ([states('input_number.pv_kalman_score_' ~ repeat.item) | float(0), 0] | max
                              / total_score) | round(3) }}
