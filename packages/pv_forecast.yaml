# packages/pv_prognose.yaml

input_number:
  pv_prognose_von_gestern:
    name: "PV Prognose von gestern"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:chart-bell-curve

  pv_reale_ernte_von_gestern:
    name: "PV Reale Ernte von gestern"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:solar-power

sensor:
  # --- REST-SENSOREN (ROHDATEN) ---
  - platform: rest
    resource: "https://www.solarprognose.de/web/solarprediction/api/v1?access-token=c2a2da7b09c3c2e2a20651a2223e7fa7&item=module_field&id=14443&type=hourly"
    name: "Solarprognose Api Raw Dach"
    scan_interval: 86400
    value_template: >
      {% if value_json is defined and value_json.status is defined %}
        {{ value_json.status }}
      {% else %}
        {{ states('sensor.solarprognose_api_raw_dach') }}
      {% endif %}
    json_attributes:
      - data

  - platform: rest
    resource: "https://www.solarprognose.de/web/solarprediction/api/v1?access-token=c2a2da7b09c3c2e2a20651a2223e7fa7&item=module_field&id=14337&type=hourly"
    name: "Solarprognose Api Raw Fassade"
    scan_interval: 86400
    value_template: >
      {% if value_json is defined and value_json.status is defined %}
        {{ value_json.status }}
      {% else %}
        {{ states('sensor.solarprognose_api_raw_fassade') }}
      {% endif %}
    json_attributes:
      - data

  - platform: rest
    name: "ForecastSolar API Raw Dach"
    resource_template: >
      {% set lat = state_attr('zone.home', 'latitude') | default(47.1, true) %}
      {% set lon = state_attr('zone.home', 'longitude') | default(12.1, true) %}
      https://api.forecast.solar/estimate/watthours/{{lat}}/{{lon}}/30/-45/7.5
    value_template: >
      {% if value_json is defined and value_json.message is defined %}
        {{ value_json.message.info.place }}
      {% else %}
        {{ this.state }}
      {% endif %}
    json_attributes:
      - result
    scan_interval: 86400

  - platform: rest
    name: "ForecastSolar API Raw Fassade"
    resource_template: >
      {% set lat = state_attr('zone.home', 'latitude') | default(47.1, true) %}
      {% set lon = state_attr('zone.home', 'longitude') | default(12.1, true) %}
      https://api.forecast.solar/estimate/watthours/{{lat}}/{{lon}}/90/85/0.8
    value_template: >
      {% if value_json is defined and value_json.message is defined %}
        {{ value_json.message.info.place }}
      {% else %}
        {{ this.state }}
      {% endif %}
    json_attributes:
      - result
    scan_interval: 84000

# --- TEMPLATE-SENSOREN (BERECHNUNGEN) ---
template:
  - sensor:
      - name: "PV Forecast Solcast combined"
        unique_id: pv_forecast_solcast_combined
        unit_of_measurement: "kWh"
        state: >
          {% set val = states('sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute') %}
          {{ val if is_number(val) else states('sensor.PV_forecast_solcast_combined') }}

      - name: "Solarprognose Dach aktuell"
        unique_id: solarprognose_dach_aktuell
        unit_of_measurement: "kW"
        state: >
          {% set ts = (now().replace(minute=0, second=0, microsecond=0).timestamp() | int | string) %}
          {% set data = state_attr('sensor.solarprognose_api_raw_dach', 'data') %}
          {% if data is mapping and ts in data %}
            {{ data[ts][2] | float(0) }}
          {% else %} 0 {% endif %}

      - name: "Solarprognose Fassade aktuell"
        unique_id: solarprognose_fassade_aktuell
        unit_of_measurement: "kW"
        state: >
          {% set ts = (now().replace(minute=0, second=0, microsecond=0).timestamp() | int | string) %}
          {% set data = state_attr('sensor.solarprognose_api_raw_fassade', 'data') %}
          {% if data is mapping and ts in data %}
            {{ data[ts][1] | float(0) }}
          {% else %} 0 {% endif %}

      - name: "PV Forecast Solarprognose Combined"
        unique_id: pv_forecast_solarprognose_combined
        unit_of_measurement: "kWh"
        state: >
          {% set dach_data = state_attr('sensor.solarprognose_api_raw_dach', 'data') %}
          {% set balkon_data = state_attr('sensor.solarprognose_api_raw_fassade', 'data') %}
          {% if dach_data is mapping %}
            {% set ns = namespace(items=[]) %}
            {% set start_ts = now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() | int %}
            {% for i in range(24) %}
              {% set ts = (start_ts + (i * 3600)) | string %}
              {% set d = dach_data[ts][1] | float(0) if ts in dach_data else 0 %}
              {% set b = balkon_data[ts][1] | float(0) if balkon_data is mapping and ts in balkon_data else 0 %}
              {% set ns.items = ns.items + [ d + (b * 3) ] %}
            {% endfor %}
            {% set current_hour = now().hour %}
            {{ ns.items[current_hour:] | sum | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast ForecastSolar Combined"
        unique_id: pv_forecast_forecastsolar_combined
        unit_of_measurement: "kWh"
        state: >
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set dach = state_attr('sensor.forecastsolar_api_raw_dach', 'result') %}
          {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade', 'result') %}

          {% if dach is mapping and fassade is mapping %}
            {# Wir suchen den letzten Wert des heutigen Tages (Maximum) #}
            {% set today_suffix = today ~ ' ' %}
            {% set ns = namespace(d_max=0, f_max=0, d_now=0, f_now=0) %}
            
            {# Aktuelle Stunde für den Abzug finden #}
            {% set current_ts = now().strftime('%Y-%m-%d %H:00:00') %}
            
            {% for ts, val in dach.items() if ts.startswith(today_suffix) %}
              {% if val > ns.d_max %}{% set ns.d_max = val %}{% endif %}
              {% if ts <= now().strftime('%Y-%m-%d %H:%M:%S') %}
                {% set ns.d_now = val %}
              {% endif %}
            {% endfor %}
            
            {% for ts, val in fassade.items() if ts.startswith(today_suffix) %}
              {% if val > ns.f_max %}{% set ns.f_max = val %}{% endif %}
              {% if ts <= now().strftime('%Y-%m-%d %H:%M:%S') %}
                {% set ns.f_now = val %}
              {% endif %}
            {% endfor %}

            {# Berechnung: (Gesamt heute - bereits produziert) / 1000 #}
            {# Fassade wird hier mit Faktor 3 gewichtet #}
            {% set rest_dach = (ns.d_max - ns.d_now) %}
            {% set rest_fassade = (ns.f_max - ns.f_now) %}
            {{ ([0, (rest_dach + 3 * rest_fassade) / 1000] | max) | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast openmeteo Combined"
        unique_id: pv_forecast_openmeteo_combined
        unit_of_measurement: "kWh"
        state: >
          {% set dach = state_attr('sensor.home_energy_pv_dach_production_today', 'wh_period') %}
          {% set fassade = state_attr('sensor.home_energy_pv_fassade_production_today', 'wh_period') %}
          {% if dach is mapping and fassade is mapping %}
            {% set ns = namespace(hourly=[]) %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% for i in range(24) %}
              {% set hour = "%02d" | format(i) %}
              {% set ts = today ~ 'T' ~ hour ~ ':00:00+01:00' %}
              {% set d = dach[ts] | float(0) if ts in dach else 0 %}
              {% set f = fassade[ts] | float(0) if ts in fassade else 0 %}
              {% set ns.hourly = ns.hourly + [ (d + 3*f) / 1000 ] %}
            {% endfor %}
            {% set current_hour = now().hour %}
            {{ ns.hourly[current_hour:] | sum | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast Weighted without BIAS"
        unique_id: pv_forecast_weighted_without_bias
        unit_of_measurement: "kWh"
        state: >
          {# 1. Daten abrufen #}
          {% set sc = states('sensor.pv_forecast_solcast_combined') | float(0) %}
          {% set sp = states('sensor.pv_forecast_solarprognose_combined') | float(0) %}
          {% set fs = states('sensor.pv_forecast_forecastsolar_combined') | float(0) %}
          {% set om = states('sensor.pv_forecast_openmeteo_combined') | float(0) %}

          {# 2. Gewichtung festlegen (0.0 wenn Quelle leer) #}
          {% set sc_w = 0.4 if sc > 0 else 0.0 %}
          {% set sp_w = 0.3 if sp > 0 else 0.0 %}
          {% set fs_w = 0.2 if fs > 0 else 0.0 %}
          {% set om_w = 0.1 if om > 0 else 0.0 %}
          {% set total_weight = sc_w + sp_w + fs_w + om_w %}

          {% if total_weight > 0 %}
            {{ (sc_w * sc + sp_w * sp + fs_w * fs + om_w * om) / total_weight }}
          {% else %}
            0.0
          {% endif %}

      - name: "PV Forecast Weighted"
        unique_id: pv_forecast_weighted
        unit_of_measurement: "kWh"
        state: >
          {% set raw_val = states('sensor.pv_forecast_weighted_without_bias') | float(0) %}
          {% set adaptive_bias = states('sensor.pv_forecast_bias_korrekturfaktor') | float(0.85) %}
          {{ (raw_val * adaptive_bias) | round(2) }}

      # --- MORGEN PROGNOSE ---

      - name: "PV Forecast Solcast morgen"
        unique_id: pv_forecast_solcast_morgen
        unit_of_measurement: "kWh"
        state: >
          {% set val = states('sensor.solcast_pv_forecast_prognose_morgen') %}
          {{ val if is_number(val) else states('sensor.PV_forecast_solcast_morgen') }}

      - name: "PV Forecast Solarprognose Morgen"
        unique_id: pv_forecast_solarprognose_morgen
        unit_of_measurement: "kWh"
        state: >
          {% set dach_data = state_attr('sensor.solarprognose_api_raw_dach', 'data') %}
          {% set fassade_data = state_attr('sensor.solarprognose_api_raw_fassade', 'data') %}
          {% if dach_data is mapping %}
            {% set ns = namespace(total=0) %}
            {% set start_ts = (now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() + 86400) | int %}
            {% for i in range(24) %}
              {% set ts = (start_ts + (i * 3600)) | string %}
              {% set d = dach_data[ts][1] | float(0) if ts in dach_data else 0 %}
              {% set f = fassade_data[ts][1] | float(0) if fassade_data is mapping and ts in fassade_data else 0 %}
              {% set ns.total = ns.total + (d + (f * 3)) %}
            {% endfor %}
            {{ ns.total | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast ForecastSolar Morgen"
        unique_id: pv_forecast_forecastsolar_morgen
        unit_of_measurement: "kWh"
        state: >
          {% set tomorrow = (now() + timedelta(days=1)).strftime('%Y-%m-%d') %}
          {% set dach = state_attr('sensor.forecastsolar_api_raw_dach', 'result') %}
          {% set fassade = state_attr('sensor.forecastsolar_api_raw_fassade', 'result') %}

          {% if dach is mapping and fassade is mapping %}
            {% set tomorrow_suffix = tomorrow ~ ' ' %}
            {% set ns = namespace(d_max=0, f_max=0) %}
            
            {# Einfach den höchsten Wert (Endwert) für morgen finden #}
            {% for ts, val in dach.items() if ts.startswith(tomorrow_suffix) %}
              {% if val > ns.d_max %}{% set ns.d_max = val %}{% endif %}
            {% endfor %}
            
            {% for ts, val in fassade.items() if ts.startswith(tomorrow_suffix) %}
              {% if val > ns.f_max %}{% set ns.f_max = val %}{% endif %}
            {% endfor %}

            {{ ((ns.d_max + 3 * ns.f_max) / 1000) | round(2) }}
          {% else %} 0.0 {% endif %}

      - name: "PV Forecast Openmeteo Morgen"
        unique_id: pv_forecast_openmeteo_morgen
        unit_of_measurement: "kWh"
        state: >
          {% set dach = states('sensor.home_energy_pv_dach_production_tomorrow') | float(0) %}
          {% set fassade = states('sensor.home_energy_pv_fassade_production_tomorrow') | float(0) %}
          {{ dach + 3*fassade }}

      - name: "PV Forecast Weighted Morgen"
        unique_id: pv_forecast_weighted_morgen
        unit_of_measurement: "kWh"
        state: >
          {% set sc = states('sensor.pv_forecast_solcast_morgen') | float(0) %}
          {% set sp = states('sensor.pv_forecast_solarprognose_morgen') | float(0) %}
          {% set fs = states('sensor.pv_forecast_forecastsolar_morgen') | float(0) %}
          {% set om = states('sensor.pv_forecast_openmeteo_morgen') | float(0) %}

          {% set sc_w = 0.4 if sc > 0 else 0.0 %}
          {% set sp_w = 0.3 if sp > 0 else 0.0 %}
          {% set fs_w = 0.2 if fs > 0 else 0.0 %}
          {% set om_w = 0.1 if om > 0 else 0.0 %}
          {% set total_weight = sc_w + sp_w + fs_w + om_w %}

          {% if total_weight > 0 %}
            {{ ((sc_w * sc + sp_w * sp + fs_w * fs + om_w * om) / total_weight) | round(2) }}
          {% else %}
            0.0
          {% endif %}

  - trigger:
      - platform: state
        entity_id: input_number.pv_reale_ernte_von_gestern
    sensor:
      - name: "PV Forecast Bias Korrekturfaktor"
        unique_id: pv_forecast_bias_korrekturfaktor
        unit_of_measurement: "ratio"
        state: >
          {% set real_yesterday = states('input_number.pv_reale_ernte_von_gestern') | float(0) %}
          {% set forecast_raw_yesterday = states('input_number.pv_prognose_von_gestern') | float(0) %}
          {% set current_bias = states('sensor.pv_forecast_bias_korrekturfaktor') | float(0.85) %}

          {% if forecast_raw_yesterday > 2 and real_yesterday > 0 %}
            {% set instant_ratio = real_yesterday / forecast_raw_yesterday %}
            {% set new_bias = (current_bias * 0.8) + (instant_ratio * 0.2) %}
            {{ [[0.6, new_bias] | max, 1.1] | min | round(3) }}
          {% else %}
            {{ current_bias }}
          {% endif %}

automation:
  - alias: "PV: Täglicher Prognose-Vergleich speichern"
    id: pv_daily_comparison_storage
    trigger:
      - platform: time
        at: "23:55:00"
    action:
      # 1. Speichere die Prognose, die HEUTE früh für HEUTE galt
      # (Hier nehmen wir den gewichteten Wert ohne den Bias von heute)
      - action: input_number.set_value
        target:
          entity_id: input_number.pv_prognose_von_gestern
        data:
          value: "{{ states('sensor.pv_forecast_weighted') | float(0) }}"

      # 2. Speichere die reale Ernte von heute
      # Nutze hier deinen summierten Tages-Ertragssensor
      - action: input_number.set_value
        target:
          entity_id: input_number.pv_reale_ernte_von_gestern
        data:
          value: "{{ states('sensor.daily_pv_production_total') | float(0) }}"
