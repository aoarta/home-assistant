# ============================================================
# PV surplus wallbox charging (WARP3) - Sensors
# ============================================================

template:
  # ----------------------------------------------------------
  # PV surplus expressed in Amps (0, or 6..wallbox_max_amps).
  # ----------------------------------------------------------
  - triggers:
      - trigger: time_pattern
        seconds: "/30"
      - trigger: state
        entity_id:
          - sensor.pv_production_power
          - sensor.house_consumption_power_brutto
          - sensor.marstek_venus_1_ac_power_glatt
          - sensor.marstek_venus_2_ac_power_glatt
          - sensor.solarnet_leistung_vom_netz
    sensor:
      - name: "PV Dynamic Charging Current"
        unique_id: pv_dynamic_charging_current
        unit_of_measurement: "A"
        state: >-
          {% set pv_power = states('sensor.pv_production_power') | float(0) %}
          {% set house_power = states('sensor.house_consumption_power_brutto') | float(0) %}
          {% set battery_power = states('sensor.marstek_venus_1_ac_power_glatt') | float(0)
                               + states('sensor.marstek_venus_2_ac_power_glatt') | float(0) %}
          {% set grid_power = states('sensor.solarnet_leistung_vom_netz') | float(0) %}

          {% set surplus = pv_power - house_power - battery_power - grid_power %}
          {% set amps = (surplus / 230) | round(0, 'ceil') | int %}
          {% set max_amps = state_attr('sensor.global_parameter', 'wallbox_max_amps') | float(16) %}
          {% if surplus > 0 and amps >= 6 %}
            {{ [amps, max_amps] | min }}
          {% else %}
            {{ 0 }}
          {% endif %}

  # ----------------------------------------------------------
  # Energy delivered in the current charging session (since last plug-in).
  # ----------------------------------------------------------
  - triggers:
      - trigger: state
        entity_id: sensor.warp3_2ita_energyabs
      - trigger: state
        entity_id: input_number.ev_session_start_energy_kwh
    sensor:
      - name: "EV Session Energy"
        unique_id: ev_session_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set meter = states('sensor.warp3_2ita_energyabs') | float(-1) %}
          {% set start = states('input_number.ev_session_start_energy_kwh') | float(-1) %}
          {% if meter < 0 or start < 0 %}
            0
          {% else %}
            {{ [meter - start, 0] | max | round(3) }}
          {% endif %}
        attributes:
          start_energy_kwh: "{{ states('input_number.ev_session_start_energy_kwh') }}"
          meter_kwh: "{{ states('sensor.warp3_2ita_energyabs') }}"

  # ----------------------------------------------------------
  # Energy limit for the current session, derived from vehicle mode and percent.
  # ----------------------------------------------------------
  - sensor:
      - name: "EV Max Charge Energy"
        unique_id: ev_max_charge_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set mode = states('input_select.ev_vehicle_mode') %}
          {% set pct = states('input_number.ev_charge_percent') | float(0) %}
          {% if mode == 'off' or pct == 0 %}
            0
          {% else %}
            {% if mode == 'zero' %}
              {% set capacity = state_attr('sensor.global_parameter', 'zero_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'zero_charge_efficiency') | float(0.88) %}
            {% elif mode == 'honda_e' %}
              {% set capacity = state_attr('sensor.global_parameter', 'honda_e_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'honda_e_charge_efficiency') | float(0.88) %}
            {% else %}
              {% set capacity = 0 %}
              {% set efficiency = 1 %}
            {% endif %}
            {% if capacity == 0 or efficiency == 0 %}
              0
            {% else %}
              {{ (capacity * pct / 100 / efficiency) | round(2) }}
            {% endif %}
          {% endif %}
        attributes:
          mode: "{{ states('input_select.ev_vehicle_mode') }}"
          percent: "{{ states('input_number.ev_charge_percent') }}"
