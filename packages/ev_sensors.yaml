# ============================================================
# PV surplus wallbox charging (WARP3) - Sensors
# ============================================================

template:
  # ----------------------------------------------------------
  # 1. PV Dynamic Current (EV FIRST)
  # Hausbatterie-Ladestrom (negativer Wert) wird freigegeben.
  # ----------------------------------------------------------
  - trigger:
      - platform: time_pattern
        seconds: "/30"
      - platform: state
        entity_id:
          - sensor.warp3_2ita_powernow
          - sensor.leistung_vom_netz
          - sensor.marstek_venus_1_ac_power_glatt
          - sensor.marstek_venus_2_ac_power_glatt
    sensor:
      - name: "PV Dynamic Charging Current"
        unique_id: pv_dynamic_charging_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if not cable_connected %}
            0
          {% else %}
            {% set charger_power = states('sensor.warp3_2ita_powernow') | float(0) %}
            {% set power_from_net = states('sensor.leistung_vom_netz') | float(0) %}
            {% set venus1 = states('sensor.marstek_venus_1_ac_power_glatt') | float(0) %}
            {% set venus2 = states('sensor.marstek_venus_2_ac_power_glatt') | float(0) %}
            {% set charger_voltage = states('sensor.smart_meter_ts_65a_3_spannung_l1') | float(235) %}

            {# Batterie-Ladung (negativ) wird abgezogen (erhöht den Überschuss) #}
            {% set surplus = charger_power - power_from_net - venus1 - venus2 %}
            {% set amps = (surplus / charger_voltage + 0.2) | round(0, 'floor') | int %} 
            {% set max_amps = state_attr('sensor.global_parameter', 'wallbox_max_amps') | float(16) %}

            {% if amps >= 6 %}
              {{ [amps, max_amps] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}

  # ----------------------------------------------------------
  # 2. PV Dynamic Current (BATTERY FIRST)
  # Hausbatterie wird geschont. Ihr Ladestrom wird NICHT der Wallbox zugeschlagen.
  # ----------------------------------------------------------
  - trigger:
      - platform: time_pattern
        seconds: "/30"
      - platform: state
        entity_id:
          - sensor.warp3_2ita_powernow
          - sensor.leistung_vom_netz
          - sensor.marstek_venus_1_ac_power_glatt
          - sensor.marstek_venus_2_ac_power_glatt
    sensor:
      - name: "PV Dynamic Charging Current Battery First"
        unique_id: pv_dynamic_charging_current_battery_first
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if not cable_connected %}
            0
          {% else %}
            {% set charger_power = states('sensor.warp3_2ita_powernow') | float(0) %}
            {% set power_from_net = states('sensor.leistung_vom_netz') | float(0) %}
            {% set venus1 = states('sensor.marstek_venus_1_ac_power_glatt') | float(0) %}
            {% set venus2 = states('sensor.marstek_venus_2_ac_power_glatt') | float(0) %}
            {% set charger_voltage = states('sensor.smart_meter_ts_65a_3_spannung_l1') | float(235) %}

            {# Falls Batterie lädt (Wert negativ), ignorieren wir diesen Anteil im Überschuss #}
            {% set v1_clean = [venus1, 0] | max %}
            {% set v2_clean = [venus2, 0] | max %}

            {% set surplus = charger_power - power_from_net - v1_clean - v2_clean %}
            {% set amps = (surplus / charger_voltage + 0.2) | int %}
            {% set max_amps = state_attr('sensor.global_parameter', 'wallbox_max_amps') | float(16) %}

            {% if amps >= 6 %}
              {{ [amps, max_amps] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}

  # ----------------------------------------------------------
  # Standard-Einträge für Energie-Berechnungen belassen
  # ----------------------------------------------------------
  - trigger:
      - platform: state
        entity_id: sensor.warp3_2ita_energyabs
      - platform: state
        entity_id: input_number.ev_session_start_energy_kwh

    sensor:
      - name: "EV Session Energy"
        unique_id: ev_session_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set meter = states('sensor.warp3_2ita_energyabs') | float(-1) %}
          {% set start = states('input_number.ev_session_start_energy_kwh') | float(-1) %}
          {% if meter < 0 or start < 0 %}
            0
          {% else %}
            {{ [meter - start, 0] | max | round(3) }}
          {% endif %}

  - sensor:
      - name: "EV Max Charge Energy"
        unique_id: ev_max_charge_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set mode = states('input_select.ev_vehicle_mode') %}
          {% set pct = states('input_number.ev_charge_by_percent') | float(0) %}
          {% if mode == 'off' or pct == 0 %}
            0
          {% else %}
            {% if mode == 'zero' %}
              {% set capacity = state_attr('sensor.global_parameter', 'zero_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'zero_charge_efficiency') | float(0.88) %}
            {% elif mode == 'honda_e' %}
              {% set capacity = state_attr('sensor.global_parameter', 'honda_e_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'honda_e_charge_efficiency') | float(0.88) %}
            {% else %}
              {% set capacity = 0 %}
              {% set efficiency = 1 %}
            {% endif %}
            {% if capacity == 0 or efficiency == 0 %}
              0
            {% else %}
              {{ (capacity * pct / 100 / efficiency) | round(2) }}
            {% endif %}
          {% endif %}

      - name: "EV Charging Power"
        unique_id: ev_charging_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set power = states('sensor.warp3_2ita_powernow') | float(0) %}
          {{ -power if power is not none else 0 }}

      - name: "Zero SOC"
        unique_id: zero_soc
        unit_of_measurement: "%"
        state: >-
          {% set raw = states('sensor.zero_sr_s_mbb_zero_soc') %}
          {% if is_number(raw) %}
            {{ raw | float | round(0) }}
          {% else %}
            {{ this.state | float(-1) }}
          {% endif %}

      - name: "HondaE SOC"
        unique_id: hondae_soc
        unit_of_measurement: "%"
        state: >-
          {% set raw = states('sensor.nix_da') %}
          {% if is_number(raw) %}
            {{ raw | float | round(0) }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}
