################################################################################
# 1. BMS DATEN-EXTRAKTION (CURL & REGEX)
################################################################################
command_line:
  - sensor:
      name: "UPS Raw Data"
      unique_id: ups_raw_data
      command: "curl -s http://battery-bms.lan/show | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"
      scan_interval: 20
      value_template: "{{ value }}"

################################################################################
# 2. PLATTFORM SENSOREN (FILTER & INTEGRATION)
################################################################################
sensor:
  - platform: filter
    name: "UPS AC Leistung glatt"
    unique_id: ups_ac_leistung_glatt
    entity_id: sensor.ups_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 5
        precision: 0
      - filter: time_throttle
        window_size: "00:00:30"

  - platform: integration
    source: sensor.ups_ac_leistung_glatt
    name: "UPS Energiefluss Wh"
    unique_id: ups_energiefluss_wh
    round: 0
    method: left

  - platform: filter
    name: "UPS SOC stabil"
    unique_id: ups_soc_stabil
    entity_id: sensor.ups_soc
    filters:
      - filter: lowpass
        time_constant: 2
        precision: 1
      - filter: time_throttle
        window_size: "00:00:40"

  - platform: filter
    name: "Target Charge stabil"
    unique_id: target_charge_stabil
    entity_id: sensor.target_charge_distribution
    filters:
      - filter: time_throttle
        window_size: "00:00:10"

  - platform: filter
    name: "Target Discharge stabil"
    unique_id: target_discharge_stabil
    entity_id: sensor.target_discharge_distribution
    filters:
      - filter: time_throttle
        window_size: "00:00:10"

  - platform: filter
    name: "UPS Highest Cell stabil"
    unique_id: ups_highest_cell_stabil
    entity_id: sensor.ups_highest_cell
    filters:
      - filter: lowpass
        time_constant: 1
        precision: 3
      - filter: time_throttle
        window_size: "00:00:20"

  - platform: filter
    name: "UPS Lowest Cell stabil"
    unique_id: ups_lowest_cell_stabil
    entity_id: sensor.ups_lowest_cell
    filters:
      - filter: lowpass
        time_constant: 1
        precision: 3
      - filter: time_throttle
        window_size: "00:00:20"

################################################################################
# 3. TEMPLATE SENSOREN
################################################################################
template:
  - trigger:
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell_stabil
        above: 3.575
        for: "00:00:10"
      - platform: state
        entity_id: sensor.ups_soc_stabil
        to: "100.0"
        for: "00:01:00"
      - platform: state
        entity_id: sensor.ups_custom_soc
        to: "100.0"
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS SOC Reset Punkt"
        unique_id: ups_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >
          {% set current_energy = states('sensor.ups_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.ups_soc_reset_punkt') %}
          {% set hw_soc = states('sensor.ups_soc_stabil') | float(0) %}
          {% set high_cell = states('sensor.ups_highest_cell_stabil') | float(0) %}

          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}
          {# Reset wenn HW-SOC 100 oder Zelle voll #}
          {% if hw_soc >= 100 or high_cell >= 3.575 %}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ups_custom_soc
        to: "100"
        for: "00:01:00"
    sensor:
      - name: "UPS Last Full"
        unique_id: ups_last_full_timestamp
        device_class: timestamp
        state: "{{ now() }}"

  - trigger:
      - platform: state
        entity_id: sensor.ups_energiefluss_wh
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS Custom SOC"
        unique_id: ups_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {% set hw_soc = states('sensor.ups_soc_stabil') | float(-1) %}
          {% set neu_wh = states('sensor.ups_energiefluss_wh') | float('unknown') %}
          {% set reset_wh = states('sensor.ups_soc_reset_punkt') | float('unknown') %}

          {# Wenn Hardware offline oder Sensoren nicht bereit -> alten Zustand beibehalten #}
          {% if hw_soc == -1 or neu_wh == 'unknown' or reset_wh == 'unknown' %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs > 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set cap_wh = 1960 %}
                {% set calc_soc = 100 - ((neu_wh - reset_wh) / cap_wh * 100) %}
                
                {# Begrenzt den Wert sauber zwischen 0 und 100 und rundet #}
                {{ calc_soc | round(1) | clamp(0, 100) }}
              {% endif %}
            {% else %}
              {{ this.state if is_number(this.state) else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >
            {% set hw_soc = states('sensor.ups_soc_stabil') | float(-1) %}
            {% set neu_wh = states('sensor.ups_energiefluss_wh') | float('unknown') %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh == 'unknown' or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ups_raw_data
    sensor:
      - name: "UPS SOC"
        unique_id: ups_soc
        unit_of_measurement: "%"
        device_class: battery
        state: "{{ trigger.to_state.state | regex_findall('SOC:\\s*([0-9.]+)') | first | default(states('sensor.ups_soc')) | float(0) }}"

      - name: "UPS Power"
        unique_id: ups_power
        unit_of_measurement: "W"
        device_class: power
        state: "{{ trigger.to_state.state | regex_findall('Power:\\s*(-?[0-9.]+)') | first | default(states('sensor.ups_power')) | float(0) }}"

      - name: "UPS Highest Cell"
        unique_id: ups_highest_cell
        unit_of_measurement: "V"
        state: "{{ trigger.to_state.state | regex_findall('highest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_highest_cell')) | float(0) }}"

      - name: "UPS Lowest Cell"
        unique_id: ups_lowest_cell
        unit_of_measurement: "V"
        state: "{{ trigger.to_state.state | regex_findall('lowest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_lowest_cell')) | float(0) }}"

  - trigger:
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS free Capacity kWh"
        unique_id: ups_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >
          {% set total_kwh = 2.0 %} 
          {% set soc = states('sensor.ups_soc') | float(-1) %}
          {{ (total_kwh * (1 - (soc / 100))) | round(2) if soc >= 0 else 0 }}
        availability: "{{ is_number(states('sensor.ups_soc')) }}"

  - sensor:
      - name: "Battery total charge power"
        unique_id: battery_total_charge_power
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set p1 = states('sensor.battery_charger_energy_power') | float(0) %}
          {% set p2 = states('sensor.battery_charger2_energy_power') | float(0) %}
          {{ (p1 + p2) | round(1) }}

      - name: "UPS AC Leistung"
        unique_id: ups_ac_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set charging = states('sensor.battery_total_charge_power') | float(0) %}
          {% set discharging = states('sensor.battery_inverter_energy_power') | float(0) %}
          {{ (discharging - charging) | round(1) }}

################################################################################
# 4. AUTOMATIONEN
################################################################################
automation:
  - alias: "UPS Grobregelung Laden & Entladen"
    id: ups_grob_control_full
    mode: queued
    max: 10
    trigger:
      - platform: state
        entity_id:
          - sensor.target_discharge_distribution
          - sensor.target_charge_distribution
          - sensor.ups_soc_stabil
          - sensor.ups_lowest_cell_stabil
          - sensor.ups_highest_cell_stabil
          - binary_sensor.batterie_wartung_erforderlich
    action:
      - choose:
          # --- Wartungsmodus ein (mit Überladeschutz!)
          - conditions:
              - condition: template
                value_template: >
                  {% set high_cell = states('sensor.ups_highest_cell_stabil') | float(3.65) %}
                  {# Nur laden wenn Wartung aktiv UND Batterie noch nicht voll #}
                  {{ states('input_number.manuelle_ladeleistung') | float(0) >= 1000 
                     and high_cell < 3.58 }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }

          # --- NOT-LADUNG (SOC zu niedrig) ---
          - conditions:
              - condition: template
                value_template: >
                  {% set soc = states('sensor.ups_soc_stabil') | float(100) %}
                  {% set low_cell = states('sensor.ups_lowest_cell_stabil') | float(3.65) %}
                  {{ (soc <= 15 or low_cell < 2.95) and is_state('switch.battery_charger2', 'off') }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }
                #
          # --- ENTLADEN STARTEN ---
          - conditions:
              - condition: template
                value_template: >
                  {% set target_discharge = states('sensor.target_discharge_distribution_fast') | float(0) %}
                  {% set soc = states('sensor.ups_soc_stabil') | float(0) %}
                  {% set low_cell = states('sensor.ups_lowest_cell_stabil') | float(3.3) %}
                  {{ target_discharge > 180 and soc > 25 and low_cell > 3.1 and is_state('switch.battery_inverter_tasmota', 'off') }}
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: [switch.battery_charger, switch.battery_charger2]
              - action: switch.turn_on
                target: { entity_id: switch.battery_inverter_tasmota }

          # --- ENTLADEN STOPPEN ---
          - conditions:
              - condition: template
                value_template: >
                  {% set target_discharge = states('sensor.target_discharge_distribution_fast') | float(0) %}
                  {% set soc = states('sensor.ups_soc_stabil') | float(0) %}
                  {% set low_cell = states('sensor.ups_lowest_cell_stabil') | float(2.8) %}
                  {{ (target_discharge < 20 or soc <= 20 or low_cell < 3.0) and is_state('switch.battery_inverter_tasmota', 'on') }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }

          # --- LADEN STOPPEN ---
          - conditions:
              - condition: template
                value_template: >
                  {% set target_charge = states('sensor.target_charge_distribution_fast') | float(0) %}
                  {% set soc = states('sensor.ups_soc_stabil') | float(100) %}
                  {% set high_cell = states('sensor.ups_highest_cell_stabil') | float(3.65) %}
                  {{ (target_charge < 100 or soc >= 100 or high_cell > 3.58) and (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: [switch.battery_charger, switch.battery_charger2]

          # --- LADEN STARTEN ---
          - conditions:
              - condition: template
                value_template: >
                  {% set target_charge = states('sensor.target_charge_distribution_fast') | float(0) %}
                  {% set soc = states('sensor.ups_soc_stabil') | float(100) %}
                  {{ target_charge > 820 and soc < 98 and is_state('switch.battery_inverter_tasmota', 'off') }}
            sequence:
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger }
              - if:
                  - condition: template
                    value_template: "{{ states('sensor.target_charge_distribution_fast') | float(0) > 1200 and states('sensor.ups_soc_stabil') | float(0) < 99 }}"
                then:
                  - delay: "00:00:01"
                  - action: switch.turn_on
                    target: { entity_id: switch.battery_charger2 }

  - alias: "Sicherheitsabschaltung: Charger und Inverter gleichzeitig"
    id: safety_simultaneous_power
    trigger:
      - platform: state
        entity_id:
          - switch.battery_inverter_tasmota
          - switch.battery_charger
          - switch.battery_charger2
        to: "on"
        for: "00:00:03" # Erst nach 3 Sek. Gleichzeitigkeit triggern, um Umschaltvorgänge zu erlauben
    condition:
      - condition: template
        value_template: >
          {{ is_state('switch.battery_inverter_tasmota', 'on') and 
             (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
    action:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.battery_inverter_tasmota
            - switch.battery_charger
            - switch.battery_charger2
    mode: restart
