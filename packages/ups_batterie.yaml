################################################################################
# 1. BMS DATEN-EXTRAKTION
################################################################################
#command_line:
#  - sensor:
#      name: "UPS Raw Data"
#      unique_id: ups_raw_data
#      #command: "curl -s http://battery-bms.lan/show | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"

#      #command: "curl --max_time 2 -s http://192.168.0.13/show 2>/dev/null | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"
#      command: "curl --max_time 2 -s http://192.168.0.134/show | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"

#      scan_interval: 30
#      value_template: "{{ value }}"

input_number:
  ups_energiefluss_wh_counter:
    name: UPS Energiefluss Counter
    min: -50000
    max: 50000
    step: 1

rest:
  - resource: http://192.168.0.13/show
    scan_interval: 30 # Abfrageintervall in Sekunden anpassen, falls gewünscht
    sensor:
      - name: "UPS SOC"
        value_template: "{{ value | regex_findall('SOC:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement

      - name: "UPS Power"
        value_template: "{{ value | regex_findall('Power:\\s*([-0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      - name: "BMS Current"
        value_template: "{{ value | regex_findall('Current:\\s*([-0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement

      - name: "BMS Total Voltage"
        value_template: "{{ value | regex_findall('totalVoltage:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "BMS Total Capacity"
        value_template: "{{ value | regex_findall('totalCapacity:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "Ah"
        state_class: measurement

      - name: "BMS Remaining Capacity"
        value_template: "{{ value | regex_findall('remainingCapacity:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "Ah"
        state_class: measurement

      - name: "UPS Highest Cell"
        value_template: "{{ value | regex_findall('highest Cell.*:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "UPS Lowest Cell"
        value_template: "{{ value | regex_findall('lowest Cell.*:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "BMS Cell Diff"
        # Beachte: "Cell diff" hat in deiner Ausgabe keinen Doppelpunkt, daher fangen wir nur die Leerzeichen ab
        value_template: "{{ value | regex_findall('Cell diff\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "BMS Temperature Probe 0"
        value_template: "{{ value | regex_findall('Probe 0:\\s*([-0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "BMS Temperature Probe 1"
        value_template: "{{ value | regex_findall('Probe 1:\\s*([-0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

################################################################################
# 2. PLATTFORM SENSOREN (FILTER & INTEGRATION)
################################################################################
sensor:
  - platform: filter
    name: "UPS AC Leistung glatt"
    unique_id: ups_ac_leistung_glatt
    entity_id: sensor.ups_ac_leistung
    filters:
      - filter: lowpass
        time_constant: 3
        precision: 0
      - filter: time_throttle
        window_size: "00:00:30"

#  - platform: integration
#    name: "UPS Energiefluss Wh"
#    unique_id: ups_energiefluss_wh
#    source: sensor.ups_ac_leistung_glatt
#    round: 0
#    method: left

################################################################################
# 3. TEMPLATE SENSOREN
################################################################################
template:
  - sensor:
      - name: "UPS Energiefluss Wh"
        unique_id: ups_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.ups_energiefluss_wh_counter') }}

  - trigger:
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell
        above: 3.5
        for: "00:00:10"
      - platform: numeric_state
        entity_id: sensor.ups_soc
        above: "99.9"
        for: "00:01:00"
      - platform: numeric_state
        entity_id: sensor.ups_custom_soc
        above: "99.9"
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS SOC Reset Punkt"
        unique_id: ups_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.ups_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.ups_soc_reset_punkt') %}
          {% set hw_soc = states('sensor.ups_soc') | float(0) %}
          {% set high_cell = states('sensor.ups_highest_cell') | float(0) %}
          {% set lfp_max_voltage = state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) %}          
          {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}

          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {# Sync auf HW-SOC wenn Batterie fast leer #}          
          {% if hw_soc < 15 %}
            {{ current_energy - (hw_soc / 100 * capacity) }}
          {# Reset wenn HW-SOC 100 oder Zelle voll #}
          {% elif hw_soc >= 100 or high_cell >= lfp_max_voltage %}
            {{ [current_energy, last_reset] | min }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - trigger:
      - platform: numeric_state
        entity_id: sensor.ups_custom_soc
        above: "99.9"
        for: "00:00:05"
    sensor:
      - name: "UPS Last Full"
        unique_id: ups_last_full_timestamp
        device_class: timestamp
        availability: "{{ is_number(states('sensor.ups_custom_soc')) }}"
        state: "{{ now() }}"

  - trigger:
      - platform: state
        entity_id: sensor.ups_energiefluss_wh
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS Custom SOC"
        unique_id: ups_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.ups_soc') | float(-1) %}
          {% set neu_wh = states('sensor.ups_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.ups_soc_reset_punkt') | float(none) %}

          {# Wenn Hardware offline oder Sensoren nicht bereit -> alten Zustand beibehalten #}
          {% if hw_soc == -1 or neu_wh is none or reset_wh is none %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% else %}
            {% set alt_wh = this.attributes.get('last_wh', 0) | float(0) %}
            
            {% if (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {% if hw_soc >= 100 %}
                100
              {% else %}
                {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}
                {% set calc_soc = 100 - ((neu_wh - reset_wh) / capacity * 100) %}
                
                {# Begrenzt den Wert sauber zwischen 0 und 100 und rundet #}
                {{ calc_soc | round(1) | clamp(0, 100) }}
              {% endif %}
            {% else %}
              {{ this.state if is_number(this.state) else hw_soc }}
            {% endif %}
          {% endif %}
        attributes:
          last_wh: >-
            {% set hw_soc = states('sensor.ups_soc') | float(-1) %}
            {% set neu_wh = states('sensor.ups_energiefluss_wh') | float(none) %}
            {% set alt_wh = this.attributes.get('last_wh', neu_wh) | float(0) %}

            {% if neu_wh is none or hw_soc == -1 %}
              {{ this.attributes.get('last_wh', 0) }}
            {% elif (neu_wh - alt_wh) | abs >= 5 or hw_soc >= 100 or trigger.platform == 'homeassistant' %}
              {{ neu_wh }}
            {% else %}
              {{ alt_wh }}
            {% endif %}

  #  - trigger:
  #      - platform: state
  #        entity_id: sensor.ups_raw_data
  #    sensor:
  #      - name: "UPS SOC"
  #        unique_id: ups_soc
  #        unit_of_measurement: "%"
  #        device_class: battery
  #        state: "{{ trigger.to_state.state | regex_findall('SOC:\\s*([0-9.]+)') | first | default(states('sensor.ups_soc')) | float(0) }}"

  #      - name: "UPS Power"
  #        unique_id: ups_power
  #        unit_of_measurement: "W"
  #        device_class: power
  #        state: "{{ trigger.to_state.state | regex_findall('Power:\\s*(-?[0-9.]+)') | first | default(states('sensor.ups_power')) | float(0) }}"

  #        - name: "UPS Highest Cell"
  #          unique_id: ups_highest_cell
  #          unit_of_measurement: "V"
  #          state: "{{ trigger.to_state.state | regex_findall('highest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_highest_cell')) | float(0) }}"

  #        - name: "UPS Lowest Cell"
  #          unique_id: ups_lowest_cell
  #          unit_of_measurement: "V"
  #          state: "{{ trigger.to_state.state | regex_findall('lowest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_lowest_cell')) | float(0) }}"

  - trigger:
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS free Capacity kWh"
        unique_id: ups_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}
          {% set total_kwh = capacity / 1000 %} 

          {% set soc = states('sensor.ups_custom_soc') | float(-1) %}
          {{ (total_kwh * (1 - (soc / 100))) | round(2) if soc >= 0 else 0 }}
        availability: "{{ is_number(states('sensor.ups_custom_soc')) }}"

  - sensor:
      - name: "Battery total charge power"
        unique_id: battery_total_charge_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set p1 = states('sensor.battery_charger_energy_power') | float(0) %}
          {% set p2 = states('sensor.battery_charger2_energy_power') | float(0) %}
          {{ (p1 + p2) | round(0) }}

      - name: "UPS AC Leistung"
        unique_id: ups_ac_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charging = states('sensor.battery_total_charge_power') | float(0) %}
          {% set discharging = states('sensor.battery_inverter_energy_power') | float(0) %}
          {{ (discharging - charging) | round(0) }}

################################################################################
# 4. AUTOMATIONEN
################################################################################
automation:
  - alias: "UPS Energieintegration"
    mode: queued

    trigger:
      - platform: time_pattern
        seconds: "/10"

    variables:
      power: "{{ states('sensor.ups_ac_leistung_glatt') | float(0) }}"
      delta_wh: >-
        {% set delta = power * 10 / 3600 %}
        {% set max_delta = 2500 * 10 / 3600 * 6 %}
        {{ delta if delta < max_delta else 0 }}

    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.ups_energiefluss_wh_counter
        data:
          value: >
            {{
              (
                states('input_number.ups_energiefluss_wh_counter') | float(0)
                + delta_wh
              ) | round(3)
            }}

  - alias: "UPS Grobregelung Laden & Entladen"
    id: ups_grob_control_full
    mode: queued
    max: 10
    trigger:
      - platform: state
        entity_id:
          - sensor.ups_custom_soc
          - sensor.ups_lowest_cell
          - sensor.ups_highest_cell
          - binary_sensor.batterie_wartung_erforderlich
          - sensor.solarnet_leistung_vom_netz
          - sensor.ups_ac_leistung
    action:
      - choose:
          # 1 --- Wartungsmodus ein (mit Überladeschutz!)
          - conditions:
              - condition: template
                value_template: >-
                  {% set high_cell = states('sensor.ups_highest_cell') | float(3.65) %}
                  {% set max_voltage = state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) %}

                  {# Nur laden wenn Wartung aktiv UND Batterie noch nicht voll #}
                  {{ states('input_number.manuelle_ladeleistung') | float(0) >= 1000 
                     and high_cell < max_voltage }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }

          # 2 --- NOT-LADUNG (SOC zu niedrig) ---
          - conditions:
              - condition: template
                value_template: >-
                  {% set soc = states('sensor.ups_custom_soc') | float(100) %}
                  {% set low_cell = states('sensor.ups_lowest_cell') | float(2.9) %}
                  {% set min_voltage = state_attr('sensor.zentrale_parameter', 'lfp_min_voltage') | float(2.9) %}
                  {{ (soc <= 12 or low_cell < min_voltage) and is_state('switch.battery_charger2', 'off') }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }

          # 3 --- ENTLADEN STARTEN ---
          - conditions:
              - condition: template
                value_template: >-
                  {% set leistung_vom_netz = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
                  {% set soc = states('sensor.ups_custom_soc') | float(0) %}
                  {% set low_cell = states('sensor.ups_lowest_cell') | float(2.9) %}
                  {% set lfp_min_voltage = state_attr('sensor.zentrale_parameter', 'lfp_min_voltage') | float(0.2) %}                  
                  {% set hysteresis = state_attr('sensor.zentrale_parameter', 'lfp_hysteresis') | float(0.2) %}                  

                  {{ leistung_vom_netz > 170 and soc > 25 and low_cell > lfp_min_voltage + hysteresis and is_state('switch.battery_inverter_tasmota', 'off') }}
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: [switch.battery_charger, switch.battery_charger2]
              - action: switch.turn_on
                target: { entity_id: switch.battery_inverter_tasmota }

          # 4 --- ENTLADEN STOPPEN ---
          - conditions:
              - condition: template
                value_template: >-
                  {% set leistung_vom_netz = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
                  {% set soc = states('sensor.ups_custom_soc') | float(0) %}
                  {% set low_cell = states('sensor.ups_lowest_cell') | float(2.8) %}
                  {% set min_voltage = state_attr('sensor.zentrale_parameter', 'lfp_min_voltage') | float(2.9) %}                  
                  {{ (leistung_vom_netz < 140 or soc <= 20 or low_cell < min_voltage) and is_state('switch.battery_inverter_tasmota', 'on') }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }

          #### hier noch einbauen, wenn die ladeleistung unter 20W sinkt, dann ausschalten
          # 5 --- LADEN STOPPEN ---
          - conditions:
              - condition: template
                value_template: >-
                  {% set leistung_vom_netz = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
                  {% set ladeleistung = states('sensor.ups_ac_leistung') | float(0) %}
                  {% set high_cell = states('sensor.ups_highest_cell') | float(3.65) %}
                  {% set max_voltage = state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) %}                  
                  {{ (ladeleistung > -40 or leistung_vom_netz > -100 or high_cell > max_voltage) and (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: [switch.battery_charger, switch.battery_charger2]

          # 6 --- LADEN STARTEN
          - conditions:
              - condition: template
                value_template: >-
                  {% set leistung_vom_netz = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
                  {% set soc = states('sensor.ups_custom_soc') | float(100) %}
                  {% set high_cell = states('sensor.ups_highest_cell') | float(3.60) %}
                  {% set max_voltage = state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) %}                  
                  {% set hysteresis = state_attr('sensor.zentrale_parameter', 'lfp_hysteresis') | float(0.2) %}                  

                  {{ leistung_vom_netz < -820 and soc < 96 and high_cell < max_voltage - hysteresis
                      and is_state('switch.battery_inverter_tasmota', 'off') }}
            sequence:
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger }
              - if:
                  - condition: template
                    value_template: "{{ states('sensor.solarnet_leistung_vom_netz') | float(0) < -1200 and states('sensor.ups_custom_soc') | float(0) < 99 }}"
                then:
                  - delay: "00:00:01"
                  - action: switch.turn_on
                    target: { entity_id: switch.battery_charger2 }

  - alias: "Sicherheitsabschaltung: Charger und Inverter gleichzeitig"
    id: safety_simultaneous_power
    mode: single
    trigger:
      - platform: state
        entity_id:
          - switch.battery_inverter_tasmota
          - switch.battery_charger
          - switch.battery_charger2
        to: "on"
        for: "00:00:03"
    condition:
      - condition: template
        value_template: >-
          {{ is_state('switch.battery_inverter_tasmota', 'on') and 
             (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
    action:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.battery_inverter_tasmota
            - switch.battery_charger
            - switch.battery_charger2
