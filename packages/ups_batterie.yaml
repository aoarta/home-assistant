input_number:
  ups_energiefluss_wh_counter:
    name: UPS Energiefluss Counter
    min: -50000
    max: 50000
    step: 1

rest:
  - resource: http://192.168.0.13/show
    scan_interval: 30 # Abfrageintervall in Sekunden anpassen, falls gewünscht
    sensor:
      - name: "UPS SOC"
        unique_id: ups_soc
        value_template: "{{ value | regex_findall('SOC:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement

      - name: "UPS BMS Power"
        unique_id: ups_bms_power
        # BMS meldet größer null beim Entladen!
        value_template: "{{ value | regex_findall('Power:\\s*([-0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement

      #      - name: "BMS Current"
      #        value_template: "{{ value | regex_findall('Current:\\s*([-0-9.]+)') | first | default(0) }}"
      #        unit_of_measurement: "A"
      #        device_class: current
      #        state_class: measurement

      #      - name: "BMS Total Voltage"
      #        value_template: "{{ value | regex_findall('totalVoltage:\\s*([0-9.]+)') | first | default(0) }}"
      #        unit_of_measurement: "V"
      #        device_class: voltage
      #        state_class: measurement

      #      - name: "BMS Total Capacity"
      #        value_template: "{{ value | regex_findall('totalCapacity:\\s*([0-9.]+)') | first | default(0) }}"
      #        unit_of_measurement: "Ah"
      #        state_class: measurement

      #      - name: "BMS Remaining Capacity"
      #        value_template: "{{ value | regex_findall('remainingCapacity:\\s*([0-9.]+)') | first | default(0) }}"
      #        unit_of_measurement: "Ah"
      #        state_class: measurement

      - name: "UPS Highest Cell"
        unique_id: ups_highest_cell
        value_template: "{{ value | regex_findall('highest Cell.*:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "UPS Lowest Cell"
        unique_id: ups_lowest_cell
        value_template: "{{ value | regex_findall('lowest Cell.*:\\s*([0-9.]+)') | first | default(0) }}"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

#      - name: "BMS Cell Diff"
#        # Beachte: "Cell diff" hat in deiner Ausgabe keinen Doppelpunkt, daher fangen wir nur die Leerzeichen ab
#        value_template: "{{ value | regex_findall('Cell diff\\s*([0-9.]+)') | first | default(0) }}"
#        unit_of_measurement: "V"
#        device_class: voltage
#        state_class: measurement

#      - name: "BMS Temperature Probe 0"
#        value_template: "{{ value | regex_findall('Probe 0:\\s*([-0-9.]+)') | first | default(0) }}"
#        unit_of_measurement: "°C"
#        device_class: temperature
#        state_class: measurement

#      - name: "BMS Temperature Probe 1"
#        value_template: "{{ value | regex_findall('Probe 1:\\s*([-0-9.]+)') | first | default(0) }}"
#        unit_of_measurement: "°C"
#        device_class: temperature
#        state_class: measurement

################################################################################
# TEMPLATE SENSOREN
################################################################################
template:
  - sensor:
      - name: "UPS Energiefluss Wh"
        unique_id: ups_energiefluss_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {{ states('input_number.ups_energiefluss_wh_counter') }}

  - trigger:
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell
        above: 3.55
        for: "00:00:10"
      - platform: numeric_state
        entity_id: sensor.ups_soc
        above: "99.9"
        for: "00:01:00"
      - platform: numeric_state
        entity_id: sensor.ups_custom_soc
        above: "99.9"
      - platform: time_pattern
        minutes: "/1" # xxx
      - platform: homeassistant
        event: start
    sensor:
      - name: "UPS SOC Reset Punkt"
        unique_id: ups_soc_reset_punkt
        unit_of_measurement: "Wh"
        state: >-
          {% set current_energy = states('sensor.ups_energiefluss_wh') | float(0) %}
          {% set raw_last_reset = states('sensor.ups_soc_reset_punkt') %}
          {% set hw_soc = states('sensor.ups_soc') | float(0) %}
          {% set custom_soc = states('sensor.ups_custom_soc') | float(none) %}          
          {% set high_cell = states('sensor.ups_highest_cell') | float(0) %}
          {% set stop_soc = state_attr('sensor.zentrale_parameter', 'stop_soc') | float(15) %}     
          {% set lfp_max_voltage = state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) %}          
          {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}

          {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}

          {% set drift_too_high = custom_soc is not none and (hw_soc - custom_soc) | abs > 25 %}

          {# Sync auf HW-SOC wenn Batterie fast leer #}
          {% if hw_soc <= stop_soc or drift_too_high %}
            {{ current_energy - ((100 - hw_soc) / 100 * capacity) }}
          {# Reset wenn HW-SOC 100 oder Zelle voll #}
          {% elif hw_soc >= 100  or high_cell > lfp_max_voltage %}
            {# At 100% we take the higher value (since energy flow decreases/goes negative when charging) #}
            {{ current_energy }}
          {% elif current_energy < last_reset %}
            {{ current_energy }}
          {% else %}
            {{ last_reset }}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ups_energiefluss_wh
      - platform: state
        entity_id: sensor.ups_soc_reset_punkt
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: "UPS Custom SOC"
        unique_id: ups_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.ups_soc') | float(-1) %}
          {% set neu_wh = states('sensor.ups_energiefluss_wh') | float(none) %}
          {% set reset_wh = states('sensor.ups_soc_reset_punkt') | float(none) %}

          {% if neu_wh is none or reset_wh is none %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% elif hw_soc >= 100 %}
            100
          {% else %}
            {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}
            {% set calc_soc = 100 - ((neu_wh - reset_wh) / capacity * 100) %}
            {{ calc_soc | round(1) | clamp(0, 100) }}
          {% endif %}

  #  - trigger:
  #      - platform: state
  #        entity_id: sensor.ups_raw_data
  #    sensor:
  #      - name: "UPS SOC"
  #        unique_id: ups_soc
  #        unit_of_measurement: "%"
  #        device_class: battery
  #        state: "{{ trigger.to_state.state | regex_findall('SOC:\\s*([0-9.]+)') | first | default(states('sensor.ups_soc')) | float(0) }}"

  #      - name: "UPS Power"
  #        unique_id: ups_power
  #        unit_of_measurement: "W"
  #        device_class: power
  #        state: "{{ trigger.to_state.state | regex_findall('Power:\\s*(-?[0-9.]+)') | first | default(states('sensor.ups_power')) | float(0) }}"

  #        - name: "UPS Highest Cell"
  #          unique_id: ups_highest_cell
  #          unit_of_measurement: "V"
  #          state: "{{ trigger.to_state.state | regex_findall('highest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_highest_cell')) | float(0) }}"

  #        - name: "UPS Lowest Cell"
  #          unique_id: ups_lowest_cell
  #          unit_of_measurement: "V"
  #          state: "{{ trigger.to_state.state | regex_findall('lowest Cell\\s*\\[\\s*\\d+\\s*\\]:\\s*([0-9.]+)') | first | default(states('sensor.ups_lowest_cell')) | float(0) }}"

  - trigger:
      - platform: state
        entity_id: sensor.ups_custom_soc
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS free Capacity kWh"
        unique_id: ups_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set capacity = state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) %}
          {% set total_kwh = capacity / 1000 %} 

          {% set soc = states('sensor.ups_custom_soc') | float(-1) %}
          {{ (total_kwh * (1 - (soc / 100))) | round(2) if soc >= 0 else 0 }}
        availability: "{{ is_number(states('sensor.ups_custom_soc')) }}"

  - sensor:
      - name: "Battery total charge power"
        unique_id: battery_total_charge_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set p1 = states('sensor.battery_charger_energy_power') | float(0) %}
          {% set p2 = states('sensor.battery_charger2_energy_power') | float(0) %}
          {{ (p1 + p2) | round(-1) }}

      - name: "UPS AC Leistung"
        unique_id: ups_ac_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charging = states('sensor.battery_total_charge_power') | float(0) %}
          {% set discharging = states('sensor.battery_inverter_energy_power') | float(0) %}
          {{ (discharging - charging) | round(-1) }}

      - name:
          "UPS DC Power"
          # wir wollen >0 beim entladen
        unique_id: ups_dc_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {{ states('sensor.ups_bms_power') | float(0) | round(0) }}

################################################################################
# 4. AUTOMATIONEN
################################################################################
automation:
  - alias: "UPS Energieintegration"
    id: ups_energieintegration
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.takt
    variables:
      power: "{{ states('sensor.ups_dc_power') | float(0) }}"
      own_consumption_w: "{{ state_attr('sensor.zentrale_parameter', 'ups_own_consumption_w') | float(10) }}"
      delta_t: "{{ states('input_number.takt_interval_sekunden') | float(1)  }}"
      delta_wh: >-
        {% set delta_t_h = delta_t / 3600 %}
        {% set standby_loss = own_consumption_w * delta_t_h %}
        {% set delta_p = power * delta_t_h %}
        {% set max_delta_p = 2500 * delta_t_h  %}
        {# wenn delta > max_delta, dann ist etwas faul.#}
        {{ (delta_p + standby_loss) if (delta_p | abs) < max_delta_p else standby_loss }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.ups_energiefluss_wh_counter
        data:
          value: >
            {% set new = states('input_number.ups_energiefluss_wh_counter') | float(0) + delta_wh %}
            {{ [[new, -50000] | max, 50000] | min }}

  - alias: "UPS Grobregelung Laden & Entladen"
    id: ups_grob_control_full
    mode: single
    #mode: queued
    #max: 10
    trigger:
      - platform: state
        entity_id:
          - sensor.solarnet_leistung_vom_netz
          - sensor.marstek_ac_leistung_gesamt
          - sensor.ups_ac_leistung
          - sensor.ups_custom_soc
          - sensor.ups_lowest_cell
          - sensor.ups_highest_cell
          - input_number.manuelle_ladeleistung
    action:
      # --- VARIABLEN VORZIEHEN ---
      - variables:
          netz: "{{ states('sensor.solarnet_leistung_vom_netz') | float(0) }}" # <0 wenn einspeisung
          bat_pwr: "{{ states('sensor.marstek_ac_leistung_gesamt') | float(0) }}" # <0 wenn laden
          ups_pwr: "{{ states('sensor.ups_ac_leistung') | float(0) }}" # <0 wenn laden
          soc: "{{ states('sensor.ups_custom_soc') | float(0) }}"
          low_cell: "{{ states('sensor.ups_lowest_cell') | float(0) }}"
          high_cell: "{{ states('sensor.ups_highest_cell') | float(0) }}"
          lowest_soc: "{{ state_attr('sensor.zentrale_parameter', 'lowest_soc') | float(12) }}"
          stop_soc: "{{ state_attr('sensor.zentrale_parameter', 'stop_soc') | float(15) }}"
          # Parameter
          max_v: "{{ state_attr('sensor.zentrale_parameter', 'lfp_max_voltage') | float(3.60) }}"
          min_v: "{{ state_attr('sensor.zentrale_parameter', 'lfp_min_voltage') | float(2.90) }}"
          hyst: "{{ state_attr('sensor.zentrale_parameter', 'lfp_hysteresis') | float(0.2) }}"
          wartung_aktiv: "{{ states('input_number.manuelle_ladeleistung') | float(0) >= 1000 }}"
          # Schalter Zustände
          inverter_an: "{{ is_state('switch.battery_inverter_tasmota', 'on') }}"
          lader_an: "{{ is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on') }}"

      #netz    >0: kaufen
      #bat_pwr >0: entladen
      #ups_pwr >0: entladen

      - delay: "00:00:12"
      - choose:
          # 0 --- keine Verbindung zum BMS
          - conditions:
              - condition: template
                value_template: "{{ max_v == 0 and min_v == 0 }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id:
                    - switch.battery_inverter_tasmota
                    - switch.battery_charger
                    - switch.battery_charger2
              - action: persistent_notification.create
                data:
                  title: "⚠️ BMS Verbindung verloren"
                  message: "Keine Verbindung zum BMS – alle Schalter abgeschaltet! ({{ now().strftime('%H:%M:%S') }})"
                  notification_id: "bms_no_connection"

          # 1 --- Wartungsmodus ein
          - conditions:
              - condition: template
                value_template: "{{ wartung_aktiv and high_cell < max_v }}"
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 2 --- NOT-LADUNG
          - conditions:
              - condition: template
                value_template: "{{ (soc <= lowest_soc or low_cell < min_v) and not is_state('switch.battery_charger2', 'on') }}"
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 3 --- ENTLADEN STARTEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ (netz + bat_pwr > 180) and soc > 25 
                     and low_cell > min_v + hyst and not inverter_an }}
            sequence:
              - action: switch.turn_off
                target:
                  {
                    entity_id:
                      [switch.battery_charger, switch.battery_charger2],
                  }
              - action: switch.turn_on
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          #netz    >0: kaufen
          #bat_pwr >0: entladen
          #ups_pwr >0: entladen

          # 4 --- ENTLADEN STOPPEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ ((netz + bat_pwr < 20) or soc <= 20 or low_cell < min_v) 
                     and inverter_an }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 5 --- LADEN STOPPEN (Inklusive < 30W Logik)
          - conditions:
              - condition: template
                value_template: >-
                  {# Stop wenn Netzbezug steigt, Akku voll, Zelle zu hoch ODER Ladeleistung zu gering #}
                  {{ (netz + bat_pwr > 50 or high_cell > max_v 
                                or (ups_pwr < -15 and soc > 95) )
                    and lader_an and soc >= stop_soc }}
            sequence:
              - action: switch.turn_off
                target:
                  {
                    entity_id:
                      [switch.battery_charger, switch.battery_charger2],
                  }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          #netz    >0: kaufen
          #bat_pwr >0: entladen
          #ups_pwr >0: entladen

          # 6 --- LADEN STARTEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ netz + bat_pwr < -820 and soc < 99 and high_cell < max_v - hyst 
                     and not inverter_an and not lader_an }}
            sequence:
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger }
              - if:
                  - condition: template
                    value_template: "{{ netz + bat_pwr < -1200 and soc < 99 }}"
                then:
                  - delay: "00:00:01"
                  - action: switch.turn_on
                    target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

  - alias: "Sicherheitsabschaltung: Charger und Inverter gleichzeitig"
    id: safety_simultaneous_power
    mode: single
    trigger:
      - platform: state
        entity_id:
          - switch.battery_inverter_tasmota
          - switch.battery_charger
          - switch.battery_charger2
        to: "on"
        for: "00:00:00.500"
    condition:
      - condition: template
        value_template: >-
          {{ is_state('switch.battery_inverter_tasmota', 'on') and 
             (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
    action:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.battery_inverter_tasmota
            - switch.battery_charger
            - switch.battery_charger2

  # ==========================================================
  # UPS: Last Full Zeitstempel
  # ==========================================================
  - alias: "UPS: Zeitstempel Batterie voll aktualisieren"
    id: ups_set_last_full_timestamp
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ups_custom_soc
        above: 99.9
        for: "00:05:00"
      - trigger: numeric_state
        entity_id: sensor.ups_soc
        above: 99.9
        for: "00:05:00"
    conditions:
      - condition: numeric_state
        entity_id: sensor.ups_custom_soc
        above: 99.9
      - condition: numeric_state
        entity_id: sensor.ups_soc
        above: 99.9
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ups_last_full
        data:
          timestamp: "{{ now().timestamp() }}"

  - alias: "UPS SOC Counter Reset"
    id: ups_soc_counter_reset
    description: "Setzt den UPS Wh-Counter auf Max-Kapazität bei Vollladung"
    trigger:
      # Trigger 1: Hardware SOC meldet voll
      - platform: numeric_state
        entity_id: sensor.ups_soc
        above: 99.8
      # Trigger 2: Höchste Zelle erreicht Ladeschlussspannung (Sicherheits-Sync)
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell
        above: 3.58
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.ups_energiefluss_wh_counter
        data:
          value: >
            {# Kapazität aus deinen zentralen Parametern auslesen #}
            {{ state_attr('sensor.zentrale_parameter', 'ups_capacity_wh') | float(2200) }}

      # Optional: Benachrichtigung im Logbuch
      - service: logbook.log
        data:
          name: "UPS Reset"
          message: "Wh-Counter wurde auf Max-Kapazität synchronisiert (Batterie voll)."
