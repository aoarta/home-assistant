#      name: "UPS Raw Data"
#      unique_id: ups_raw_data
#      #command: "curl -s http://battery-bms.lan/show | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"

#      #command: "curl --max_time 2 -s http://192.168.0.13/show 2>/dev/null | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"
#      command: "curl --max_time 2 -s http://192.168.0.134/show | grep -E 'Power:|SOC:|highest Cell|lowest Cell'"

#      scan_interval: 30
#      value_template: "{{ value }}"

sensor:
  - platform: integration
    # Achtung ups_dc_power ist bei Entladung positiv, anders als die AC-Power
    source: sensor.ups_dc_power
    name: "UPS Riemann Energy"
    unit_prefix: k # Riemann liefert kWh
    round: 3
    method: left

################################################################################
# TEMPLATE SENSOREN
################################################################################
template:
  - sensor:
      - name: "UPS EnergyFlow Wh"
        unique_id: ups_energyflow_wh
        unit_of_measurement: "Wh"
        device_class: energy
        state_class: total
        state: >
          {# Vorzeichenkorrektur: BMS entlädt positiv, also 1000 statt (-1000) #}
          {% set val = states('sensor.ups_riemann_energy') | float(0) * 1000 %}          
          {{ [[val, -50000] | max, 50000] | min }}

      - name: "Battery total charge power"
        unique_id: battery_total_charge_power
        unit_of_measurement: "W"
        device_class: power
        state: >-
          {% set p1 = states('sensor.battery_charger_energy_power') | float(0) %}
          {% set p2 = states('sensor.battery_charger2_energy_power') | float(0) %}
          {{ (p1 + p2) | round(-1) }}

      - name: "UPS AC Power"
        unique_id: ups_ac_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set charging = states('sensor.battery_total_charge_power') | float(0) %}
          {% set discharging = states('sensor.battery_inverter_energy_power') | float(0) %}
          {{ (discharging - charging) | round(-1) }}

      - name: "UPS SOC raw"
        unique_id: ups_soc_raw
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        availability: "{{ states('sensor.ant_bms_v2_ant_bms_soc') | is_number }}"
        state: "{{ states('sensor.ant_bms_v2_ant_bms_soc') | float(0) }}"

      - name: "UPS DC Power"
        unique_id: ups_dc_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        # BMS reports positive while discharging.
        # Falling back to 0 here is intentional: it halts energy integration on a bad read.
        state: "{{ states('sensor.ant_bms_v2_ant_bms_power') | float(0) }}"

      - name: "UPS Highest Cell"
        unique_id: ups_highest_cell
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        state: "{{ states('sensor.ant_bms_v2_ant_bms_highest_cell') | float(0) }}"

      - name: "UPS Lowest Cell"
        unique_id: ups_lowest_cell
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        state: "{{ states('sensor.ant_bms_v2_ant_bms_lowest_cell') | float(0) }}"

  - trigger:
      - platform: state
        entity_id: sensor.ups_soc_raw
        not_to:
          - unknown
          - unavailable
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: "UPS SOC"
        unique_id: ups_soc
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >-
          {% set raw = states('sensor.ups_soc_raw') %}
          {% if is_number(raw) %}
            {{ raw | float }}
          {% else %}
            {{ this.state if is_number(this.state) else 'unknown' }}
          {% endif %}

  - trigger:
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell
        above: 3.55
        for: "00:00:10"
      - platform: numeric_state
        entity_id: sensor.ups_soc
        above: "99.9"
        for: "00:01:00"
      - platform: numeric_state
        entity_id: sensor.ups_custom_soc
        above: "99.9"
      - platform: time_pattern
        minutes: "/1" # xxx
      - platform: homeassistant
        event: start
    sensor:
      - name: "UPS SOC Reset Point"
        unique_id: ups_soc_reset_point
        unit_of_measurement: "Wh"
        state: >-
          {% set raw_energy = states('sensor.ups_energyflow_wh') %}
          {% if not is_number(raw_energy) %}
            {# Energy flow not available yet (e.g. right after restart). Hold the last
              reset point. Falling back to 0 here would trigger the
              'current_energy < last_reset' branch and snap the point to 0. #}
            {{ this.state }}
          {% else %}
            {% set current_energy = raw_energy | float %}
            {% set raw_last_reset = states('sensor.ups_soc_reset_point') %}
            {% set hw_soc = states('sensor.ups_soc') | float(0) %}
            {% set custom_soc = states('sensor.ups_custom_soc') | float(none) %}
            {% set high_cell = states('sensor.ups_highest_cell') | float(0) %}
            {% set stop_soc = state_attr('sensor.global_parameter', 'stop_soc') | float(15) %}
            {% set lfp_max_voltage = state_attr('sensor.global_parameter', 'lfp_max_voltage') | float(3.60) %}
            {% set capacity = state_attr('sensor.global_parameter', 'ups_capacity_wh') | float(2200) %}
            {% set last_reset = raw_last_reset | float(current_energy) if is_number(raw_last_reset) else current_energy %}
            {% set drift_too_high = custom_soc is not none and (hw_soc - custom_soc) | abs > 25 %}

            {% if custom_soc == 0 and hw_soc is not none and current_energy is not none %}
              {{ current_energy - ((100 - hw_soc) / 100 * capacity) }}
            {% elif hw_soc <= stop_soc or drift_too_high %}
              {{ current_energy - ((100 - hw_soc) / 100 * capacity) }}
            {% elif hw_soc >= 100 or high_cell > lfp_max_voltage %}
              {{ current_energy }}
            {% elif current_energy < last_reset %}
              {{ current_energy }}
            {% else %}
              {{ last_reset }}
            {% endif %}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ups_energyflow_wh
      - platform: state
        entity_id: sensor.ups_soc_reset_point
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/1"
    sensor:
      - name: "UPS Custom SOC"
        unique_id: ups_custom_soc
        unit_of_measurement: "%"
        device_class: battery
        state: >-
          {% set hw_soc = states('sensor.ups_soc') | float(-1) %}
          {% set neu_wh = states('sensor.ups_energyflow_wh') | float(none) %}
          {% set reset_wh = states('sensor.ups_soc_reset_point') | float(none) %}

          {% if neu_wh is none or reset_wh is none %}
            {{ this.state if is_number(this.state) else hw_soc }}
          {% elif hw_soc >= 100 %}
            100
          {% else %}
            {% set capacity = state_attr('sensor.global_parameter', 'ups_capacity_wh') | float(2200) %}
            {% set calc_soc = 100 - ((neu_wh - reset_wh) / capacity * 100) %}
            {{ calc_soc | round(1) | clamp(0, 100) }}
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.ups_custom_soc
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "UPS free Capacity kWh"
        unique_id: ups_free_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {% set capacity = state_attr('sensor.global_parameter', 'ups_capacity_wh') | float(2200) %}
          {% set total_kwh = capacity / 1000 %} 

          {% set soc = states('sensor.ups_custom_soc') | float(-1) %}
          {{ (total_kwh * (1 - (soc / 100))) | round(2) if soc >= 0 else 0 }}
        availability: "{{ is_number(states('sensor.ups_custom_soc')) }}"

################################################################################
# 4. AUTOMATIONEN
################################################################################
automation:
  - alias: "UPS coarse_control"
    id: ups_coarse_control
    mode: queued
    max: 12
    trigger:
      - platform: state
        entity_id:
          - sensor.solarnet_leistung_vom_netz
          - sensor.marstek_ac_power_total
          - sensor.ups_ac_power
          - sensor.ups_custom_soc
          - sensor.ups_lowest_cell
          - sensor.ups_highest_cell
          - input_number.manual_charge_power
      - platform: time_pattern
        seconds: "/10" # Fallback: läuft alle 15 s vom Minutenstart aus
    condition:
      - condition: template
        value_template: >-
          {% set lt = state_attr(this.entity_id, 'last_triggered') %}          
          {{ lt is none or (now() - lt).total_seconds() >= 12 }}
    action:
      #      - delay: "00:00:12"
      # --- VARIABLEN VORZIEHEN ---
      - variables:
          netz: "{{ states('sensor.solarnet_leistung_vom_netz') | float(0) }}" # <0 wenn einspeisung
          bat_pwr: "{{ states('sensor.marstek_ac_power_total') | float(0) }}" # <0 wenn laden
          ups_pwr: "{{ states('sensor.ups_ac_power') | float(0) }}" # <0 wenn laden
          # Feedback-free balance: add UPS output back so the inverter's own
          # discharge no longer moves the decision variable (stops oscillation)
          true_balance: "{{ netz + bat_pwr + ups_pwr }}"

          soc: "{{ states('sensor.ups_custom_soc') | float(0) }}"
          hw_soc: "{{ states('sensor.ups_soc') | float(0) }}"
          low_cell: "{{ states('sensor.ups_lowest_cell') | float(0) }}"
          high_cell: "{{ states('sensor.ups_highest_cell') | float(0) }}"
          lowest_soc: "{{ state_attr('sensor.global_parameter', 'lowest_soc') | float(12) }}"
          stop_soc: "{{ state_attr('sensor.global_parameter', 'stop_soc') | float(15) }}"
          # Parameter
          max_v: "{{ state_attr('sensor.global_parameter', 'lfp_max_voltage') | float(3.60) }}"
          min_v: "{{ state_attr('sensor.global_parameter', 'lfp_min_voltage') | float(2.90) }}"
          hyst: "{{ state_attr('sensor.global_parameter', 'lfp_hysteresis') | float(0.2) }}"
          maintenance_activ: "{{ states('input_number.manual_charge_power') | float(0) >= 1000 }}"
          # Schalter Zustände
          inverter_an: "{{ is_state('switch.battery_inverter_tasmota', 'on') }}"
          charger_on: "{{ is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on') }}"
          inverter_on_for: >-
            {{ (now() - states.switch.battery_inverter_tasmota.last_changed).total_seconds() }}

      #netz    >0: kaufen
      #bat_pwr >0: entladen
      #ups_pwr >0: entladen
      #true_balance >0: Restbedarf (Verbrauch > PV), unabhängig von Speicherzustand
      #true_balance <0: Überschuss
      - choose:
          # 0 --- keine Verbindung zum BMS
          - conditions:
              - condition: template
                value_template: "{{ max_v == 0 and min_v == 0 }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id:
                    - switch.battery_inverter_tasmota
                    - switch.battery_charger
                    - switch.battery_charger2
              - action: persistent_notification.create
                data:
                  title: "⚠️ BMS Verbindung verloren"
                  message: "Keine Verbindung zum BMS – alle Schalter abgeschaltet! ({{ now().strftime('%H:%M:%S') }})"
                  notification_id: "bms_no_connection"

          # 0.5 --- CELL OVERVOLTAGE: stop charging unconditionally
          - conditions:
              - condition: template
                value_template: "{{ high_cell > max_v and charger_on }}"
            sequence:
              - action: switch.turn_off
                target:
                  {
                    entity_id:
                      [switch.battery_charger, switch.battery_charger2],
                  }

          # 1 --- Wartungsmodus ein
          - conditions:
              - condition: template
                value_template: "{{ maintenance_activ and high_cell < max_v }}"
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 2 --- NOT-LADUNG
          - conditions:
              - condition: template
                value_template: "{{ (soc <= lowest_soc or low_cell < min_v) and not is_state('switch.battery_charger2', 'on') }}"
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 3 --- ENTLADEN STARTEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ (true_balance > 180) and soc > 25 
                     and low_cell > min_v + hyst and not inverter_an }}
            sequence:
              - action: switch.turn_off
                target:
                  {
                    entity_id:
                      [switch.battery_charger, switch.battery_charger2],
                  }
              - action: switch.turn_on
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          #netz    >0: kaufen
          #bat_pwr >0: entladen
          #ups_pwr >0: entladen
          #true_balance >0: Restbedarf (Verbrauch > PV), unabhängig von Speicherzustand
          #true_balance <0: Überschuss

          # 4 --- ENTLADEN STOPPEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ ((true_balance < 50 and inverter_on_for > 30) or soc <= 20 or low_cell < min_v) 
                     and inverter_an }}
            sequence:
              - action: switch.turn_off
                target: { entity_id: switch.battery_inverter_tasmota }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          # 5 --- LADEN STOPPEN (Inklusive < 30W Logik)
          - conditions:
              - condition: template
                value_template: >-
                  {# stop on true grid pull, full pack, cell limit, trickle, OR marstek discharging #}
                  {{ (true_balance > 50 or high_cell > max_v or bat_pwr > 50
                      or (ups_pwr > -15 and soc > 95))
                    and charger_on and soc >= stop_soc }}

            sequence:
              - action: switch.turn_off
                target:
                  {
                    entity_id:
                      [switch.battery_charger, switch.battery_charger2],
                  }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

          #netz    >0: kaufen
          #bat_pwr >0: entladen
          #ups_pwr >0: entladen
          #true_balance >0: Restbedarf (Verbrauch > PV), unabhängig von Speicherzustand
          #true_balance <0: Überschuss

          # 6 --- LADEN STARTEN
          - conditions:
              - condition: template
                value_template: >-
                  {{ true_balance < -820 and soc < 100 and high_cell < max_v - hyst
                    and bat_pwr < 50
                    and not inverter_an and not charger_on }}

            sequence:
              - action: switch.turn_on
                target: { entity_id: switch.battery_charger }
              - if:
                  - condition: template
                    value_template: "{{ true_balance < -1200 and (soc < 99 or hw_soc < 100) }}"
                then:
                  - delay: "00:00:01"
                  - action: switch.turn_on
                    target: { entity_id: switch.battery_charger2 }
              - action: persistent_notification.dismiss
                data:
                  notification_id: "bms_no_connection"

  - alias: "Sicherheitsabschaltung: Charger und Inverter gleichzeitig"
    id: safety_simultaneous_power
    mode: single
    trigger:
      - platform: state
        entity_id:
          - switch.battery_inverter_tasmota
          - switch.battery_charger
          - switch.battery_charger2
        to: "on"
        for: "00:00:00.500"
    condition:
      - condition: template
        value_template: >-
          {{ is_state('switch.battery_inverter_tasmota', 'on') and 
             (is_state('switch.battery_charger', 'on') or is_state('switch.battery_charger2', 'on')) }}
    action:
      - action: switch.turn_off
        target:
          entity_id:
            - switch.battery_inverter_tasmota
            - switch.battery_charger
            - switch.battery_charger2

  # ==========================================================
  # UPS: Last Full Zeitstempel
  # ==========================================================
  - alias: "UPS: last full timestamp"
    id: ups_set_last_full_timestamp
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ups_custom_soc
        above: 99.9
        for: "00:05:00"
      - trigger: numeric_state
        entity_id: sensor.ups_soc
        above: 99.9
        for: "00:05:00"
    conditions:
      - condition: numeric_state
        entity_id: sensor.ups_custom_soc
        above: 99.9
      - condition: numeric_state
        entity_id: sensor.ups_soc
        above: 99.9
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ups_last_full
        data:
          timestamp: "{{ now().timestamp() }}"

  - alias: "UPS SOC Counter Reset"
    id: ups_soc_counter_reset
    trigger:
      - platform: numeric_state
        entity_id: sensor.ups_soc
        above: 99.8
      - platform: numeric_state
        entity_id: sensor.ups_highest_cell
        above: 3.58

    action:
      - action: homeassistant.turn_off
        target:
          entity_id: sensor.ups_riemann_energy
      - delay: "00:00:01"
      - action: homeassistant.turn_on
        target:
          entity_id: sensor.ups_riemann_energy
      - action: logbook.log
        data:
          name: "UPS Reset"
          message: "Riemann-Sensor wurde durch Turn-Off/On zurückgesetzt."
