# ============================================================
# PV surplus wallbox charging (WARP3)
#
# Two independent selectors:
#   * input_select.ev_vehicle_mode  : "off" | "zero" | "honda_e"
#       Selects the vehicle (capacity/efficiency for the energy target) AND
#       acts as the master OFF switch.
#   * input_select.ev_charge_mode   : charging STRATEGY (see below)
#
# Sliders:
#   * input_number.ev_charge_percent          : 0..100 % of battery to add
#   * input_number.ev_manual_charging_current : 0 or 6..32 A (0 = automatic)
#
# Charging strategies (input_select.ev_charge_mode):
#   1. "pv_surplus"       : pure PV surplus. Charges only while the surplus is
#                           >= 6 A; nothing below that.
#   2. "pv_battery_floor" : PV surplus when it is >= 6 A, otherwise a minimum of
#                           6 A drawn from the home battery -- but only while the
#                           battery SOC is above sensor.battery_floor_soc_for_ev,
#                           i.e. only the reserve NOT needed to cover the remaining
#                           household demand may feed the EV. If the SOC drops to
#                           the floor, the target falls to 0.
#   3. "pv_grid_floor"    : PV surplus when it is >= 6 A, otherwise always a
#                           minimum of 6 A regardless of source (grid covers the
#                           gap). Never drops below 6 A.
#
# All strategies stop at the per-session energy target (ev_max_charge_energy).
#
# Architecture:
#   sensor.ev_target_charging_current is the SINGLE SOURCE OF TRUTH. It returns
#   the desired charging current in Amps (or 0 = pause). All automations act
#   on this sensor; the strategy logic lives only inside the sensor.
#
# Behaviour summary:
#   * Vehicle mode = "off" -> wallbox NEVER charges. Any running session is
#     stopped and the global current is forced to 0 A. Enforced even when the
#     WARP3 firmware auto-starts on cable plug-in.
#   * Manual current >= 6 A overrides every strategy with a fixed current.
#   * Session energy resets to 0 on every cable plug-in. Once the energy target
#     is reached, charging stops and stays off until the cable is unplugged.
# ============================================================

# --- INPUT SELECTS ---
input_select:
  # Vehicle selection + master OFF switch.
  ev_vehicle_mode:
    name: "EV Vehicle Mode"
    options:
      - "off"
      - "zero"
      - "honda_e"
    initial: "off"
    icon: mdi:car-electric

  # Charging strategy.
  ev_charge_mode:
    name: "EV Charge Mode"
    options:
      - "pv_surplus" # 1: pure PV surplus, nothing below 6 A
      - "pv_battery_floor" # 2: PV surplus, min 6 A from battery (if SOC allows)
      - "pv_grid_floor" # 3: PV surplus, always min 6 A (grid if needed)
    initial: "pv_surplus"
    icon: mdi:ev-station

# --- INPUT NUMBERS ---
input_number:
  ev_manual_charging_current:
    name: "EV Manual Charging Current (0 = Automatic)"
    initial: 0
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:car-speed-limiter

  ev_charge_percent:
    name: "EV Charge Target (% of battery)"
    initial: 50
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging-50

  ev_session_start_energy_kwh:
    name: "EV Session Start Energy (snapshot)"
    # Absolute wallbox meter reading captured at the last cable plug-in.
    min: 0
    max: 9999999
    step: 0.001
    unit_of_measurement: "kWh"
    icon: mdi:counter

# --- TEMPLATE SENSORS ---
template:
  # ----------------------------------------------------------
  # PV surplus expressed in Amps (0, or 6..wallbox_max_amps).
  # Treats the home batteries as flexible: their charging power is reclaimable,
  # their discharge power is treated as committed (not available).
  # ----------------------------------------------------------
  - triggers:
      - trigger: time_pattern
        seconds: "/30"
      - trigger: state
        entity_id:
          - sensor.warp3_2ita_powernow
          - sensor.solarnet_leistung_vom_netz
          - sensor.marstek_venus_1_ac_power_glatt
          - sensor.marstek_venus_2_ac_power_glatt
    sensor:
      - name: "PV Dynamic Charging Current"
        unique_id: pv_dynamic_charging_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if not cable_connected %}
            0
          {% else %}
            {# Sign conventions:
                 - charger_power : positive = consumption
                 - power_from_net: positive = grid import, negative = grid export
                 - venus1/2      : positive = discharging, negative = charging
               True PV surplus available for the wallbox (home batteries treated
               as flexible):
                 surplus = charger_power - power_from_net - venus1 - venus2
            #}
            {% set charger_power = states('sensor.warp3_2ita_powernow') | float(0) %}
            {% set power_from_net = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
            {% set venus1 = states('sensor.marstek_venus_1_ac_power_glatt') | float(0) %}
            {% set venus2 = states('sensor.marstek_venus_2_ac_power_glatt') | float(0) %}

            {% set surplus = charger_power - power_from_net - venus1 - venus2 %}
            {% set amps = (surplus / 230) | round(0, 'floor') | int %}

            {# Maximum charging current of the wallbox -- adjust to your installation #}
            {% set max_amps = state_attr('sensor.global_parameter', 'wallbox_max_amps') | float(16) %}

            {% if amps >= 6 %}
              {{ [amps, max_amps] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}

  # ----------------------------------------------------------
  # Energy delivered in the current charging session (since last plug-in).
  # ----------------------------------------------------------
  - triggers:
      - trigger: state
        entity_id: sensor.warp3_2ita_energyabs
      - trigger: state
        entity_id: input_number.ev_session_start_energy_kwh
    sensor:
      - name: "EV Session Energy"
        unique_id: ev_session_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >-
          {% set meter = states('sensor.warp3_2ita_energyabs') | float(-1) %}
          {% set start = states('input_number.ev_session_start_energy_kwh') | float(-1) %}
          {% if meter < 0 or start < 0 %}
            0
          {% else %}
            {{ [meter - start, 0] | max | round(3) }}
          {% endif %}
        attributes:
          start_energy_kwh: "{{ states('input_number.ev_session_start_energy_kwh') }}"
          meter_kwh: "{{ states('sensor.warp3_2ita_energyabs') }}"

  # ----------------------------------------------------------
  # Energy limit for the current session, derived from vehicle mode and percent.
  # Capacity/efficiency come from sensor.global_parameter.
  # ----------------------------------------------------------
  - sensor:
      - name: "EV Max Charge Energy"
        unique_id: ev_max_charge_energy
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set mode = states('input_select.ev_vehicle_mode') %}
          {% set pct = states('input_number.ev_charge_percent') | float(0) %}
          {% if mode == 'off' or pct == 0 %}
            0
          {% else %}
            {% if mode == 'zero' %}
              {% set capacity = state_attr('sensor.global_parameter', 'zero_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'zero_charge_efficiency') | float(0.88) %}
            {% elif mode == 'honda_e' %}
              {% set capacity = state_attr('sensor.global_parameter', 'honda_e_capacity') | float(0) %}
              {% set efficiency = state_attr('sensor.global_parameter', 'honda_e_charge_efficiency') | float(0.88) %}
            {% else %}
              {% set capacity = 0 %}
              {% set efficiency = 1 %}
            {% endif %}
            {% if capacity == 0 or efficiency == 0 %}
              0
            {% else %}
              {{ (capacity * pct / 100 / efficiency) | round(2) }}
            {% endif %}
          {% endif %}
        attributes:
          mode: "{{ states('input_select.ev_vehicle_mode') }}"
          percent: "{{ states('input_number.ev_charge_percent') }}"

  # ----------------------------------------------------------
  # BATTERY FLOOR SOC FOR EV -- computed reserve.
  # The SOC the home battery must keep in reserve to cover the remaining
  # household demand. Only SOC *above* this floor may feed the EV's 6 A in the
  # pv_battery_floor charge mode. Consumption estimate mirrors the static/live
  # blend used in packages/control.yaml.
  # ----------------------------------------------------------
  - triggers:
      - trigger: time_pattern
        minutes: "/2"
      - trigger: state
        entity_id:
          - sensor.expected_daily_consumption
          - sensor.house_consumption_energy_today
          - sensor.estimated_remaining_consumption
    sensor:
      - name: "Battery Floor SOC for EV"
        unique_id: battery_floor_soc_for_ev
        unit_of_measurement: "%"
        state_class: measurement
        state: >-
          {% set consumption_buffer = 1.10 %}
          {% set max_storage = state_attr('sensor.global_parameter', 'max_usable_energy') | float(10) %}

          {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
          {% set consumption_today = states('sensor.house_consumption_energy_today') | float(0) %}

          {# Static estimate: learned daily bucket minus what's already used this cycle #}
          {% set consumption_static = [0, expected_daily_consumption - consumption_today] | max %}
          {# Live estimate: current 1h-avg power projected to next sunrise (same window) #}
          {% set consumption_live = states('sensor.estimated_remaining_consumption') | float(none) %}
          {# Blend both (fallback to static if live is unavailable), then apply the buffer #}
          {% set consumption_blended = (0.5 * consumption_static + 0.5 * consumption_live)
                                        if consumption_live is not none else consumption_static %}
          {% set consumption_remaining = consumption_blended * consumption_buffer %}

          {# Express the reserve as a SOC percentage of usable capacity, clamped. #}
          {% if max_storage <= 0 %}
            100
          {% else %}
            {% set floor = consumption_remaining / max_storage * 100 %}
            {# Never below the battery minimum, never above 100. #}
            {{ [[floor, 10] | max, 100] | min | round(1) }}
          {% endif %}
        attributes:
          consumption_remaining_kwh: >-
            {% set buffer = 1.10 %}
            {% set static = [0, states('sensor.expected_daily_consumption') | float(0)
                                - states('sensor.house_consumption_energy_today') | float(0)] | max %}
            {% set live = states('sensor.estimated_remaining_consumption') | float(none) %}
            {{ (((0.5 * static + 0.5 * live) if live is not none else static) * buffer) | round(2) }}

  # ----------------------------------------------------------
  # TARGET CHARGING CURRENT -- single source of truth.
  # Returns the desired wallbox current in Amps, or 0 = pause.
  # Priority: vehicle off / no cable -> 0
  #           manual current >= 6 A  -> manual (override)
  #           else -> the selected charge-mode strategy.
  # ----------------------------------------------------------
  - triggers:
      - trigger: time_pattern
        seconds: "/30"
      - trigger: state
        entity_id:
          - sensor.pv_dynamic_charging_current
          - sensor.marstek_total_soc # <-- CONFIRM your combined Marstek SOC entity
          - sensor.battery_floor_soc_for_ev
          - input_select.ev_charge_mode
          - input_select.ev_vehicle_mode
          - input_number.ev_manual_charging_current
    sensor:
      - name: "EV Target Charging Current"
        unique_id: ev_target_charging_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set vehicle = states('input_select.ev_vehicle_mode') %}
          {% set cable = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if vehicle == 'off' or not cable %}
            0
          {% else %}
            {% set manual = states('input_number.ev_manual_charging_current') | int(0) %}
            {% if manual >= 6 %}
              {{ manual }}                                  {# manual override wins #}
            {% else %}
              {% set mode = states('input_select.ev_charge_mode') %}
              {% set surplus = states('sensor.pv_dynamic_charging_current') | int(0) %}
              {% if mode == 'pv_surplus' %}
                {# 1: pure surplus (sensor already reports 0 or 6..max) #}
                {{ surplus }}
              {% elif mode == 'pv_battery_floor' %}
                {# 2: surplus when >= 6 A, otherwise 6 A backed by the battery,
                   but only while the SOC is above the computed reserve floor. #}
                {% if surplus >= 6 %}
                  {{ surplus }}
                {% else %}
                  {% set soc   = states('sensor.marstek_total_soc') | float(0) %}        {# CONFIRM entity #}
                  {% set floor = states('sensor.battery_floor_soc_for_ev') | float(100) %}
                  {{ 6 if soc > floor else 0 }}
                {% endif %}
              {% elif mode == 'pv_grid_floor' %}
                {# 3: surplus, but always at least 6 A (grid if necessary) #}
                {{ [surplus, 6] | max }}
              {% else %}
                0
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          charge_mode: "{{ states('input_select.ev_charge_mode') }}"

# --- AUTOMATIONS ---
automation:
  # ============================================================
  # SESSION RESET: zero the session counter when the cable is plugged in.
  # ============================================================
  - alias: "Wallbox: Reset session energy on cable plug-in"
    id: wallbox_reset_session_energy
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        from: "off"
        to: "on"
    conditions:
      - condition: template
        value_template: >-
          {{ states('sensor.warp3_2ita_energyabs')
             not in ['unknown', 'unavailable', 'none', None] }}
    actions:
      # Snapshot the absolute meter -> ev_session_energy becomes 0.
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_session_start_energy_kwh
        data:
          value: "{{ states('sensor.warp3_2ita_energyabs') | float(0) }}"
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Cable plugged in -- session energy counter reset to 0."

  # ============================================================
  # ENFORCE OFF: vehicle mode "off" must never charge.
  # Catches every entry point, including WARP3 firmware auto-start
  # on cable plug-in (which bypasses the HA start automations).
  # ============================================================
  - alias: "Wallbox: Enforce OFF mode (never charge when vehicle = off)"
    id: wallbox_enforce_off
    mode: restart
    triggers:
      # Vehicle mode switched to off.
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
        to: "off"
      # Charging started for ANY reason (e.g. wallbox auto-start).
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_charging
        to: "on"
      # Cable plugged in while already in off mode.
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
    conditions:
      - condition: state
        entity_id: input_select.ev_vehicle_mode
        state: "off"
    actions:
      # Block delivery (0 A) so the wallbox cannot re-deliver power...
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: 0
      # ...and explicitly stop the session.
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Vehicle mode = off -- charging blocked and stopped."

  # ============================================================
  # MANUAL: fixed-current charging (overrides every strategy).
  # Active whenever ev_manual_charging_current >= 6 A and vehicle != off.
  # ============================================================
  - alias: "Wallbox: Manual fixed-current charging"
    id: wallbox_manual_charge
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_number.ev_manual_charging_current
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
      # Re-evaluate when the energy target is changed (vehicle/percent).
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
      - trigger: state
        entity_id: input_number.ev_charge_percent
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        above: 5 # >= 6 A => manual mode active
      # Block when vehicle mode is off.
      - condition: template
        value_template: "{{ not is_state('input_select.ev_vehicle_mode', 'off') }}"
      # Do not (re)start once the per-session energy limit is reached.
      - condition: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
             < states('sensor.ev_max_charge_energy') | float(0) }}
    variables:
      manual_amps: "{{ states('input_number.ev_manual_charging_current') | int(0) }}"
      current_amps: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
      is_charging: "{{ is_state('binary_sensor.warp3_2ita_charging', 'on') }}"
    actions:
      # Apply the manual current if it differs from the current target.
      - if:
          - "{{ manual_amps != current_amps }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.warp3_2ita_globalcurrent
            data:
              value: "{{ manual_amps }}"
      # Start the wallbox if it is not already charging.
      - if:
          - "{{ not is_charging }}"
        then:
          - delay:
              milliseconds: 500
          - action: button.press
            target:
              entity_id: button.warp3_2ita_startcharge
          - action: logbook.log
            data:
              name: "Wallbox"
              message: "Manual charging started at {{ manual_amps }} A."

  # ============================================================
  # START (PV surplus mode only): target current sustained >= 6 A for 5 min.
  # Avoids a grid kick-off on brief surplus spikes.
  # ============================================================
  - alias: "Wallbox: Start on sustained PV surplus"
    id: wallbox_pv_start
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
        for:
          minutes: 5
    conditions:
      - condition: state
        entity_id: input_select.ev_charge_mode
        state: "pv_surplus"
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "off"
      # Skip when manual override is active.
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
      # Block when vehicle mode is off.
      - condition: template
        value_template: "{{ not is_state('input_select.ev_vehicle_mode', 'off') }}"
      # Do not start once the per-session energy limit is reached.
      - condition: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
             < states('sensor.ev_max_charge_energy') | float(0) }}
    actions:
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: "{{ states('sensor.ev_target_charging_current') | int(6) }}"
      - delay:
          milliseconds: 500
      - action: button.press
        target:
          entity_id: button.warp3_2ita_startcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: >-
            PV surplus charging started at
            {{ states('sensor.ev_target_charging_current') }} A.

  # ============================================================
  # START (pv_battery_floor / pv_grid_floor): start immediately.
  # These modes guarantee a 6 A floor, so no need to wait for sustained surplus.
  # Also re-triggers on charge-mode / vehicle-mode / cable changes.
  # ============================================================
  - alias: "Wallbox: Start immediately (battery / grid floor)"
    id: wallbox_fast_start
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
        for:
          seconds: 10
      - trigger: state
        entity_id:
          - input_select.ev_charge_mode
          - input_select.ev_vehicle_mode
          - binary_sensor.warp3_2ita_cable
        to: "on"
    conditions:
      # Only the two floor strategies start immediately; pv_surplus uses the
      # sustained start above.
      - condition: template
        value_template: >-
          {{ states('input_select.ev_charge_mode') in ['pv_battery_floor', 'pv_grid_floor'] }}
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "off"
      # Skip when manual override is active.
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
      # Block when vehicle mode is off.
      - condition: template
        value_template: "{{ not is_state('input_select.ev_vehicle_mode', 'off') }}"
      # Target must currently want to charge (>= 6 A).
      - condition: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
      # Energy target not yet reached (and target > 0).
      - condition: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
             < states('sensor.ev_max_charge_energy') | float(0) }}
    actions:
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: "{{ states('sensor.ev_target_charging_current') | int(6) }}"
      - delay:
          milliseconds: 500
      - action: button.press
        target:
          entity_id: button.warp3_2ita_startcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: >-
            Charging started ({{ states('input_select.ev_charge_mode') }}) at
            {{ states('sensor.ev_target_charging_current') }} A.

  # ============================================================
  # TRACK: while charging, follow the target current (all strategies).
  # mode:single + hold lets the fast battery loop settle against a fixed EV draw
  # before the EV is allowed to step again (breaks the limit cycle).
  # Manual mode is handled by wallbox_manual_charge, so it is excluded here.
  # ============================================================
  - alias: "Wallbox: Track target while charging"
    id: wallbox_track_target
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.ev_target_charging_current
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      - condition: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
    variables:
      target_amps: "{{ states('sensor.ev_target_charging_current') | int(6) }}"
      current_amps: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
      adjust_threshold_amps: 3 # wider deadband: ignore < ~690 W wobble
    actions:
      # Only write on a meaningful change...
      - condition: template
        value_template: "{{ (target_amps - current_amps) | abs >= adjust_threshold_amps }}"
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: "{{ target_amps }}"
      # ...then HOLD so the battery loop settles before the next EV step.
      - delay:
          minutes: 2

  # ============================================================
  # STOP (idle): target current dropped below 6 A for 2 minutes.
  # Covers pv_surplus losing the sun and pv_battery_floor hitting the SOC floor.
  # pv_grid_floor never drops below 6 A, so it is unaffected here.
  # mode=off and the energy limit are handled by wallbox_stop_on_limit_or_off.
  # ============================================================
  - alias: "Wallbox: Stop when target idle"
    id: wallbox_stop_on_idle
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_target_charging_current
        below: 6
        for:
          minutes: 2
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      # Do not stop manual fixed-current charging.
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
    actions:
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Charging stopped -- target current dropped to 0 A."

  # ============================================================
  # STOP (limit / off): stop when the energy target is reached or vehicle = off.
  # Applies to manual and automatic charging.
  # Re-checks on charge start and on limit changes, so an already-reached or
  # zero limit (percent = 0 / capacity not set) stops charging immediately.
  # ============================================================
  - alias: "Wallbox: Stop charging at limit or when mode is off"
    id: wallbox_stop_on_limit_or_off
    mode: single
    triggers:
      # Session energy crosses the limit while charging.
      - trigger: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
             >= states('sensor.ev_max_charge_energy') | float(0) }}
      # Vehicle mode set to off.
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
        to: "off"
      # Charging just started -> re-check immediately (no false->true transition
      # would fire the template trigger if the limit is already reached or 0).
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_charging
        to: "on"
      # Limit changed (vehicle/percent edited) -- may now be below charged energy.
      - trigger: state
        entity_id: sensor.ev_max_charge_energy
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      # Stop if vehicle is off OR the session has reached the energy limit.
      - condition: template
        value_template: >-
          {{ is_state('input_select.ev_vehicle_mode', 'off')
             or states('sensor.ev_session_energy') | float(0)
                >= states('sensor.ev_max_charge_energy') | float(0) }}
    actions:
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: >-
            Charging stopped -- vehicle={{ states('input_select.ev_vehicle_mode') }},
            session={{ states('sensor.ev_session_energy') }} kWh,
            limit={{ states('sensor.ev_max_charge_energy') }} kWh.

  # ============================================================
  # Slider correction: force the manual current to 0 or >= 6
  # (the wallbox cannot charge below 6 A).
  # ============================================================
  - alias: "Wallbox: Correct manual charging current"
    id: wallbox_correct_manual_current
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_number.ev_manual_charging_current
    conditions:
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        above: 0
        below: 6
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_manual_charging_current
        data:
          value: 0
