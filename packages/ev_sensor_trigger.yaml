# ============================================================
# PV surplus wallbox charging (WARP3) - Trigger Sensors
# ============================================================

template:
  # ----------------------------------------------------------
  # BATTERY FLOOR SOC FOR EV -- computed reserve.
  # ----------------------------------------------------------
  - triggers:
      - trigger: state
        entity_id:
          - sensor.expected_daily_consumption
          - sensor.house_consumption_energy_today
          - sensor.estimated_remaining_consumption
    sensor:
      - name: "Battery Floor SOC for EV"
        unique_id: battery_floor_soc_for_ev
        unit_of_measurement: "%"
        state_class: measurement
        state: >-
          {% set consumption_buffer = 1.10 %}
          {% set max_storage = state_attr('sensor.global_parameter', 'max_usable_energy') | float(10) %}
          {% set expected_daily_consumption = states('sensor.expected_daily_consumption') | float(0) %}
          {% set consumption_today = states('sensor.house_consumption_energy_today') | float(0) %}
          {% set consumption_static = [0, expected_daily_consumption - consumption_today] | max %}
          {% set consumption_live = states('sensor.estimated_remaining_consumption') | float(none) %}
          {% set consumption_blended = (0.5 * consumption_static + 0.5 * consumption_live)
                                        if consumption_live is not none else consumption_static %}
          {% set gross_consumption = consumption_blended * consumption_buffer %}

          {# --- 2. Restliche PV-Produktion abziehen --- #}
          {% set pv_remaining = states('sensor.pv_forecast_weighted') | float(0) %}
          {% set net_consumption = [0, gross_consumption - pv_remaining] | max %}

          {# --- 3. SOC-Floor berechnen --- #}
          {% if max_storage <= 0 %}
            100
          {% else %}
            {% set floor = (net_consumption / max_storage) * 100 %}
            {{ [[floor, 15] | max, 100] | min | round(1) }}
          {% endif %}

  # ----------------------------------------------------------
  # TARGET CHARGING CURRENT -- die neue Logik-Zentrale
  # ----------------------------------------------------------
  - trigger:
      - platform: state
        entity_id:
          - sensor.pv_dynamic_charging_current
          - sensor.pv_dynamic_charging_current_battery_first
          - sensor.battery_soc_total
          - sensor.battery_floor_soc_for_ev
          - sensor.ev_session_energy
          - sensor.ev_max_charge_energy
          - sensor.zero_soc
          - sensor.hondae_soc
          - input_select.ev_charge_mode
          - input_select.ev_vehicle_mode
          - input_number.ev_manual_charging_current

    sensor:
      - name: "EV Target Charging Current"
        unique_id: ev_target_charging_current
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set vehicle = states('input_select.ev_vehicle_mode') %}
          {% set cable = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if vehicle == 'off' or not cable %}
            0
          {% else %}
            {% set manual = states('input_number.ev_manual_charging_current') | int(0) %}
            {% if manual >= 6 %}
              {{ manual }}
            {% else %}
              {% set mode = states('input_select.ev_charge_mode') %}
              {% set surplus_ev_first_amps = states('sensor.pv_dynamic_charging_current') | int(0) %}
              {% set surplus_bat_first_amps = states('sensor.pv_dynamic_charging_current_battery_first') | int(0) %}
              {% set soc = states('sensor.battery_soc_total') | float(0) %}
              {% set floor = states('sensor.battery_floor_soc_for_ev') | float(100) %}

              {# --- MODUS 1: PV-Überschuss Fahrzeug priorisiert --- #}
              {% if mode == 'pv_ev_first' %}
                {{ surplus_ev_first_amps }}

              {# --- MODUS 2: PV-Überschuss Batterien priorisiert --- #}
              {% elif mode == 'pv_battery_first' %}
                {# Batterie nimmt alles, was sie kann. Der Rest (Gesamtüberschuss minus Batterie-Limit) geht ins Auto #}
                {{ surplus_bat_first_amps }}

              {# --- MODUS 3: PV-Überschuss 50/50 geteilt (Dynamisch nach Füllstand) --- #}
              {% elif mode == 'pv_shared_50_50' %}
                {% set ev_energy = states('sensor.ev_session_energy') | float(0) %}
                {% set ev_limit = states('sensor.ev_max_charge_energy') | float(0) %}
                
                {# Fahrzeugspezifischen SOC abfragen #}
                {% set ev_soc = 0 %}
                {% if vehicle == 'zero' %}
                  {% set ev_soc = states('sensor.zero_soc') | float(0) %}
                {% elif vehicle == 'honda_e' %}
                  {% set ev_soc = states('sensor.hondae_soc') | float(0) %}
                {% endif %}
                
                {# Vehicle gilt als voll, wenn das berechnete Energielimit erreicht ist ODER der Fahrzeug-SOC > 95.5% ist #}
                {% set ev_full = (ev_limit > 0 and ev_energy >= ev_limit) or (ev_soc > 95.5) %}

                {% if ev_full %}
                  {# Vehicle voll: Ladung stoppen (0A), gesamter Überschuss geht in die Hausbatterie #}
                  0
                {% elif soc >= 99 %}
                  {# Hausbatterie voll: Gesamter Überschuss ins Auto (wie ev_first) #}
                  {{ surplus_ev_first_amps }}
                {% else %}
                  {# Weder noch voll: 50/50 Aufteilung, aber Deckelung beachten! #}
                  {# Wenn die reguläre 50%-Aufteilung der Batterie MEHR zuteilen würde, als sie aufnehmen kann, #}
                  {# bekommt das Auto den restlichen Überschuss, den die Batterie nicht schafft. #}
                  {# Rechnerische 50%-Aufteilung wird durch den verbleibenden Überschuss nach Batterie gedeckelt #}
                  {% set half_amps = [ (surplus_ev_first_amps / 2) | int, surplus_bat_first_amps ] | max %}
                  {{ half_amps if half_amps >= 6 else 0 }}
                {% endif %}
                
              {# --- MODUS 4: Mind. 1.3kW (6A) / Max PV-Überschuss (Batterieschutz aktiv) --- #}
              {% elif mode == 'min_6a_floor_battery' %}
                {# Wenn genug Überschuss da ist, lade voll dynamisch mit Überschuss #}
                {% if surplus_ev_first_amps >= 6 %}
                  {{ surplus_ev_first_amps }}
                {% else %}
                  {# Ist zu wenig Sonne da, lade mit 6A (1.3kW) sofern SOC > Min-SOC #}
                  {{ 6 if soc > floor else 0 }}
                {% endif %}

              {# --- MODUS 5: Mind. 1.3kW (6A) / Max PV-Überschuss (ohne Batterieschutz) --- #}
              {% elif mode == 'min_6a_floor_grid' %}
                {{ [surplus_ev_first_amps, 6] | max }}
              {% else %}
                0
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          charge_mode: "{{ states('input_select.ev_charge_mode') }}"
