# --- INPUT NUMBERS ---
input_number:
  zero_ladung_stop_soc:
    name: "Zero Stop SoC"
    initial: 90
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_ladung_start_soc:
    name: "Zero Start SoC"
    initial: 60
    min: 30
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_manueller_ladestrom:
    name: "Manual Charging Current (0 = Automatic)"
    initial: 0
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:car-speed-limiter

# --- INPUT DATETIME ---
input_datetime:
  zero_last_charge_start:
    name: "Zero Last Charge Start"
    has_date: true
    has_time: true

  zero_last_automation_action:
    name: "Zero Last Automation Action"
    # Timestamp of the last start/stop action *initiated by the automation itself*.
    # Used to distinguish automation-triggered from user-triggered charging state changes.
    has_date: true
    has_time: true

  zero_user_override_until:
    name: "Zero User Override Until"
    # While now() < this timestamp, the automation is paused (user is in control).
    # Cleared when the cable is unplugged.
    has_date: true
    has_time: true

# --- TEMPLATES (SENSORS) ---
template:
  - triggers:
      - trigger: time_pattern
        seconds: "/30"
      - trigger: state
        entity_id:
          - sensor.warp3_2ita_powernow
          - sensor.solarnet_leistung_vom_netz
          - sensor.marstek_venus_1_ac_leistung
          - sensor.marstek_venus_2_ac_leistung
    sensor:
      - name: "Zero Dynamic Charging Current"
        unique_id: zero_dynamischer_ladestrom
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        state: >-
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if not cable_connected %}
            0
          {% else %}
            {# Sign conventions:
               - charger_power: positive = consumption
               - power_from_net: positive = grid import, negative = grid export
               - venus1/2: positive = discharging, negative = charging
               True PV surplus available for the wallbox (battery treated as flexible):
                 surplus = charger_power - power_from_net - venus1 - venus2
            #}
            {% set charger_power = states('sensor.warp3_2ita_powernow') | float(0) %}
            {% set power_from_net = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
            {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
            {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}

            {% set surplus = charger_power - power_from_net - venus1 - venus2 %}
            {% set amps = (surplus / 230) | round(0, 'floor') | int %}

            {% if amps >= 6 %}
            {% set max_amps = state_attr('sensor.zentrale_parameter', 'zero_max_amps') | float(16) %}
              {{ [[amps, 6] | max, max_amps] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}

      - name: "Zero User Override Active"
        unique_id: zero_user_override_active
        # Helper sensor: true while the user-override window is still in the future.
        # Output is forced lowercase ('true'/'false') so state-based conditions match.
        state: >-
          {% set ts = state_attr('input_datetime.zero_user_override_until', 'timestamp') %}
          {{ 'true' if ts is not none and ts > now().timestamp() else 'false' }}

# --- AUTOMATIONS ---
automation:
  # ============================================================
  # Main automation: PV-driven charging logic
  # ============================================================
  - alias: "Zero: Dynamic PV Surplus Charging"
    id: zero_pv_dynamic_charging
    mode: restart
    triggers:
      - trigger: state
        entity_id: sensor.zero_dynamischer_ladestrom
        for:
          seconds: 30 # only react to surplus changes that are stable for 30s
      - trigger: state
        entity_id: input_number.zero_manueller_ladestrom
        for:
          seconds: 2 # debounce slider drags
      - trigger: state
        entity_id: sensor.zero_motorcycles_1037976_soc
        for:
          seconds: 10 # SOC changes slowly
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
      - trigger: state
        entity_id: sensor.zero_user_override_active
        to: "false"
        # When the override expires, re-evaluate immediately
      # NEW: User pressed the start button on the wallbox -> recalculate target current.
      # We trigger on the button entity (its state is a timestamp that changes on every press)
      # because the wallbox may refuse to enter "charging" state when globalcurrent is 0.
      - trigger: state
        entity_id: button.warp3_2ita_startcharge

    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      # Respect user override window
      - condition: state
        entity_id: sensor.zero_user_override_active
        state: "false"
      # If this run was triggered by the start button, make sure the press was
      # from the user — not from the automation itself (which would loop).
      - condition: template
        value_template: >-
          {% if trigger is not defined or trigger.entity_id is not defined %}
            true
          {% elif trigger.entity_id != 'button.warp3_2ita_startcharge' %}
            true
          {% else %}
            {% set ts = state_attr('input_datetime.zero_last_automation_action', 'timestamp') %}
            {{ ts is none or (now().timestamp() - ts) > 5 }}
          {% endif %}

    variables:
      # Tunables — adjust here without touching the logic
      adjust_threshold_amps: 2 # only re-set current if delta >= this many amps
      min_charge_runtime_seconds: 180 # wallbox must run at least 3 min before auto-stopping
      startcharge_delay_ms: 500 # let the wallbox process set_value before pressing start

    actions:
      - variables:
          soc: "{{ states('sensor.zero_motorcycles_1037976_soc') | int(0) }}"
          manual_amps: "{{ states('input_number.zero_manueller_ladestrom') | int(0) }}"
          pv_amps: "{{ states('sensor.zero_dynamischer_ladestrom') | int(0) }}"
          stop_limit: "{{ states('input_number.zero_ladung_stop_soc') | int(100) }}"
          start_limit: "{{ states('input_number.zero_ladung_start_soc') | int(60) }}"
          current_wb_target: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
          is_charging: "{{ is_state('binary_sensor.warp3_2ita_charging', 'on') }}"
          # Detect whether THIS run was triggered by the user pressing the wallbox start button.
          # In that case we force the current to be re-set, ignoring the threshold.
          user_started: >-
            {{ trigger is defined
               and trigger.entity_id is defined
               and trigger.entity_id == 'button.warp3_2ita_startcharge' }}
          last_start_raw: "{{ states('input_datetime.zero_last_charge_start') }}"
          seconds_since_start: >-
            {% set ts = state_attr('input_datetime.zero_last_charge_start', 'timestamp') %}
            {{ (now().timestamp() - ts) | int if ts is not none else 99999 }}
          min_runtime_reached: "{{ seconds_since_start >= min_charge_runtime_seconds }}"

      - choose:
          # --- MODE A1: MANUAL CHARGING — active and below stop limit ---
          - conditions:
              - "{{ manual_amps >= 6 }}"
              - "{{ soc < stop_limit }}"
            sequence:
              - if:
                  - "{{ user_started or (manual_amps - current_wb_target) | abs >= adjust_threshold_amps }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.warp3_2ita_globalcurrent
                    data:
                      value: "{{ manual_amps }}"
              - if:
                  - "{{ not is_charging }}"
                then:
                  - delay:
                      milliseconds: "{{ startcharge_delay_ms }}"
                  # Mark this as automation-initiated BEFORE pressing the button,
                  # so the detector ignores the resulting state change.
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.zero_last_automation_action
                    data:
                      timestamp: "{{ now().timestamp() }}"
                  - action: button.press
                    target:
                      entity_id: button.warp3_2ita_startcharge
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.zero_last_charge_start
                    data:
                      timestamp: "{{ now().timestamp() }}"

          # --- MODE A2: MANUAL CHARGING — stop limit reached ---
          - conditions:
              - "{{ manual_amps >= 6 }}"
              - "{{ soc >= stop_limit }}"
              - "{{ is_charging }}"
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.zero_last_automation_action
                data:
                  timestamp: "{{ now().timestamp() }}"
              - action: button.press
                target:
                  entity_id: button.warp3_2ita_stopcharge
              # Reset manual to 0 -> falls back to PV auto mode next time
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_manueller_ladestrom
                data:
                  value: 0

          # --- MODE B: PV AUTOMATIC (when manual is 0) ---
          - conditions:
              - "{{ manual_amps == 0 }}"
              - "{{ soc < stop_limit }}"
              # Hysteresis: keep charging until stop_limit, or start fresh below start_limit.
              # User-initiated start bypasses the hysteresis (user wants to charge NOW).
              - "{{ is_charging or soc < start_limit or user_started }}"
            sequence:
              - choose:
                  # B1: START or ADJUST when enough PV surplus
                  - conditions:
                      - "{{ pv_amps >= 6 }}"
                    sequence:
                      - if:
                          - "{{ user_started or (pv_amps - current_wb_target) | abs >= adjust_threshold_amps }}"
                        then:
                          - action: number.set_value
                            target:
                              entity_id: number.warp3_2ita_globalcurrent
                            data:
                              value: "{{ pv_amps }}"
                      - if:
                          - "{{ not is_charging }}"
                        then:
                          - delay:
                              milliseconds: "{{ startcharge_delay_ms }}"
                          - action: input_datetime.set_datetime
                            target:
                              entity_id: input_datetime.zero_last_automation_action
                            data:
                              timestamp: "{{ now().timestamp() }}"
                          - action: button.press
                            target:
                              entity_id: button.warp3_2ita_startcharge
                          - action: input_datetime.set_datetime
                            target:
                              entity_id: input_datetime.zero_last_charge_start
                            data:
                              timestamp: "{{ now().timestamp() }}"

                  # B2: STOP — but only if min runtime reached or SOC limit hit.
                  # Skip auto-stop when the user just started the wallbox: give them
                  # the configured min_runtime window even if PV surplus is too low.
                  - conditions:
                      - "{{ is_charging }}"
                      - "{{ not user_started }}"
                      - "{{ soc >= stop_limit or (pv_amps < 6 and min_runtime_reached) }}"
                    sequence:
                      - action: input_datetime.set_datetime
                        target:
                          entity_id: input_datetime.zero_last_automation_action
                        data:
                          timestamp: "{{ now().timestamp() }}"
                      - action: button.press
                        target:
                          entity_id: button.warp3_2ita_stopcharge

              # When the user manually started the wallbox in PV mode, also stamp
              # last_charge_start so the min-runtime protection applies.
              - if:
                  - "{{ user_started }}"
                then:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.zero_last_charge_start
                    data:
                      timestamp: "{{ now().timestamp() }}"

  # ============================================================
  # User action detection: pause automation when user STOPS charging
  # (Starting the wallbox is no longer treated as an override —
  #  the user wants to charge, so the automation should help, not pause.)
  # ============================================================
  - alias: "Zero: Detect User Manual Wallbox Stop"
    id: zero_detect_user_action
    mode: queued
    max: 5
    triggers:
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_charging
        from: "on"
        to: "off"
    conditions:
      # Cable must be connected (otherwise charging state changes are not user actions)
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      # Ignore the change if the automation just triggered it (within 5 seconds)
      - condition: template
        value_template: >-
          {% set ts = state_attr('input_datetime.zero_last_automation_action', 'timestamp') %}
          {{ ts is none or (now().timestamp() - ts) > 5 }}
    actions:
      # User pressed stop directly on the wallbox -> pause automation for 15 min
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zero_user_override_until
        data:
          timestamp: "{{ (now() + timedelta(minutes=15)).timestamp() }}"
      - action: logbook.log
        data:
          name: "Zero Charger"
          message: >-
            User stop detected. Automation paused until
            {{ (now() + timedelta(minutes=15)).strftime('%H:%M') }}.

  # ============================================================
  # Reset user override when cable is unplugged
  # ============================================================
  - alias: "Zero: Reset User Override on Cable Unplug"
    id: zero_reset_override_on_unplug
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "off"
    actions:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zero_user_override_until
        data:
          timestamp: "{{ now().timestamp() }}"
      - action: logbook.log
        data:
          name: "Zero Charger"
          message: "Cable unplugged — user override cleared."

  # ============================================================
  # Slider correction: force 0 or >=6
  # ============================================================
  - alias: "Zero: Correct Manual Charging Current"
    id: zero_korrigiere_manuellen_ladestrom
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_number.zero_manueller_ladestrom
    conditions:
      - condition: numeric_state
        entity_id: input_number.zero_manueller_ladestrom
        above: 0
        below: 6
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.zero_manueller_ladestrom
        data:
          value: 0
