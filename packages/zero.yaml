# --- INPUT NUMBERS ---
input_number:
  zero_ladung_stop_soc:
    name: "Zero Stop SoC"
    initial: 90
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_ladung_start_soc:
    name: "Zero Start SoC"
    initial: 60
    min: 30
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_manueller_ladestrom:
    name: "Manueller Ladestrom (0 = Automatik)"
    initial: 0
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:car-speed-limiter

# --- TEMPLATES (SENSORS) ---
template:
  - sensor:
      - name: "Warp3 Berechnete Leistung"
        unique_id: "warp3_calculated_power"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {# Wir nutzen den Zielwert (globalcurrent), damit die Berechnung sofort reagiert #}
          {% if is_state('binary_sensor.warp3_2ita_cable', 'on') %}
            {% set current = states('number.warp3_2ita_globalcurrent') | float(0) %}
            {{ (current * 230) | round(0) }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: time_pattern
        seconds: "/30"
      - platform: state
        entity_id:
          - sensor.warp3_2ita_powernow
          - sensor.solarnet_leistung_vom_netz
          - sensor.marstek_venus_1_ac_leistung
          - sensor.marstek_venus_2_ac_leistung
    sensor:
      - name: "Zero Dynamischer Ladestrom"
        unique_id: zero_dynamischer_ladestrom
        unit_of_measurement: "A"
        state_class: measurement
        state: >-
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if cable_connected %}
            {% set charger_power = states('sensor.warp3_2ita_powernow') | float(0) %}
            {% set power_from_net = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
            {# Batterie lädt < 0 #}
            {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
            {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}

            {# Überschussberechnung: es fehlt noch die batterieleistung #}
            {% set surplus = charger_power - power_from_net - venus1 - venus2 %}
            {% set amps = (surplus / 230) | int(0) %}
            
            {% if amps >= 6 %}
              {{ amps | clamp(6, 16) }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

# --- AUTOMATIONS ---
automation:
  - alias: "Zero: PV-Überschuss Laden Dynamisch"
    id: zero_pv_dynamic_charging
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.zero_dynamischer_ladestrom
        for:
          seconds: 5 # Entschärfung bei Schwankungen
      - platform: state
        entity_id: input_number.zero_manueller_ladestrom
      - platform: state
        entity_id: sensor.zero_motorcycles_1037976_soc
        for:
          seconds: 10 # SOC ändert sich langsam
      - platform: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
      - platform: time_pattern
        minutes: "/2" # Fallback: alle 30 s prüfen

    condition:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"

    action:
      - variables:
          soc: "{{ states('sensor.zero_motorcycles_1037976_soc') | float(0) }}"
          manual_amps: "{{ states('input_number.zero_manueller_ladestrom') | int(0) }}"
          pv_amps: "{{ states('sensor.zero_dynamischer_ladestrom') | int(0) }}"
          stop_limit: "{{ states('input_number.zero_ladung_stop_soc') | float(100) }}"
          start_limit: "{{ states('input_number.zero_ladung_start_soc') | float(100) }}"
          current_wb_target: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
          is_charging: "{{ is_state('binary_sensor.warp3_2ita_charging', 'on') | bool }}"

      - choose:
          # --- MODUS A: MANUELLER LADESTROM (Priorität) ---
          - conditions:
              - "{{ manual_amps | int(0) >= 6 }}"
              - "{{ soc | float(0) < stop_limit | float(100) }}"
            sequence:
              - if:
                  - "{{ manual_amps | int(0) != current_wb_target | int(0) }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.warp3_2ita_globalcurrent
                    data:
                      value: "{{ manual_amps }}"
              - if:
                  - "{{ not is_charging }}"
                then:
                  - action: button.press
                    target:
                      entity_id: button.warp3_2ita_startcharge

          - conditions:
              - "{{ manual_amps | int(0) >= 6 }}"
              - "{{ soc | int(0) >= stop_limit | int(0) }}"
              - "{{ is_charging }}"
            sequence:
              - action: button.press
                target:
                  entity_id: button.warp3_2ita_stopcharge
              - action: input_number.set_value
                target:
                  entity_id: input_number.zero_manueller_ladestrom
                data:
                  value: 0

          # --- MODUS B: PV-AUTOMATIK (wenn manuell auf 0 steht) ---
          - conditions:
              - "{{ manual_amps | int(0) == 0 }}"
              - "{{ soc | int(0) < stop_limit | int(0)}}"
              - "{{ is_charging or soc | int(0) < start_limit | int(0) }}"
            sequence:
              - choose:
                  # START oder ANPASSUNG
                  - conditions:
                      - "{{ pv_amps | int(0) >= 6 }}"
                      - "{{ soc | int(0) < stop_limit | int(0) }}"
                    sequence:
                      - if:
                          - "{{ pv_amps | int(0) != current_wb_target | int(0) }}"
                        then:
                          - action: number.set_value
                            target:
                              entity_id: number.warp3_2ita_globalcurrent
                            data:
                              value: "{{ pv_amps }}"
                      - if:
                          - "{{ not is_charging }}"
                        then:
                          - action: button.press
                            target:
                              entity_id: button.warp3_2ita_startcharge

                  # STOPP (Limit erreicht oder zu wenig Sonne)
                  - conditions:
                      - "{{ is_charging }}"
                      - "{{ soc | int(0) >= stop_limit | int(0) or pv_amps | int(0) < 6 }}"
                    sequence:
                      - action: button.press
                        target:
                          entity_id: button.warp3_2ita_stopcharge

  - alias: "Zero: Korrigiere manuellen Ladestrom"
    id: zero_korrigiere_manuellen_ladestrom
    mode: restart
    trigger:
      - platform: state
        entity_id: input_number.zero_manueller_ladestrom
    condition:
      - condition: numeric_state
        entity_id: input_number.zero_manueller_ladestrom
        above: 0
        below: 6
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.zero_manueller_ladestrom
        data:
          value: 0
