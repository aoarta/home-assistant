input_number:
  zero_ladung_stop_soc:
    name: "Zero Stop SoC"
    initial: 90
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_ladung_start_soc:
    name: "Zero Start SoC"
    initial: 60
    min: 30
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  zero_manueller_ladestrom:
    name: "Manueller Ladestrom (0 = Automatik)"
    initial: 0
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:car-speed-limiter

template:
  - sensor:
      - name: "Warp3 Berechnete Leistung"
        unique_id: "warp3_calculated_power"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% if is_state('binary_sensor.warp3_2ita_cable', 'on') and is_state('binary_sensor.warp3_2ita_charging', 'on') %}
            {% set current = states('sensor.warp3_2ita_allowedcurrent') | float(0) %}
            {{ (current * 235) | round(0) }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: time_pattern
        seconds: "/30"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
        from: "off"
    sensor:
      - name: "Zero Dynamischer Ladestrom"
        unique_id: zero_dynamischer_ladestrom
        unit_of_measurement: "A"
        state: >
          {% set cable_connected = is_state('binary_sensor.warp3_2ita_cable', 'on') %}
          {% if cable_connected %}
            {% set pv = states('sensor.solarnet_pv_leistung') | float(0) %}
            {% set haus = states('sensor.hausverbrauch_netto_watt') | float(0) %}
            {% set wb_watt = states('sensor.warp3_berechnete_leistung') | float(0) %}
            
            {% set surplus = pv - (haus - wb_watt) %}
            {% set amps = (surplus / 235) | round(0, 'floor') %}
            {{ amps | clamp(6, 16) if amps >= 6 else 0 }}
          {% else %}
            0
          {% endif %}

automation:
  - alias: "Zero: PV-Überschuss Laden Dynamisch"
    id: zero_pv_dynamic_charging
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.zero_dynamischer_ladestrom
      - platform: state
        entity_id: input_number.zero_manueller_ladestrom
    condition:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"

    action:
      - variables:
          # Variablen-Definition (Stelle sicher, dass diese Sensoren existieren)
          soc: "{{ states('sensor.zero_motorcycles_1037976_soc') | float(0) }}"
          manual_amps: "{{ states('input_number.zero_manueller_ladestrom') | float(0) }}"
          pv_amps: "{{ states('sensor.zero_dynamischer_ladestrom') | float(0) }}"
          stop_limit: "{{ states('input_number.zero_ladung_stop_soc') | float(100) }}"
          start_limit: "{{ states('input_number.zero_ladung_start_soc') | float(50) }}"
          is_charging: "{{ is_state('binary_sensor.warp3_2ita_charging', 'on') }}"
          current_wb_amps: "{{ states('number.warp3_2ita_globalcurrent') | float(0) }}"

      - choose:
          # --- MODUS A: MANUELLER LADESTROM ---
          - conditions:
              - "{{ manual_amps >= 6 }}"
              - "{{ soc > 0 }}" # Sicherheitscheck: SoC darf nicht 0 sein
              - "{{ soc < stop_limit }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ manual_amps != current_wb_amps }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: number.warp3_2ita_globalcurrent
                    data:
                      value: "{{ manual_amps }}"
              - if:
                  - condition: template
                    value_template: "{{ not is_charging }}"
                then:
                  - action: button.press
                    target:
                      entity_id: button.warp3_2ita_startcharge

          # --- MODUS B: PV-AUTOMATIK ---
          - conditions:
              - "{{ manual_amps < 6 }}"
              - "{{ soc > 0 }}" # Sicherheitscheck: SoC darf nicht 0 sein
            sequence:
              - choose:
                  # START / ANPASSEN
                  - conditions:
                      - "{{ pv_amps >= 6 }}"
                      - "{{ (not is_charging and soc < start_limit) or (is_charging and soc < stop_limit) }}"
                    sequence:
                      - if:
                          - condition: template
                            value_template: "{{ pv_amps != current_wb_amps }}"
                        then:
                          - action: number.set_value
                            target:
                              entity_id: number.warp3_2ita_globalcurrent
                            data:
                              value: "{{ pv_amps }}"
                      - if:
                          - condition: template
                            value_template: "{{ not is_charging }}"
                        then:
                          - action: button.press
                            target:
                              entity_id: button.warp3_2ita_startcharge

                  # STOPP (SoC erreicht oder zu wenig Sonne)
                  - conditions:
                      - "{{ is_charging }}"
                      - "{{ soc >= stop_limit or pv_amps < 6 }}"
                    sequence:
                      - action: button.press
                        target:
                          entity_id: button.warp3_2ita_stopcharge

  - alias: "Zero Korrigiere manuellen Ladestrom"
    id: zero_korrigiere_manuellen_ladestrom
    mode: restart
    trigger:
      - platform: state
        entity_id: input_number.zero_manueller_ladestrom
    condition:
      - condition: numeric_state
        entity_id: input_number.zero_manueller_ladestrom
        above: 0
        below: 6
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.zero_manueller_ladestrom
        data:
          value: 0
