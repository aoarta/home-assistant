input_number:
  verbrauch_speicher_wochentag:
    name: "Speicher Wochentag"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-range

  verbrauch_speicher_samstag:
    name: "Speicher Samstag"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-weekend

  verbrauch_speicher_sonntag:
    name: "Speicher Sonntag/Feiertag"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-star

utility_meter:
  hausverbrauch_heute_um:
    unique_id: hausverbrauch_heute_um
    source: sensor.hausverbrauch_energie_kwh
    name: "Hausverbrauch Heute UM"

sensor:
  - platform: integration
    source: sensor.hausverbrauch_netto_watt # Eingang: Watt
    name: "Hausverbrauch Energie kWh"
    unique_id: hausverbrauch_energie_kwh
    unit_prefix: k # W → kWh
    unit_time: h # pro Stunde
    round: 3
    method: trapezoidal # Trapezmethode = genauer

  - platform: filter
    name: "Hausverbrauch 5 Min Durchschnitt"
    unique_id: hausverbrauch_5min_avg
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "PV Produktion 5 Min Durchschnitt"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.solarnet_pv_leistung
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Solarnet Leistung vom Netz 5 min Durchschnitt"
    unique_id: solarnet_leistung_vom_netz_5min_avg
    entity_id: sensor.solarnet_leistung_vom_netz
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1
      - filter: throttle
        window_size: 300

