template:
  - sensor:
      - name: "Net House Consumption Power"
        unique_id: hausverbrauch_leistung_netto
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_batterieleistung_gesamt') and
             has_value('sensor.pv_produktion_watt_fast')
             }}
        state: >-
          {{ ( states('sensor.solarnet_leistung_vom_netz') | float(0)
               + states('sensor.marstek_batterieleistung_gesamt') | float(0)
               + states('sensor.pv_produktion_watt_fast') | float(0)
              ) | round(0) }}

  - sensor:
      - name: "Charge Power"
        unique_id: Ladeleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_batterieleistung_gesamt') }}
        state: >-
          {{ ( states('sensor.solarnet_leistung_vom_netz') | float(0) +
               states('sensor.marstek_batterieleistung_gesamt') | float(0)
              ) | round(0) }}

  #  - sensor:
  #      - name: "Stable Charge Power"
  #        unique_id: ladeleistung_stabil
  #        unit_of_measurement: "W"
  #        device_class: power
  #        state_class: measurement
  #        availability: "{{ has_value('sensor.ladeleistung') }}"
  #        state: >-
  #          {{ ((states('sensor.ladeleistung') | float(0) / 15) | int) * 15 }}

  - triggers:
      - trigger: state
        entity_id: sensor.ladeleistung
    sensor:
      - name: "Stable Charge Power"
        unique_id: ladeleistung_stabil
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "{{ has_value('sensor.ladeleistung') }}"
        state: >-
          {% set neu = states('sensor.ladeleistung') | float(0) %}
          {% set alt = this.state | float(neu) %}
          {{ neu | round(0) if (neu - alt) | abs >= 15 else alt }}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h_fast # ✓ Fix: updates continuously
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set fast = states('sensor.average_consumption_last_1h_fast') %}
          {% if is_number(fast) %}
            {{ fast | float(0) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0
          {% endif %}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set watt = states('sensor.average_consumption_last_1h') | float(none) %}
          {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(none) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watt is not none and sun_set is not none and sun_set > now_ts %}
            {{ (watt * (sun_set - now_ts) / 3600 / 1000) | round(2) }}
          {% elif sun_set is not none and sun_set <= now_ts %}
            0.0
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0.0
          {% endif %}
        attributes:
          remaining_time_h: >-
            {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
            {% set now_ts = as_timestamp(now()) %}
            {{ ((sun_set - now_ts) / 3600) | round(2) if sun_set > now_ts else 0 }}

  - triggers:
      - trigger: time
        at: "23:45:00"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "House Consumption Energy Until Sunrise"
        unique_id: hausverbrauch_energie_bis_sonnenaufgang
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% if trigger.platform == 'time' %}
            {% set aktuell = states('sensor.hausverbrauch_energie_heute') | float(none) %}
            {% set alt = this.state | float(none) %}
            {% if aktuell is not none and alt is not none %}
              {{ (0.9 * aktuell + 0.1 * alt) | round(2) }}
            {% elif aktuell is not none %}
              {{ aktuell | round(2) }}
            {% else %}
              {{ this.state | default(0.0) }}
            {% endif %}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            {{ states('sensor.hausverbrauch_energie_heute') | float(10.0) }}
          {% endif %}

  - triggers:
      - trigger: time
        at: "00:31:00"
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - binary_sensor.workday
          - binary_sensor.workday_tomorrow
          - input_number.verbrauch_speicher_wochentag
          - input_number.verbrauch_speicher_samstag
          - input_number.verbrauch_speicher_sonntag

    sensor:
      - name: "Expected daily consumption"
        unique_id: expected_daily_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.verbrauch_speicher_wochentag') and
             has_value('binary_sensor.workday') }}
        state: >-
          {% set ist_sonntag         = now().weekday() == 6 %}
          {% set feiertag            = is_state('binary_sensor.workday', 'off') %}
          {% set ist_samstag         = now().weekday() == 5 %}
          {% set morgen_ist_feiertag = is_state('binary_sensor.workday_tomorrow', 'off') %}

          {% if ist_sonntag or feiertag %}
            {{ states('input_number.verbrauch_speicher_sonntag') | float(0) | round(1) }}
          {% elif ist_samstag or morgen_ist_feiertag %}
            {{ states('input_number.verbrauch_speicher_samstag') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.verbrauch_speicher_wochentag') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set ist_sonntag         = now().weekday() == 6 %}
            {% set feiertag            = is_state('binary_sensor.workday', 'off') %}
            {% set ist_samstag         = now().weekday() == 5 %}
            {% set morgen_ist_feiertag = is_state('binary_sensor.workday_tomorrow', 'off') %}
            {% if ist_sonntag or feiertag %}Sunday/Holiday
            {% elif ist_samstag or morgen_ist_feiertag %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}
          weekday_kwh: "{{ states('input_number.verbrauch_speicher_wochentag') | float(0) | round(1) }}"
          saturday_kwh: "{{ states('input_number.verbrauch_speicher_samstag')   | float(0) | round(1) }}"
          sunday_kwh: "{{ states('input_number.verbrauch_speicher_sonntag')   | float(0) | round(1) }}"

      - name: "Expected daily consumption tomorrow"
        unique_id: expected_daily_consumption_tomorrow
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.verbrauch_speicher_wochentag') and
             has_value('binary_sensor.workday_tomorrow') }}
        state: >-
          {% set wt              = (now().weekday() + 1) % 7 %}
          {% set ist_sonntag     = wt == 6 %}
          {% set ist_samstag     = wt == 5 %}
          {% set feiertag        = is_state('binary_sensor.workday_tomorrow', 'off') %}
          {# Pre-holiday: no workday+2 sensor → only checkable by weekday #}
          {% set vorfeiertag     = (now().weekday() + 2) % 7 == 6 %}

          {% if ist_sonntag or feiertag %}
            {{ states('input_number.verbrauch_speicher_sonntag') | float(0) | round(1) }}
          {% elif ist_samstag or vorfeiertag %}
            {{ states('input_number.verbrauch_speicher_samstag') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.verbrauch_speicher_wochentag') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set wt          = (now().weekday() + 1) % 7 %}
            {% set ist_sonntag = wt == 6 %}
            {% set ist_samstag = wt == 5 %}
            {% set feiertag    = is_state('binary_sensor.workday_tomorrow', 'off') %}
            {% set vorfeiertag = (now().weekday() + 2) % 7 == 6 %}
            {% if ist_sonntag or feiertag %}Sunday/Holiday
            {% elif ist_samstag or vorfeiertag %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}

      - name: "Expected daily consumption day after"
        unique_id: expected_daily_consumption_day_after
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.verbrauch_speicher_wochentag') }}
        state: >-
          {% set wt          = (now().weekday() + 2) % 7 %}
          {% set ist_sonntag = wt == 6 %}
          {% set ist_samstag = wt == 5 %}
          {# No workday sensor for +2/+3 days → public holidays not detectable #}
          {% set vorfeiertag = (now().weekday() + 3) % 7 == 6 %}

          {% if ist_sonntag %}
            {{ states('input_number.verbrauch_speicher_sonntag') | float(0) | round(1) }}
          {% elif ist_samstag or vorfeiertag %}
            {{ states('input_number.verbrauch_speicher_samstag') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.verbrauch_speicher_wochentag') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set wt          = (now().weekday() + 2) % 7 %}
            {% set ist_sonntag = wt == 6 %}
            {% set ist_samstag = wt == 5 %}
            {% set vorfeiertag = (now().weekday() + 3) % 7 == 6 %}
            {% if ist_sonntag %}Sunday (weekday only, no holiday sensor)
            {% elif ist_samstag or vorfeiertag %}Saturday/Pre-holiday (weekday only)
            {% else %}Weekday
            {% endif %}

automation:
  - alias: "Energy Management: Save & Reset at Sunrise"
    id: "consumption_save_counters"
    description: "Saves the previous day's consumption and resets the counter afterwards"
    triggers:
      - trigger: sun
        event: sunrise
        offset: "00:30:00" # Trigger shortly after sunrise
    mode: single
    actions:
      # Step 1: Calculate variables
      - variables:
          vortag: "{{ now() - timedelta(hours=12) }}"
          ist_samstag: "{{ (now() - timedelta(hours=12)).weekday() == 5 }}"
          ist_sonntag: "{{ (now() - timedelta(hours=12)).weekday() == 6 }}"
          feiertag: "{{ is_state('binary_sensor.workday', 'off') }}"
          morgen_ist_feiertag: "{{ is_state('binary_sensor.workday_tomorrow', 'off') }}"
          # Current value before reset:
          neu: "{{ states('sensor.hausverbrauch_energie_heute') | float(0) }}"

      # Step 2: Write to the correct storage bucket
      - choose:
          # CASE 1: Sunday or public holiday
          - conditions:
              - condition: template
                value_template: "{{ ist_sonntag or feiertag }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.verbrauch_speicher_sonntag
                data:
                  value: >
                    {% set alt = states('input_number.verbrauch_speicher_sonntag') | float(0) %}
                    {{ (2 * alt + neu) / 3 }}

          # CASE 2: Saturday or day BEFORE a public holiday
          - conditions:
              - condition: template
                value_template: "{{ ist_samstag or morgen_ist_feiertag }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.verbrauch_speicher_samstag
                data:
                  value: >
                    {% set alt = states('input_number.verbrauch_speicher_samstag') | float(0) %}
                    {{ (2 * alt + neu) / 3 }}

        # CASE 3: Normal weekday
        default:
          - action: input_number.set_value
            target:
              entity_id: input_number.verbrauch_speicher_wochentag
            data:
              value: >
                {% set alt = states('input_number.verbrauch_speicher_wochentag') | float(0) %}
                {{ (4 * alt + neu) / 5 }}

      # Step 3: Short safety delay (10 seconds)
      - delay: "00:00:10"

      # Step 4: Reset the counter for the new day to zero
      #      - action: utility_meter.calibrate
      #        target:
      #          entity_id: sensor.hausverbrauch_energie_heute_um
      #        data:
      #          value: "0.00"
      - action: utility_meter.reset
        target:
          entity_id: sensor.hausverbrauch_energie_heute_um
