template:
  - sensor:
      - name: "Hausverbrauch Netto Watt"
        unique_id: hausverbrauch_netto_watt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_batterieleistung_gesamt') and
             hasvalue('sensor.pv_produktion_watt_fast')}}
        state: >-
          {{ ( states('sensor.solarnet_leistung_vom_netz') | float(0) +
               states('sensor.marstek_batterieleistung_gesamt') | float(0) +
               states('sensor.pv_produktion_watt_fast') | float(0) 
              ) | round(0) }}

  - sensor:
      - name: "Hausverbrauch Netto Stabil"
        unique_id: hausverbrauch_netto_stabil
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "{{ has_value('sensor.hausverbrauch_netto_watt') }}"
        state: >-
          {{ ((states('sensor.hausverbrauch_netto_watt') | float(0) / 15) | int) * 15 }}

  - trigger:
      - platform: state
        entity_id: sensor.average_consumption_last_1h_fast # ✓ Fix: aktualisiert laufend
      - platform: homeassistant
        event: start
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set fast = states('sensor.average_consumption_last_1h_fast') %}
          {% if is_number(fast) %}
            {{ fast | float(0) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.average_consumption_last_1h
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set watt = states('sensor.average_consumption_last_1h') | float(none) %}
          {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(none) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watt is not none and sun_set is not none and sun_set > now_ts %}
            {{ (watt * (sun_set - now_ts) / 3600 / 1000) | round(2) }}
          {% elif sun_set is not none and sun_set <= now_ts %}
            0.0
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0.0
          {% endif %}
        attributes:
          verbleibende_zeit_h: >-
            {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
            {% set now_ts = as_timestamp(now()) %}
            {{ ((sun_set - now_ts) / 3600) | round(2) if sun_set > now_ts else 0 }}

      - name: "PV Speicher Bilanz Heute"
        unique_id: expected_need_today # Verbrauch und Speicherung
        unit_of_measurement: "kWh"
        state: >-
          {% set free_m = states('sensor.marstek_free_capacity_kwh') %}
          {% set free_u = states('sensor.ups_free_capacity_kwh') %}
          {% set load = states('sensor.estimated_remaining_consumption') %}

          {% if is_number(free_m) and is_number(free_u) and is_number(load) %}
            {{ (free_m|float + free_u|float + load|float) | round(1) }}
          {% else %}
            {{ this.state | default(0) }}
          {% endif %}

  - trigger:
      - platform: time
        at: "23:45:00"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Hausverbrauch Gestern 23:45"
        unique_id: hausverbrauch_gestern_2345
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% if trigger.platform == 'time' %}
            {% set aktuell = states('sensor.hausverbrauch_heute_um') | float(none) %}
            {% set alt = this.state | float(none) %}
            {% if aktuell is not none and alt is not none %}
              {{ (0.9 * aktuell + 0.1 * alt) | round(2) }}
            {% elif aktuell is not none %}
              {{ aktuell | round(2) }}
            {% else %}
              {{ this.state | default(0.0) }}
            {% endif %}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            {{ states('sensor.hausverbrauch_heute_um') | float(10.0) }}
          {% endif %}

automation:
  - alias: "Energiemanagement: Speichern & Reset bei Sonnenaufgang"
    description: "Speichert den Verbrauch des vergangenen Tages und setzt den Zähler danach zurück"
    trigger:
      - platform: sun
        event: sunrise
        offset: "00:30:00" # Auslöser kurz nach Sonnenaufgang
    mode: single
    action:
      # 1. SCHRITT: Variablen berechnen
      - variables:
          vortag: "{{ now() - timedelta(hours=12) }}"
          wochentag: "{{ vortag.weekday() }}"
          ist_sonntag: "{{ wochentag == 6 }}"
          ist_samstag: "{{ wochentag == 5 }}"
          feiertag: "{{ is_state('binary_sensor.holiday', 'off') }}"
          morgen_ist_feiertag: "{{ is_state('binary_sensor.holiday_tomorrow', 'off') }}"
          # Der aktuelle Wert vor dem Reset:
          neu: "{{ states('sensor.hausverbrauch_heute_um') | float(0) }}"

      # 2. SCHRITT: In den richtigen Speicher schreiben
      - choose:
          # FALL 1: Sonntag, Feiertag oder Tag VOR Feiertag
          - conditions:
              - condition: template
                value_template: "{{ ist_sonntag or feiertag or morgen_ist_feiertag }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.verbrauch_speicher_sonntag
                data:
                  value: >
                    {% set alt = states('input_number.verbrauch_speicher_sonntag') | float(0) %}
                    {{ (alt * 6/7) + neu }}

          # FALL 2: Samstag
          - conditions:
              - condition: template
                value_template: "{{ ist_samstag }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.verbrauch_speicher_samstag
                data:
                  value: >
                    {% set alt = states('input_number.verbrauch_speicher_samstag') | float(0) %}
                    {{ (alt * 6/7) + neu }}

        # FALL 3: Normaler Wochentag
        default:
          - service: input_number.set_value
            target:
              entity_id: input_number.verbrauch_speicher_wochentag
            data:
              value: >
                {% set alt = states('input_number.verbrauch_speicher_wochentag') | float(0) %}
                {{ (alt * 6/7) + neu }}

      # 3. SCHRITT: Kurze Wartezeit zur Sicherheit (10 Sekunden)
      - delay: "00:00:10"

      # 4. SCHRITT: Den Zähler für den neuen Tag auf Null setzen
      - service: utility_meter.calibrate
        target:
          entity_id: sensor.hausverbrauch_heute_um
        data:
          value: "0.00"
