input_number:
  consumption_storage_weekday:
    name: "Storage Weekday"
    min: 0
    max: 10000
    step: 0.01
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-range

  consumption_storage_saturday:
    name: "Storage Saturday"
    min: 0
    max: 10000
    step: 0.01
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-weekend

  consumption_storage_sunday:
    name: "Storage Sunday/Holiday"
    min: 0
    max: 10000
    step: 0.01
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-star

utility_meter:
  # Helper entity
  house_energy_consumption_today_um:
    unique_id: house_energy_consumption_today_um
    source: sensor.house_consumption_energy
    name: "House Consumption Energy Today UM"

sensor:
  - platform: integration
    source: sensor.house_consumption_power_brutto
    name: "House Consumption Energy"
    unique_id: house_consumption_energy
    unit_prefix: k # W → kWh
    unit_time: h # per hour
    round: 3
    method: trapezoidal # Trapezoidal method = more accurate

  - platform: filter
    name: "House Consumption Energy Today"
    unique_id: house_consumption_energy_today
    entity_id: sensor.house_consumption_energy_today_um
    filters:
      - filter: range
        upper_bound: 60 # Everything above 60 kWh per day is ignored

  - platform: filter
    name: "House Consumption 5 Min Average"
    unique_id: house_consumption_power_5_min_avg
    entity_id: sensor.house_consumption_power_brutto
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "PV Production 5 Min Average"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.leistung_von_pv_ac
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Grid Power 5 Min Average"
    unique_id: leistung_vom_netz_5min_avg
    entity_id: sensor.leistung_vom_netz
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.house_consumption_power_brutto
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1
      - filter: throttle
        window_size: 300

template:
  - sensor:
      - name: "House Consumption Power brutto"
        # house without chargers
        unique_id: house_consumption_power_brutto
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.leistung_vom_netz') and
             has_value('sensor.marstek_ac_power_total') and
             has_value('sensor.pv_production_power') and
             has_value('sensor.ev_charging_power')
             }}
        state: >-
          {{ ( states('sensor.leistung_vom_netz') | float(0)
               + states('sensor.marstek_ac_power_total') | float(0)
               + states('sensor.pv_production_power') | float(0) 
               + states('sensor.ev_charging_power') | float(0)
              ) | round(0) }}

      #      - name: "Charge Power"
      #        unique_id: charge_power
      #        unit_of_measurement: "W"
      #        device_class: power
      #        state_class: measurement
      #        availability: >-
      #          {{ has_value('sensor.leistung_vom_netz') and
      #              has_value('sensor.marstek_ac_power_total') }}
      #        state: >-
      #          {{ ( states('sensor.leistung_vom_netz') | float(0) +
      #                states('sensor.marstek_ac_power_total') | float(0)
      #             ) | round(0) }}

      - name: "Expected Remaining Consumption Today"
        unique_id: expected_remaining_consumption_today
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        icon: mdi:home-lightning-bolt-outline
        state: >-
          {% set expected = states('sensor.expected_daily_consumption') | float(0) %}
          {% set consumed = states('sensor.house_consumption_energy_today_um') | float(0) %}
          {{ [expected - consumed, 0] | max | round(2) }}
        availability: >-
          {{ states('sensor.expected_daily_consumption') | is_number
            and states('sensor.house_consumption_energy_today_um') | is_number }}

  - triggers:
      - trigger: state
        entity_id: sensor.leistung_vom_netz
      #      - trigger: state
      #        entity_id: sensor.marstek_ac_power_total
      - trigger: state
        entity_id: binary_sensor.marstek_ringstrom_fehler
    sensor:
      - name: "Charge Power"
        unique_id: charge_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.leistung_vom_netz') and
             has_value('sensor.marstek_ac_power_total') }}
        state: >-
          {# 1. Den theoretischen 100%-Zielwert berechnen #}
          {% set netz = states('sensor.leistung_vom_netz') | float(0) %}
          {% set marstek = states('sensor.marstek_ac_power_total') | float(0) %}
          {% set ziel = netz + marstek %}

          {# 2. Den aktuellen Zustand des Sensors auslesen #}
          {% set aktuell = this.state | float(ziel) %}

          {# 3. Zeit seit der letzten ECHTEN Änderung dieses Sensors berechnen #}
          {% set letzte_aenderung = this.last_changed | default(now(), true) %}
          {% set zeit_seit_aenderung = as_timestamp(now()) - as_timestamp(letzte_aenderung) %}

          {# 4. P-Faktor anwenden (Sanfte Annäherung) #}
          {% set p_faktor = 1.0 %}
          {% set neu = aktuell + ((ziel - aktuell) * p_faktor) %}

          {# Wenn der neue Wert im Betrag kleiner als 40W ist, erzwinge eine glatte Null #}
          {% if neu | abs < 40 %}
            {% set neu = 0 %}
          {% endif %}

          {# 5. Logik: Ändern bei >= 20W ODER wenn 1 Minute um ist #}
          {% if (neu - aktuell) | abs >= 20 or zeit_seit_aenderung > 60 %}
            {{ neu | round(0) }}
          {% else %}
            {{ aktuell | round(0) }}
          {% endif %}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h_fast # ✓ Fix: updates continuously
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set fast = states('sensor.average_consumption_last_1h_fast') %}
          {% if is_number(fast) %}
            {{ fast | float(0) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0
          {% endif %}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set watt = states('sensor.average_consumption_last_1h') | float(none) %}
          {% set sunrise = as_timestamp(state_attr('sun.sun', 'next_rising'), none) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watt is not none and sunrise is not none and sunrise > now_ts %}
            {{ (watt * (sunrise - now_ts) / 3600 / 1000) | round(2) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0.0
          {% endif %}

  - triggers:
      - trigger: time
        at: "23:45:00"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "House Consumption Energy Until Sunrise"
        unique_id: house_consumption_energy_until_sunrise
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% if trigger.platform == 'time' %}
            {% set aktuell = states('sensor.house_consumption_energy_today') | float(none) %}
            {% set alt = this.state | float(none) %}
            {% if aktuell is not none and alt is not none %}
              {{ (0.9 * aktuell + 0.1 * alt) | round(2) }}
            {% elif aktuell is not none %}
              {{ aktuell | round(2) }}
            {% else %}
              {{ this.state | default(0.0) }}
            {% endif %}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            {{ states('sensor.house_consumption_energy_today') | float(10.0) }}
          {% endif %}

  - triggers:
      - trigger: sun
        event: sunrise
        offset: "00:30:00" # same anchor as the counter reset
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_number.consumption_storage_weekday
          - input_number.consumption_storage_saturday
          - input_number.consumption_storage_sunday
    sensor:
      - name: "Expected daily consumption"
        unique_id: expected_daily_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') }}
        state: >-
          {% from 'holidays.jinja' import day_category %}
          {% set category = day_category(now()) | trim %}
          {% if category == 'sunday_holiday' %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(1) }}
          {% elif category == 'saturday_preholiday' %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% from 'holidays.jinja' import day_category %}
            {% set category = day_category(now()) | trim %}
            {% if category == 'sunday_holiday' %}Sunday/Holiday
            {% elif category == 'saturday_preholiday' %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}
          weekday_kwh: "{{ states('input_number.consumption_storage_weekday') | float(0) | round(2) }}"
          saturday_kwh: "{{ states('input_number.consumption_storage_saturday') | float(0) | round(2) }}"
          sunday_kwh: "{{ states('input_number.consumption_storage_sunday') | float(0) | round(2) }}"

      - name: "Expected daily consumption tomorrow"
        unique_id: expected_daily_consumption_tomorrow
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') }}
        state: >-
          {% from 'holidays.jinja' import day_category %}
          {% set category = day_category(now() + timedelta(days=1)) | trim %}
          {% if category == 'sunday_holiday' %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(2) }}
          {% elif category == 'saturday_preholiday' %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(2) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(2) }}
          {% endif %}
        attributes:
          day_type: >-
            {% from 'holidays.jinja' import day_category %}
            {% set category = day_category(now() + timedelta(days=1)) | trim %}
            {% if category == 'sunday_holiday' %}Sunday/Holiday
            {% elif category == 'saturday_preholiday' %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}

      - name: "Expected daily consumption day after"
        unique_id: expected_daily_consumption_day_after
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') }}
        state: >-
          {% from 'holidays.jinja' import day_category %}
          {% set category = day_category(now() + timedelta(days=2)) | trim %}
          {% if category == 'sunday_holiday' %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(2) }}
          {% elif category == 'saturday_preholiday' %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(2) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(2) }}
          {% endif %}
        attributes:
          day_type: >-
            {% from 'holidays.jinja' import day_category %}
            {% set category = day_category(now() + timedelta(days=2)) | trim %}
            {% if category == 'sunday_holiday' %}Sunday/Holiday
            {% elif category == 'saturday_preholiday' %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}

automation:
  - alias: "Energy Management: Save & Reset at Sunrise"
    id: "consumption_save_counters"
    description: "Saves the previous day's consumption and resets the counter afterwards"
    triggers:
      - trigger: sun
        event: sunrise
        offset: "00:30:00" # Trigger shortly after sunrise
    mode: single
    actions:
      # Step 1: Calculate variables
      - variables:
          # Current value before reset
          new_value: "{{ states('sensor.house_consumption_energy_today') | float(0) }}"
          # Classify the day that just ended (shift back 12h so an early
          # sunrise still maps to the previous calendar day)
          category: >-
            {% from 'holidays.jinja' import day_category %}
            {{ day_category(now() - timedelta(hours=12)) | trim }}

      # Step 2: Write to the correct storage bucket
      - choose:
          # CASE 1: Sunday or public holiday
          - conditions: "{{ category == 'sunday_holiday' }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.consumption_storage_sunday
                data:
                  value: >
                    {% set old = states('input_number.consumption_storage_sunday') | float(0) %}
                    {{ (2 * old + new_value) / 3 }}

          # CASE 2: Saturday or day before a day off
          - conditions: "{{ category == 'saturday_preholiday' }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.consumption_storage_saturday
                data:
                  value: >
                    {% set old = states('input_number.consumption_storage_saturday') | float(0) %}
                    {{ (2 * old + new_value) / 3 }}

        # CASE 3: Normal weekday
        default:
          - action: input_number.set_value
            target:
              entity_id: input_number.consumption_storage_weekday
            data:
              value: >
                {% set old = states('input_number.consumption_storage_weekday') | float(0) %}
                {{ (4 * old + new_value) / 5 }}

      # Step 3: Short safety delay (10 seconds)
      - delay: "00:00:10"

      # Step 4: Reset the counter for the new day to zero
      - action: utility_meter.reset
        target:
          entity_id: sensor.house_consumption_energy_today_um
