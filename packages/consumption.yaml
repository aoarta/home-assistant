utility_meter:
  pv_ertrag_heute:
    unique_id: pv_ertrag_heute
    source: sensor.pv_energy_total_realtime
    name: "PV Ertrag Heute"
    cycle: daily

sensor:
  # für die datenbank
  - platform: filter
    name: "Hausverbrauch 5 Min Durchschnitt"
    unique_id: hausverbrauch_5min_avg
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0

  - platform: filter
    name: "PV Produktion 5 Min Durchschnitt"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.solarnet_pv_leistung
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1

  - platform: filter
    name: "Garage Inverter 5min Average"
    unique_id: garage_inverter_5min_avg
    entity_id: sensor.garage_inverter_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0

  - platform: filter
    name: "Balkon Inverter 5min Average"
    unique_id: balkon_inverter_5min_avg
    entity_id: sensor.balkon_inverter_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0

  - platform: filter
    name: "Balkon Inverter 2 5min Average"
    unique_id: balkon_inverter2_5min_avg
    entity_id: sensor.balkon_inverter2_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0

template:
  - sensor:
      - name: "PV Energy Total Realtime"
        unique_id: pv_energy_total_realtime
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {# 1. Rohwerte holen - S1 direkt umrechnen #}
          {% set s1 = states('sensor.zwicknagl_martin_energie_gesamt') | float(0) / 1000 %}
          {% set s2 = states('sensor.balkon_inverter_energy_total') | float(0) %}
          {% set s3 = states('sensor.balkon_inverter2_energy_total') | float(0) %}
          {% set s4 = states('sensor.garage_inverter_energy_total') | float(0) %}

          {# 2. Aktuelle Summe bilden #}
          {% set current_total = (s1 + s2 + s3 + s4) | round(2) %}

          {# 3. Vorherigen Wert des Sensors holen #}
          {% set last_total = states('sensor.pv_energy_total_realtime') | float(0) %}

          {# 4. Logik: Nur ausgeben, wenn S1 gültig ist UND der neue Wert nicht kleiner als der alte ist #}
          {% if s1 > 0 %}
            {{ [current_total, last_total] | max }}
          {% else %}
            {{ last_total }}
          {% endif %}

        # PRÜFUNG DER EINGANGSSENSOREN STATT SELBSTREFERENZ
        availability: >
          {{ is_number(states('sensor.zwicknagl_martin_energie_gesamt')) or 
             is_number(states('sensor.balkon_inverter_energy_total')) or 
             is_number(states('sensor.balkon_inverter2_energy_total')) or 
             is_number(states('sensor.garage_inverter_energy_total')) }}

      - name: "PV Produktion Watt fast"
        unique_id: pv_produktion_watt_fast
        unit_of_measurement: "kW"
        device_class: power
        state: >
          {# 1. Rohwerte holen - S1 direkt umrechnen #}
          {% set s1 = states('sensor.zwicknagl_martin_leistung_ac') | float(0) %}
          {% set s2 = states('sensor.balkon_inverter_energy_power') | float(0) %}
          {% set s3 = states('sensor.balkon_inverter2_energy_power') | float(0) %}
          {% set s4 = states('sensor.garage_inverter_energy_power') | float(0) %}

          {# 2. Aktuelle Summe bilden #}
          {% set current_total = (s1 + s2 + s3 + s4) | round(2) %}

          {{ (current_total / 1000) | round(3) }}

      - name: "Batterieleistung Gesamt"
        unique_id: batterieleistung_gesamt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {# Rohwerte einlesen und sicherheitshalber auf 0 setzen, falls ein Sensor offline ist #}
          {% set ups = states('sensor.ups_ac_leistung') | float(0) %}
          {% set venus1 = states('sensor.marstek_venus_1_ac_leistung') | float(0) %}
          {% set venus2 = states('sensor.marstek_venus_2_ac_leistung') | float(0) %}

          {{ (ups + venus1 + venus2) | round(0) }}
        availability: >
          {# Der Sensor ist nur verfügbar, wenn mindestens einer der Quellsensoren einen gültigen Wert liefert #}
          {{ is_number(states('sensor.ups_ac_leistung')) or 
             is_number(states('sensor.marstek_venus_1_ac_leistung')) or 
             is_number(states('sensor.marstek_venus_2_ac_leistung')) }}

      - name: "Hausverbrauch Netto Watt"
        unique_id: hausverbrauch_netto_watt
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set netz = states('sensor.solarnet_leistung_vom_netz') | float(0) %}
          {% set batterie_gesamt = states('sensor.marstek_batterieleistung_gesamt') | float(0) %}
          {{ (netz + batterie_gesamt) | round(0) }}

  - trigger:
      - platform: time_pattern
        minutes: "/5"
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        state: "{{ states('sensor.average_consumption_last_fast') }}"
        unit_of_measurement: W
        device_class: power
        state_class: measurement

  - trigger:
      - platform: state
        entity_id: sensor.average_consumption_last_1h
      - platform: time_pattern
        minutes: "/1" # Nur alle 1 min. neu berechnen, statt bei jedem Watt
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        state: >
          {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
          {% set now_ts = as_timestamp(now()) %}
          {% set hausverbrauch_watt = states('sensor.average_consumption_last_1h') | float(0) %}

          {# Nur berechnen, wenn die Sonne noch nicht untergegangen ist #}
          {% if sun_set > now_ts %}
            {% set verbleibende_stunden = (sun_set - now_ts) / 3600 %}
            {# Formel: (Watt * Stunden) / 1000 = kWh #}
            {{ (hausverbrauch_watt * verbleibende_stunden / 1000) | round(2) }}
          {% else %}
            0.0
          {% endif %}
        attributes:
          verbleibende_zeit_h: >
            {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
            {{ ((sun_set - as_timestamp(now())) / 3600) | round(2) if sun_set > as_timestamp(now()) else 0 }}

  - trigger:
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "PV Produktion Watt"
        unique_id: pv_produktion_watt
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {# Wir holen den aktuellen Wert des schnellen Sensors #}
          {% set val = states('sensor.pv_produktion_watt_fast') | float(0)  %}
          {{ val | round(3) }}
