input_number:
  consumption_storage_weekday:
    name: "Storage Weekday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-range

  consumption_storage_saturday:
    name: "Storage Saturday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-weekend

  consumption_storage_sunday:
    name: "Storage Sunday/Holiday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-star

utility_meter:
  # Helper entity
  house_energy_consumption_today_um:
    unique_id: house_energy_consumption_today_um
    source: sensor.house_consumption_energy
    name: "House Consumption Energy Today UM"

sensor:
  - platform: integration
    source: sensor.house_consumption_power_brutto
    name: "House Consumption Energy"
    unique_id: house_consumption_energy
    unit_prefix: k # W → kWh
    unit_time: h # per hour
    round: 3
    method: trapezoidal # Trapezoidal method = more accurate

  - platform: filter
    name: "House Consumption Energy Today"
    unique_id: house_consumption_energy_today
    entity_id: sensor.house_consumption_energy_today_um
    filters:
      - filter: range
        upper_bound: 60 # Everything above 60 kWh per day is ignored

  - platform: filter
    name: "House Consumption 5 Min Average"
    unique_id: house_consumption_power_5_min_avg
    entity_id: sensor.house_consumption_power_brutto
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "PV Production 5 Min Average"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.solarnet_pv_leistung
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Solarnet Grid Power 5 Min Average"
    unique_id: solarnet_leistung_vom_netz_5min_avg
    entity_id: sensor.solarnet_leistung_vom_netz
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.house_consumption_power_brutto
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1
      - filter: throttle
        window_size: 300

template:
  - sensor:
      - name: "House Consumption Power brutto"
        unique_id: house_consumption_power_brutto
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_ac_power_total') and
             has_value('sensor.pv_production_power')
             }}
        state: >-
          {{ ( states('sensor.solarnet_leistung_vom_netz') | float(0)
               + states('sensor.marstek_ac_power_total') | float(0)
               + states('sensor.pv_production_power') | float(0)
              ) | round(0) }}

  - sensor:
      - name: "Charge Power"
        unique_id: charge_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_ac_power_total') }}
        state: >-
          {{ ( states('sensor.solarnet_leistung_vom_netz') | float(0) +
               states('sensor.marstek_ac_power_total') | float(0)
              ) | round(0) }}

  #  - sensor:
  #      - name: "Stable Charge Power"
  #        unique_id: ladeleistung_stabil
  #        unit_of_measurement: "W"
  #        device_class: power
  #        state_class: measurement
  #        availability: "{{ has_value('sensor.charge_power') }}"
  #        state: >-
  #          {{ ((states('sensor.charge_power') | float(0) / 15) | int) * 15 }}

  - triggers:
      - trigger: state
        entity_id: sensor.charge_power
    sensor:
      - name: "Stable Charge Power"
        unique_id: ladeleistung_stabil
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "{{ has_value('sensor.charge_power') }}"
        state: >-
          {% set neu = states('sensor.charge_power') | float(0) %}
          {% set alt = this.state | float(neu) %}
          {{ neu | round(0) if (neu - alt) | abs >= 15 else alt }}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h_fast # ✓ Fix: updates continuously
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set fast = states('sensor.average_consumption_last_1h_fast') %}
          {% if is_number(fast) %}
            {{ fast | float(0) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0
          {% endif %}

  - triggers:
      - trigger: state
        entity_id: sensor.average_consumption_last_1h
      - trigger: time_pattern
        minutes: "/1"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set watt = states('sensor.average_consumption_last_1h') | float(none) %}
          {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(none) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watt is not none and sun_set is not none and sun_set > now_ts %}
            {{ (watt * (sun_set - now_ts) / 3600 / 1000) | round(2) }}
          {% elif sun_set is not none and sun_set <= now_ts %}
            0.0
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0.0
          {% endif %}
        attributes:
          remaining_time_h: >-
            {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
            {% set now_ts = as_timestamp(now()) %}
            {{ ((sun_set - now_ts) / 3600) | round(2) if sun_set > now_ts else 0 }}

  - triggers:
      - trigger: time
        at: "23:45:00"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "House Consumption Energy Until Sunrise"
        unique_id: house_consumption_energy_until_sunrise
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% if trigger.platform == 'time' %}
            {% set aktuell = states('sensor.house_consumption_energy_today') | float(none) %}
            {% set alt = this.state | float(none) %}
            {% if aktuell is not none and alt is not none %}
              {{ (0.9 * aktuell + 0.1 * alt) | round(2) }}
            {% elif aktuell is not none %}
              {{ aktuell | round(2) }}
            {% else %}
              {{ this.state | default(0.0) }}
            {% endif %}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            {{ states('sensor.house_consumption_energy_today') | float(10.0) }}
          {% endif %}

  - triggers:
      - trigger: time
        at: "00:31:00"
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - binary_sensor.workday
          - binary_sensor.workday_tomorrow
          - input_number.consumption_storage_weekday
          - input_number.consumption_storage_saturday
          - input_number.consumption_storage_sunday

    sensor:
      - name: "Expected daily consumption"
        unique_id: expected_daily_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') and
             has_value('binary_sensor.workday') }}
        state: >-
          {% set is_sunday         = now().weekday() == 6 %}
          {% set holiday            = is_state('binary_sensor.workday', 'off') %}
          {% set is_saturday         = now().weekday() == 5 %}
          {% set tomorrow_is_a_day_off = is_state('binary_sensor.workday_tomorrow', 'off') %}

          {% if is_sunday or holiday %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(1) }}
          {% elif is_saturday or tomorrow_is_a_day_off %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set is_sunday         = now().weekday() == 6 %}
            {% set holiday            = is_state('binary_sensor.workday', 'off') %}
            {% set is_saturday         = now().weekday() == 5 %}
            {% set tomorrow_is_a_day_off = is_state('binary_sensor.workday_tomorrow', 'off') %}
            {% if is_sunday or holiday %}Sunday/Holiday
            {% elif is_saturday or tomorrow_is_a_day_off %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}
          weekday_kwh: "{{ states('input_number.consumption_storage_weekday') | float(0) | round(1) }}"
          saturday_kwh: "{{ states('input_number.consumption_storage_saturday')   | float(0) | round(1) }}"
          sunday_kwh: "{{ states('input_number.consumption_storage_sunday')   | float(0) | round(1) }}"

      - name: "Expected daily consumption tomorrow"
        unique_id: expected_daily_consumption_tomorrow
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') and
             has_value('binary_sensor.workday_tomorrow') }}
        state: >-
          {% set weekday     = (now().weekday() + 1) % 7 %}
          {% set is_sunday   = weekday == 6 %}
          {% set is_saturday = weekday == 5 %}
          {% set holiday     = is_state('binary_sensor.workday_tomorrow', 'off') %}
          {# Pre-holiday: no workday+2 sensor → only checkable by weekday #}
          {% set pre_holiday     = (now().weekday() + 2) % 7 == 6 %}

          {% if is_sunday or holiday %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(1) }}
          {% elif is_saturday or pre_holiday %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set weekday     = (now().weekday() + 1) % 7 %}
            {% set is_sunday   = weekday == 6 %}
            {% set is_saturday = weekday == 5 %}
            {% set holiday    = is_state('binary_sensor.workday_tomorrow', 'off') %}
            {% set pre_holiday = (now().weekday() + 2) % 7 == 6 %}
            {% if is_sunday or holiday %}Sunday/Holiday
            {% elif is_saturday or pre_holiday %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}

      - name: "Expected daily consumption day after"
        unique_id: expected_daily_consumption_day_after
        unit_of_measurement: "kWh"
        device_class: energy
        availability: >-
          {{ has_value('input_number.consumption_storage_weekday') }}
        state: >-
          {% set fixed_holidays = [
              '01-01', '01-06', '03-19', '05-01',
              '08-15', '10-26', '11-01', '12-08',
              '12-24', '12-25', '12-26'
            ] %}
          {% set target = now() + timedelta(days=2) %}
          {% set next_day = now() + timedelta(days=3) %}
          {% set is_holiday  = target.strftime('%m-%d') in fixed_holidays %}
          {% set is_sunday   = target.weekday() == 6 %}
          {% set is_saturday = target.weekday() == 5 %}
          {# pre_holiday: day after target is Sunday or a holiday #}
          {% set pre_holiday = next_day.weekday() == 6
                              or next_day.strftime('%m-%d') in fixed_holidays %}

          {% if is_sunday or is_holiday %}
            {{ states('input_number.consumption_storage_sunday') | float(0) | round(1) }}
          {% elif is_saturday or pre_holiday %}
            {{ states('input_number.consumption_storage_saturday') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.consumption_storage_weekday') | float(0) | round(1) }}
          {% endif %}
        attributes:
          day_type: >-
            {% set fixed_holidays = [
                '01-01', '01-06', '03-19', '05-01',
                '08-15', '10-26', '11-01', '12-08',
                '12-24', '12-25', '12-26'
              ] %}
            {% set target = now() + timedelta(days=2) %}
            {% set next_day = now() + timedelta(days=3) %}
            {% set is_holiday  = target.strftime('%m-%d') in fixed_holidays %}
            {% set is_sunday   = target.weekday() == 6 %}
            {% set is_saturday = target.weekday() == 5 %}
            {% set pre_holiday = next_day.weekday() == 6
                                or next_day.strftime('%m-%d') in fixed_holidays %}
            {% if is_sunday or is_holiday %}Sunday/Holiday
            {% elif is_saturday or pre_holiday %}Saturday/Pre-holiday
            {% else %}Weekday
            {% endif %}

automation:
  - alias: "Energy Management: Save & Reset at Sunrise"
    id: "consumption_save_counters"
    description: "Saves the previous day's consumption and resets the counter afterwards"
    triggers:
      - trigger: sun
        event: sunrise
        offset: "00:30:00" # Trigger shortly after sunrise
    mode: single
    actions:
      # Step 1: Calculate variables
      - variables:
          vortag: "{{ now() - timedelta(hours=12) }}"
          is_saturday: "{{ (now() - timedelta(hours=12)).weekday() == 5 }}"
          is_sunday: "{{ (now() - timedelta(hours=12)).weekday() == 6 }}"
          holiday: "{{ is_state('binary_sensor.workday', 'off') }}"
          tomorrow_is_a_day_off: "{{ is_state('binary_sensor.workday_tomorrow', 'off') }}"
          # Current value before reset:
          neu: "{{ states('sensor.house_consumption_energy_today') | float(0) }}"

      # Step 2: Write to the correct storage bucket
      - choose:
          # CASE 1: Sunday or public holiday
          - conditions:
              - condition: template
                value_template: "{{ is_sunday or holiday }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.consumption_storage_sunday
                data:
                  value: >
                    {% set alt = states('input_number.consumption_storage_sunday') | float(0) %}
                    {{ (2 * alt + neu) / 3 }}

          # CASE 2: Saturday or day BEFORE a public holiday
          - conditions:
              - condition: template
                value_template: "{{ is_saturday or tomorrow_is_a_day_off }}"
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.consumption_storage_saturday
                data:
                  value: >
                    {% set alt = states('input_number.consumption_storage_saturday') | float(0) %}
                    {{ (2 * alt + neu) / 3 }}

        # CASE 3: Normal weekday
        default:
          - action: input_number.set_value
            target:
              entity_id: input_number.consumption_storage_weekday
            data:
              value: >
                {% set alt = states('input_number.consumption_storage_weekday') | float(0) %}
                {{ (4 * alt + neu) / 5 }}

      # Step 3: Short safety delay (10 seconds)
      - delay: "00:00:10"

      # Step 4: Reset the counter for the new day to zero
      #      - action: utility_meter.calibrate
      #        target:
      #          entity_id: sensor.house_consumption_energy_today_um
      #        data:
      #          value: "0.00"
      - action: utility_meter.reset
        target:
          entity_id: sensor.house_consumption_energy_today_um
