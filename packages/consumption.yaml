input_number:
  verbrauch_speicher_wochentag:
    name: "Storage Weekday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-range

  verbrauch_speicher_samstag:
    name: "Storage Saturday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-weekend

  verbrauch_speicher_sonntag:
    name: "Storage Sunday/Holiday"
    min: 0
    max: 10000
    step: 0.1
    mode: box
    unit_of_measurement: "kWh"
    icon: mdi:calendar-star

utility_meter:
  # Helper entity
  hausverbrauch_energie_heute_um:
    unique_id: hausverbrauch_energie_heute_um
    source: sensor.hausverbrauch_energie
    name: "House Consumption Energy Today UM"

sensor:
  - platform: integration
    source: sensor.hausverbrauch_leistung_netto
    name: "House Consumption Energy"
    unique_id: hausverbrauch_energie
    unit_prefix: k # W → kWh
    unit_time: h # per hour
    round: 3
    method: trapezoidal # Trapezoidal method = more accurate

  - platform: filter
    name: "House Consumption Energy Today"
    unique_id: hausverbrauch_energie_heute
    entity_id: sensor.hausverbrauch_energie_heute_um
    filters:
      - filter: range
        upper_bound: 60 # Everything above 60 kWh per day is ignored

  - platform: filter
    name: "House Consumption 5 Min Average"
    unique_id: hausverbrauch_5min_avg
    entity_id: sensor.hausverbrauch_leistung_netto
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "PV Production 5 Min Average"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.solarnet_pv_leistung
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Solarnet Grid Power 5 Min Average"
    unique_id: solarnet_leistung_vom_netz_5min_avg
    entity_id: sensor.solarnet_leistung_vom_netz
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.hausverbrauch_leistung_netto
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1
      - filter: throttle
        window_size: 300

#  - platform: filter
#    name: "Garage Inverter 5min Average"
#    unique_id: garage_inverter_5min_avg
#    entity_id: sensor.garage_inverter_energy_power
#    filters:
#      - filter: time_simple_moving_average
#        window_size: "00:05:00"
#        precision: 0
#      - filter: throttle
#        window_size: 300

#  - platform: filter
#    name: "Balkon Inverter 5min Average"
#    unique_id: balkon_inverter_5min_avg
