sensor:
  - platform: integration
    source: sensor.hausverbrauch_netto_watt
    name: hausverbrauch_energy
    unit_prefix: k
    round: 2
    method: left

  - platform: filter
    name: "Hausverbrauch 5 Min Durchschnitt"
    unique_id: hausverbrauch_5min_avg
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "PV Produktion 5 Min Durchschnitt"
    unique_id: pv_produktion_5min_avg
    entity_id: sensor.solarnet_pv_leistung
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Solarnet Leistung vom Netz 5 min Durchschnitt"
    unique_id: solarnet_leistung_vom_netz_5min_avg
    entity_id: sensor.solarnet_leistung_vom_netz
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Average consumption last 1h fast"
    unique_id: average_consumption_last_1h_fast
    entity_id: sensor.hausverbrauch_netto_watt
    filters:
      - filter: time_simple_moving_average
        window_size: "01:00:00"
        precision: 1
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Garage Inverter 5min Average"
    unique_id: garage_inverter_5min_avg
    entity_id: sensor.garage_inverter_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Balkon Inverter 5min Average"
    unique_id: balkon_inverter_5min_avg
    entity_id: sensor.balkon_inverter_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

  - platform: filter
    name: "Balkon Inverter 2 5min Average"
    unique_id: balkon_inverter2_5min_avg
    entity_id: sensor.balkon_inverter2_energy_power
    filters:
      - filter: time_simple_moving_average
        window_size: "00:05:00"
        precision: 0
      - filter: throttle
        window_size: 300

template:
  - sensor:
      - name: "Hausverbrauch Netto Watt"
        unique_id: hausverbrauch_netto_watt
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.solarnet_leistung_vom_netz') and
             has_value('sensor.marstek_batterieleistung_gesamt') }}
        state: >-
          {{ (states('sensor.solarnet_leistung_vom_netz') | float(0)
            + states('sensor.marstek_batterieleistung_gesamt') | float(0)) | round(0) }}

  - trigger:
      - platform: state
        entity_id: sensor.average_consumption_last_1h_fast # ✓ Fix: aktualisiert laufend
      - platform: homeassistant
        event: start
    sensor:
      - name: "Average consumption last 1h"
        unique_id: average_consumption_last_1h
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {% set fast = states('sensor.average_consumption_last_1h_fast') %}
          {% if is_number(fast) %}
            {{ fast | float(0) }}
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0
          {% endif %}

  - trigger:
      - platform: state
        entity_id: sensor.average_consumption_last_1h
      - platform: time_pattern
        minutes: "/1"
      - platform: homeassistant
        event: start
    sensor:
      - name: "Estimated remaining consumption"
        unique_id: estimated_remaining_consumption
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >-
          {% set watt = states('sensor.average_consumption_last_1h') | float(none) %}
          {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(none) %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watt is not none and sun_set is not none and sun_set > now_ts %}
            {{ (watt * (sun_set - now_ts) / 3600 / 1000) | round(2) }}
          {% elif sun_set is not none and sun_set <= now_ts %}
            0.0
          {% elif this.state is defined and is_number(this.state) %}
            {{ this.state }}
          {% else %}
            0.0
          {% endif %}
        attributes:
          verbleibende_zeit_h: >-
            {% set sun_set = state_attr('sensor.solar_zeit_logik', 'sun_set') | float(0) %}
            {% set now_ts = as_timestamp(now()) %}
            {{ ((sun_set - now_ts) / 3600) | round(2) if sun_set > now_ts else 0 }}
