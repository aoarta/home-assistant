# ============================================================
# PV surplus wallbox charging (WARP3) - Automations
# ============================================================

automation:
  # ============================================================
  # SESSION RESET: zero the session counter when the cable is plugged in.
  # ============================================================
  - alias: "Wallbox: Reset session energy on cable plug-in"
    id: wallbox_reset_session_energy
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        from: "off"
        to: "on"
    conditions:
      - condition: template
        value_template: >-
          {{ states('sensor.warp3_2ita_energyabs')
            not in ['unknown', 'unavailable', 'none', None] }}
    actions:
      # Snapshot the absolute meter -> ev_session_energy becomes 0.
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_session_start_energy_kwh
        data:
          value: "{{ states('sensor.warp3_2ita_energyabs') | float(0) }}"
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Cable plugged in -- session energy counter reset to 0."

  # ============================================================
  # ENFORCE OFF: vehicle mode "off" must never charge.
  # Catches every entry point, including WARP3 firmware auto-start
  # on cable plug-in (which bypasses the HA start automations).
  # ============================================================
  - alias: "Wallbox: Enforce OFF mode (never charge when vehicle = off)"
    id: wallbox_enforce_off
    mode: restart
    triggers:
      # Vehicle mode switched to off.
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
        to: "off"
      # Charging started for ANY reason (e.g. wallbox auto-start).
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_charging
        to: "on"
      # Cable plugged in while already in off mode.
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
    conditions:
      - condition: state
        entity_id: input_select.ev_vehicle_mode
        state: "off"
    actions:
      # Block delivery (0 A) so the wallbox cannot re-deliver power...
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: 0
      # ...and explicitly stop the session.
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Vehicle mode = off -- charging blocked and stopped."

  # ============================================================
  # MANUAL: fixed-current charging (overrides every strategy).
  # Active whenever ev_manual_charging_current >= 6 A and vehicle != off.
  # ============================================================
  - alias: "Wallbox: Manual fixed-current charging"
    id: wallbox_manual_charge
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_number.ev_manual_charging_current
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
      # Re-evaluate when the energy target is changed (vehicle/percent).
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
      - trigger: state
        entity_id: input_number.ev_charge_by_percent
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        above: 5 # >= 6 A => manual mode active
      # Block when vehicle mode is off.
      - condition: template
        value_template: "{{ not is_state('input_select.ev_vehicle_mode', 'off') }}"
      # Do not (re)start once the per-session energy limit is reached.
      - condition: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
            < states('sensor.ev_max_charge_energy') | float(0) }}
    variables:
      manual_amps: "{{ states('input_number.ev_manual_charging_current') | int(0) }}"
      current_amps: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
      is_charging: "{{ is_state('binary_sensor.warp3_2ita_charging', 'on') }}"
    actions:
      # Apply the manual current if it differs from the current target.
      - if:
          - "{{ manual_amps != current_amps }}"
        then:
          - action: number.set_value
            target:
              entity_id: number.warp3_2ita_globalcurrent
            data:
              value: "{{ manual_amps }}"
      # Start the wallbox if it is not already charging.
      - if:
          - "{{ not is_charging }}"
        then:
          - delay:
              milliseconds: 500
          - action: button.press
            target:
              entity_id: button.warp3_2ita_startcharge
          - action: logbook.log
            data:
              name: "Wallbox"
              message: "Manual charging started at {{ manual_amps }} A."

  # ============================================================
  # UNIVERSAL START: Starts charging immediately on user interaction
  # or after 15 seconds of sustained automatic PV surplus.
  # ============================================================
  - alias: "Wallbox: Start charging (Universal)"
    id: wallbox_universal_start
    mode: single
    triggers:
      # 1. Automatic start: target current is sufficient for 15 seconds
      - trigger: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
        for:
          seconds: 15
      # 2. Instant start: user switches the vehicle mode on
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
      # 3. Instant start: user changes the charging mode
      - trigger: state
        entity_id: input_select.ev_charge_mode
      # 4. Instant start: user plugs in the cable
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        to: "on"
    conditions:
      # Cable must be connected
      - condition: state
        entity_id: binary_sensor.warp3_2ita_cable
        state: "on"
      # Wallbox must not be already charging
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "off"
      # Skip if manual charging is active (handled by manual automation)
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
      # Vehicle mode must not be 'off'
      - condition: template
        value_template: "{{ not is_state('input_select.ev_vehicle_mode', 'off') }}"
      # There must actually be a valid target current calculated (> 5 A)
      - condition: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
      # Target energy limit has not been reached yet
      - condition: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
            < states('sensor.ev_max_charge_energy') | float(0) }}
    actions:
      # 1. Wait a moment to let the target sensor calculate the correct current after triggers
      - delay:
          seconds: 2
      # 2. Set the target current (ensuring we force float to int correctly)
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: "{{ states('sensor.ev_target_charging_current') | int(6) }}"
      # 3. Wait briefly for the wallbox to register the current limit
      - delay:
          milliseconds: 500
      # 4. Press start
      - action: button.press
        target:
          entity_id: button.warp3_2ita_startcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: >-
            Charging started automatically in mode '{{ states('input_select.ev_charge_mode') }}'
            at {{ states('sensor.ev_target_charging_current') }} A.

  # ============================================================
  # TRACK: while charging, follow the target current (all strategies).
  # mode:single + hold lets the fast battery loop settle against a fixed EV draw
  # before the EV is allowed to step again (breaks the limit cycle).
  # Manual mode is handled by wallbox_manual_charge, so it is excluded here.
  # ============================================================
  - alias: "Wallbox: Track target while charging"
    id: wallbox_track_target
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.ev_target_charging_current
      - trigger: state
        entity_id: sensor.charge_power

    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      - condition: numeric_state
        entity_id: sensor.ev_target_charging_current
        above: 5
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
    variables:
      target_amps: "{{ states('sensor.ev_target_charging_current') | int(6) }}"
      current_amps: "{{ states('number.warp3_2ita_globalcurrent') | int(0) }}"
      adjust_threshold_amps: 1 # wider deadband: ignore < ~230 W wobble
    actions:
      # Only write on a meaningful change...
      - condition: template
        value_template: "{{ (target_amps - current_amps) | abs >= adjust_threshold_amps }}"
      - action: number.set_value
        target:
          entity_id: number.warp3_2ita_globalcurrent
        data:
          value: "{{ target_amps }}"
      # ...then HOLD so the battery loop settles before the next EV step.
      - delay:
          minutes: 1

  # ============================================================
  # STOP (idle): target current dropped below 6 A for 2 minutes.
  # Covers pv_surplus losing the sun and pv_battery_floor hitting the SOC floor.
  # pv_grid_floor never drops below 6 A, so it is unaffected here.
  # mode=off and the energy limit are handled by wallbox_stop_on_limit_or_off.
  # ============================================================
  - alias: "Wallbox: Stop when target idle"
    id: wallbox_stop_on_idle
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.ev_target_charging_current
        below: 6
        for:
          minutes: 2
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      # Do not stop manual fixed-current charging.
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        below: 6
    actions:
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: "Charging stopped -- target current dropped to 0 A."

  # ============================================================
  # STOP (limit / off): stop when the energy target is reached or vehicle = off.
  # Applies to manual and automatic charging.
  # ============================================================
  - alias: "Wallbox: Stop charging at limit or when mode is off"
    id: wallbox_stop_on_limit_or_off
    mode: single
    triggers:
      # Session energy crosses the limit while charging.
      - trigger: template
        value_template: >-
          {{ states('sensor.ev_session_energy') | float(0)
            >= states('sensor.ev_max_charge_energy') | float(0) }}
      # Vehicle mode set to off.
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
        to: "off"
      # Charging just started -> wait 5 seconds before checking to let template sensors update!
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_charging
        to: "on"
        for:
          seconds: 5
      # Limit changed (vehicle/percent edited)
      - trigger: state
        entity_id: sensor.ev_max_charge_energy
    conditions:
      - condition: state
        entity_id: binary_sensor.warp3_2ita_charging
        state: "on"
      # ONLY stop if vehicle is off OR (limit is reached AND limit is actually greater than 0)
      - condition: template
        value_template: >-
          {{ is_state('input_select.ev_vehicle_mode', 'off')
            or ( states('sensor.ev_max_charge_energy') | float(0) > 0
                  and states('sensor.ev_session_energy') | float(0)
                  >= states('sensor.ev_max_charge_energy') | float(0) ) }}
    actions:
      - action: button.press
        target:
          entity_id: button.warp3_2ita_stopcharge
      - action: logbook.log
        data:
          name: "Wallbox"
          message: >-
            Charging stopped -- vehicle={{ states('input_select.ev_vehicle_mode') }},
            session={{ states('sensor.ev_session_energy') }} kWh,
            limit={{ states('sensor.ev_max_charge_energy') }} kWh.

  # ============================================================
  # Slider correction: force the manual current to 0 or >= 6
  # (the wallbox cannot charge below 6 A).
  # ============================================================
  - alias: "Wallbox: Correct manual charging current"
    id: wallbox_correct_manual_current
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_number.ev_manual_charging_current
    conditions:
      - condition: numeric_state
        entity_id: input_number.ev_manual_charging_current
        above: 0
        below: 6
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_manual_charging_current
        data:
          value: 0

    # ============================================
    # reset vehicle to off, when unplugged
    # ============================================
  - alias: "Wallbox: reset vehicle"
    id: wallbox_reset_vehicle
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.warp3_2ita_cable
        from: "on"
        to: "off"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.ev_vehicle_mode
        data:
          option: "off"

    # ===================================================================
    # calculate charge energy delta, when target soc or vehicle changes
    # ===================================================================
  - alias: "Wallbox: Lademenge (Delta) aus Ziel-SOC berechnen"
    id: wallbox_calc_charge_delta
    mode: restart
    triggers:
      # 1. Auslösen, wenn sich der gewünschte Ziel-SOC ändert
      - trigger: state
        entity_id: input_number.ev_charge_to_percent
      # 2. Auslösen, wenn das Fahrzeug gewechselt wird (damit das Delta sofort zum neuen Auto passt)
      - trigger: state
        entity_id: input_select.ev_vehicle_mode
    conditions:
      # Nur ausführen, wenn auch wirklich ein Fahrzeug aktiv ausgewählt ist
      - condition: template
        value_template: "{{ states('input_select.ev_vehicle_mode') in ['zero', 'honda_e'] }}"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.ev_charge_by_percent
        data:
          value: >-
            {% set target = states('input_number.ev_charge_to_percent') | float(0) %}
            {% set vehicle = states('input_select.ev_vehicle_mode') %}

            {# Fahrzeugspezifischen aktuellen SOC ermitteln #}
            {% if vehicle == 'zero' %}
              {% set current_soc = states('sensor.zero_soc') | float(0) %}
            {% elif vehicle == 'honda_e' %}
              {% set current_soc = states('sensor.hondae_soc') | float(0) %}
            {% else %}
              {% set current_soc = 0 %}
            {% endif %}

            {# Berechnung: Ziel-SOC minus aktueller SOC #}
            {% set delta = target - current_soc %}

            {# Sicherheits-Mathematik: Wert darf nicht unter 0 % fallen (falls Auto schon voller ist) #}
            {# und nicht über 100 % steigen. Abgerundet auf ganze Zahlen. #}
            {{ [0, [delta, 100] | min] | max | round(1) }}

  - alias: "Wallbox: WARP3 LED Fahrzeug & SoC Steuerung"
    id: wallbox_LED
    description: "Steuert die LED nach Fahrzeugfarbe, Ladestand (1Hz / 2Hz) und Regenbogen bei voll."
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.warp3_2ita_charging
      - platform: state
        entity_id: sensor.zero_soc
      - platform: state
        entity_id: sensor.hondae_soc
      - platform: state
        entity_id: binary_sensor.zero_sr_s_mbb_zero_angesteckt
      - platform: state
        entity_id: binary_sensor.hondae_connected
    action:
      - choose:
          # =========================================================
          # 1. BEREITSCHAFT: Grün, dauerhaft an
          # =========================================================
          - conditions:
              - condition: state
                entity_id: binary_sensor.warp3_2ita_charging
                state: "ready"
            sequence:
              - action: mqtt.publish
                data:
                  topic: warp/2itA/evse/indicator_led_set
                  payload: '{"state": 255, "color_h": 120, "color_s": 255, "color_v": 255}'

          # =========================================================
          # 2. HONDA E (Farbe: Weiß)
          # =========================================================
          - conditions:
              - condition: state
                entity_id: binary_sensor.hondae_connected
                state: "on"
            sequence:
              - choose:
                  # VOLL: Regenbogen-Effekt (state: 4)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.hondae_soc
                        above: 98
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 4, "color_h": 360, "color_s": 0, "color_v": 0}'

                  # MITTE (50% bis 98%): Weiß schnelles Blinken (2 Hz -> state: 3)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.hondae_soc
                        above: 49
                        below: 99
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 3, "color_h": 360, "color_s": 255, "color_v": 255}'
                  # ANFANG (< 50%): Weiß langsames Blinken (1 Hz -> state: 2)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.hondae_soc
                        below: 50
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 2, "color_h": 360, "color_s": 0, "color_v": 255}'

          # =========================================================
          # 3. ZERO (Farbe: Rot)
          # =========================================================
          - conditions:
              - condition: state
                entity_id: binary_sensor.zero_sr_s_mbb_zero_angesteckt
                state: "on"
            sequence:
              - choose:
                  # VOLL: Regenbogen-Effekt (state: 4)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.zero_soc
                        above: 98
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 4, "color_h": 360, "color_s": 0, "color_v": 0}'

                  # MITTE (50% bis 98%): Rot schnelles Blinken (2 Hz -> state: 3)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.zero_soc
                        above: 49
                        below: 99
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 3, "color_h": 360, "color_s": 255, "color_v": 255}'

                  # ANFANG (< 50%): Rot langsames Blinken (1 Hz -> state: 2)
                  - conditions:
                      - condition: numeric_state
                        entity_id: sensor.zero_soc
                        below: 50
                    sequence:
                      - action: mqtt.publish
                        data:
                          topic: warp/2itA/evse/indicator_led_set
                          payload: '{"state": 2, "color_h": 360, "color_s": 255, "color_v": 255}'
